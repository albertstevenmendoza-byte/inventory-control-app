<!-- Add this specialized screen for FRESH mode -->
<div id="screen-fresh" class="screen">
  <div class="header" style="background: linear-gradient(to right, #06b6d4, #3b82f6);">
    <button class="hdr-btn" onclick="backToSetup()">← Exit FRESH Mode</button>
    <h1>FRESH PALLET COUNT</h1>
    <div class="sync-dot"></div>
  </div>
  <div class="setup-content" style="padding-bottom: 120px;">
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val" id="fresh-total-found">0</div><div class="stat-label">Total Pallets Found</div></div>
      <div class="stat-box"><div class="stat-val" id="fresh-skus-left">14</div><div class="stat-label">SKUs Remaining</div></div>
    </div>
    
    <div class="bin-nav">
       <input type="text" class="bin-input" id="fresh-scan-input" placeholder="SCAN ANY PALLET / HU..." style="border-color: var(--cyan);">
    </div>

    <div id="fresh-sku-grid" style="display: flex; flex-direction: column; gap: 8px; margin-top: 16px;">
      <!-- SKU Progress cards will be injected here -->
    </div>
  </div>
</div>

<script>
// --- CORE ARCHITECTURAL UPDATES ---

// 1. Detect "FRESH" Mode in search
function searchProduct() {
  const input = document.getElementById('product-search').value.trim().toUpperCase();
  if (!input) return;

  if (input === 'FRESH') {
    initFreshMode();
    return;
  }
  
  // Standard Product Audit Logic...
  const prod = input;
  const binsWithProduct = [...new Set(
    sapMaster.filter(i => i.product.toUpperCase() === prod).map(i => i.sapBin)
  )].sort();
  
  if (binsWithProduct.length === 0) { 
    // GHOST ITEM LOGIC
    if(confirm(`Product ${prod} not in SAP. Trigger recommended cycle count?`)) {
       triggerGhostAudit(prod);
    }
    return; 
  }
  targetProduct = prod;
  aisleBins = binsWithProduct;
  binIdx = 0;
  navigateToBin(aisleBins[0]);
}

// 2. Conflict Resolution Logic
function getBinItems(bin) {
  let items = binIndex[bin] || [];
  
  // Filter out items already found in other bins (Movement Registry)
  // This prevents Bin B from showing "Missing" if the pallet was found in Bin A
  return items.filter(sapItem => !movementRegistry.has(sapItem.hu));
}

// 3. FRESH Mode Implementation
function initFreshMode() {
  switchScreen('fresh');
  const grid = document.getElementById('fresh-sku-grid');
  
  // Build SKU Progress Cards
  grid.innerHTML = FRESH_SKUS.map(sku => {
    const sapCount = sapMaster.filter(i => i.product === sku).length;
    return `
      <div class="hu-card" id="fresh-card-${sku}" style="border-left: 4px solid var(--border)">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div style="font-size:14px; font-weight:900;">${sku}</div>
            <div style="font-size:10px; color:var(--text-3)">Expected Pallets: ${sapCount}</div>
          </div>
          <div style="text-align:right">
            <div class="mono" style="font-size:20px; font-weight:800;" id="fresh-count-${sku}">0</div>
            <div style="font-size:8px; text-transform:uppercase; color:var(--text-3)">Scanned</div>
          </div>
        </div>
        <div style="height:4px; background:var(--surface-3); border-radius:2px; margin-top:8px; overflow:hidden;">
          <div id="fresh-progress-${sku}" style="height:100%; width:0%; background:var(--cyan); transition:width 0.3s;"></div>
        </div>
      </div>
    `;
  }).join('');
  
  document.getElementById('fresh-scan-input').focus();
}

// Optimized Fresh Scanning Logic
document.getElementById('fresh-scan-input').addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const hu = e.target.value.trim();
    e.target.value = '';
    haptic();
    
    const item = huIndex.get(hu);
    if (!item || !FRESH_SKUS.includes(item.product)) {
      toast("Not a FRESH SKU or HU not found", "red");
      return;
    }

    // Update Global Movement Registry
    movementRegistry.add(hu);
    
    // Update UI
    const countEl = document.getElementById(`fresh-count-${item.product}`);
    const current = parseInt(countEl.textContent) + 1;
    countEl.textContent = current;
    
    const sapTotal = sapMaster.filter(i => i.product === item.product).length;
    const progress = Math.min(100, (current / sapTotal) * 100);
    document.getElementById(`fresh-progress-${item.product}`).style.width = progress + '%';
    
    if(progress >= 100) {
      document.getElementById(`fresh-card-${item.product}`).style.borderColor = 'var(--green)';
    }

    // Log to server immediately (Scan-and-go)
    const payload = {
      action: 'logAudit',
      user: auditorName,
      bin: 'FRESH-MODE',
      items: [{
        hu: item.hu, product: item.product, sapBin: item.sapBin,
        sapQty: item.sapQty, countQty: item.sapQty, type: 'ok',
        note: 'Scanned in Fresh Mode'
      }],
      sessionId: 'FRESH-' + new Date().toISOString().split('T')[0]
    };
    sendPayload(payload);
    toast(`Scanned ${item.product}`, "green");
  }
});

// Ghost Audit Pivot
function triggerGhostAudit(sku) {
  // Create a localized variance report flow
  targetProduct = sku;
  // Since it doesn't exist in SAP, we create a virtual bin list based on where user is
  aisleBins = [currentBin || 'UNKNOWN'];
  currentItems = []; // Start with zero expectation
  toggleExtra(); // Open the "Add Found" form immediately
  document.getElementById('extra-product').value = sku;
  toast(`Pivoted to Audit for ${sku}`, "cyan");
}

</script>
