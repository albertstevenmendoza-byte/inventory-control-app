<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cycle Counter — Novus Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117; --surface: #181a23; --surface-2: #1f2230; --surface-3: #2a2d3a;
            --border: #313546; --text: #eceef4; --text-2: #9ba1b5; --text-3: #6c7189;
            --accent: #5b9aff; --accent-glow: rgba(91,154,255,0.1);
            --green: #34d399; --green-bg: rgba(52,211,153,0.1); --green-border: rgba(52,211,153,0.25);
            --red: #f87171; --red-bg: rgba(248,113,113,0.1); --red-border: rgba(248,113,113,0.25);
            --amber: #fbbf24; --amber-bg: rgba(251,191,36,0.1); --amber-border: rgba(251,191,36,0.25);
            --purple: #a78bfa; --purple-bg: rgba(167,139,250,0.1); --purple-border: rgba(167,139,250,0.25);
            --cyan: #22d3ee; --cyan-bg: rgba(34,211,238,0.1); --cyan-border: rgba(34,211,238,0.25);
            --radius: 14px; --radius-sm: 10px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overscroll-behavior: none; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        button { font-family: inherit; border: none; cursor: pointer; -webkit-user-select: none; user-select: none; transition: transform 0.1s; }
        button:active { transform: scale(0.96); }
        input { font-family: inherit; }

        /* ===== SCREENS ===== */
        .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .screen.active { display: flex; }

        /* ===== HEADER ===== */
        .app-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); box-shadow: var(--shadow-sm); }
        .app-header h1 { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
        .hdr-btn { background: var(--surface-2); color: var(--text-2); padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
        .sync-dot.offline { background: var(--red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }

        /* ===== BIN NAVIGATION ===== */
        .bin-nav-cluster { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-arrow { background: var(--surface-3); color: var(--text); width: 36px; height: 36px; border-radius: 8px; font-size: 18px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .nav-arrow:disabled { opacity: 0.3; pointer-events: none; }

        /* ===== HU CARDS ===== */
        .scroll-area { flex: 1; overflow-y: auto; padding: 16px 16px 200px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .hu-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 10px; transition: all 0.25s; box-shadow: var(--shadow-sm); }
        .hu-card.ok { border-color: var(--green-border); background: var(--green-bg); }
        .hu-card.missing { border-color: var(--red-border); background: var(--red-bg); opacity: 0.65; }
        .hu-card.movement { border-color: var(--purple-border); background: var(--purple-bg); }
        .hu-card.adjusted { border-color: var(--amber-border); background: var(--amber-bg); }

        .hu-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .hu-id { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-glow); padding: 4px 10px; border-radius: 6px; }
        .hu-status { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; border-radius: 6px; }
        
        .hu-meta { display: flex; gap: 16px; margin-bottom: 12px; }
        .hu-meta-label { font-size: 8px; font-weight: 700; text-transform: uppercase; color: var(--text-3); }
        .hu-meta-value { font-size: 14px; font-weight: 700; color: var(--text); }

        /* ===== QTY STEPPER ===== */
        .qty-row { display: flex; align-items: center; gap: 6px; background: var(--surface-2); border-radius: var(--radius-sm); padding: 8px; margin-bottom: 10px; }
        .qty-stepper { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--surface-3); color: var(--text); font-size: 20px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .qty-input { flex: 1; background: transparent; border: none; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: var(--accent); outline: none; }

        /* ===== BOTTOM BAR ===== */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px calc(env(safe-area-inset-bottom, 16px) + 12px); background: rgba(15,17,23,0.95); backdrop-filter: blur(24px); border-top: 1px solid var(--border); z-index: 50; display: flex; gap: 8px; }
        .primary-btn { flex: 1; padding: 18px 0; border-radius: var(--radius); font-size: 14px; font-weight: 800; text-transform: uppercase; background: var(--green); color: white; transition: background 0.2s; }
        .primary-btn:disabled { opacity: 0.7; pointer-events: none; }
        .secondary-btn { flex: 1; padding: 18px 0; border-radius: var(--radius); font-size: 14px; background: var(--surface-3); color: var(--text-2); font-weight: 800; }

        /* ===== HUB SPECIFICS ===== */
        .aisle-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 16px; }
        .aisle-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px 0; text-align: center; font-size: 24px; font-weight: 900; }
        .search-container { padding: 16px; position: relative; }
        .search-field { width: 100%; padding: 16px 16px 16px 44px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 30px; top: 34px; color: var(--text-3); }
        .bin-strip { display: flex; gap: 6px; overflow-x: auto; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .strip-dot { min-width: 50px; height: 32px; border-radius: 8px; background: var(--surface-2); color: var(--text-2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; }
        .strip-dot.active { background: var(--accent); color: white; }

        /* ===== TOAST ===== */
        .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 12px; font-size: 12px; font-weight: 700; z-index: 999; pointer-events: none; opacity: 0; transition: opacity .3s; }
        .toast.show { opacity: 1; }
        .toast.green { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,.25); }
        .toast.amber { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(251,191,36,.25); }
        .toast.red { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
        .toast.blue { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(91,154,255,.25); }
    </style>
</head>
<body>

<div id="toast" class="toast"><span id="toast-text"></span></div>

<div id="screen-setup" class="screen active">
    <div class="app-header">
        <a href="index.html" class="hdr-btn">← Home</a>
        <h1>Cycle Counter</h1>
        <div class="header-right">
            <div id="sync-dot" class="sync-dot"></div>
            <button class="hdr-btn" style="font-size:14px; padding:6px 10px;" onclick="NovusSettings.openModal()">⚙</button>
        </div>
    </div>
    <div class="scroll-area">
        
        <div style="padding: 16px 16px 0; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <div style="font-size:10px; font-weight:700; color:var(--text-3); text-transform:uppercase;">Auditor</div>
                <div id="name-display" style="font-weight:800; color:var(--accent);">Operator</div>
            </div>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="hub-search" class="search-field" placeholder="Scan Product, Bin, or type 'FRESH'...">
        </div>
        
        <div class="section-title" style="padding: 0 16px; font-size: 10px; font-weight: 800; color: var(--text-3); text-transform: uppercase;">Aisle Audit</div>
        <div class="aisle-grid" id="aisle-grid"></div>

        <div style="padding: 0 16px">
            <button onclick="initFreshMode()" style="width:100%; padding:20px; border-radius:var(--radius); background:linear-gradient(135deg, var(--amber), #b45309); color:white; font-weight:900; font-size:15px">START FRESH AUDIT</button>
        </div>
    </div>
</div>

<div id="screen-count" class="screen">
    <div class="app-header">
        <button onclick="switchScreen('setup')" class="hdr-btn">← Back</button>
        <div class="bin-nav-cluster">
            <button id="btn-prev" class="nav-arrow" onclick="prevBin()">←</button>
            <h1 id="count-title" class="mono" style="font-size: 16px; width: 65px; text-align: center;"></h1>
            <button id="btn-next-top" class="nav-arrow" onclick="nextBin()">→</button>
        </div>
        <div class="sync-dot"></div>
    </div>
    <div class="bin-strip" id="bin-strip"></div>
    <div class="scroll-area" id="hu-list">
        </div>
    <div class="bottom-bar">
        <button class="primary-btn" id="btn-next" onclick="nextBin()">Next Bin →</button>
    </div>
</div>

<div id="screen-fresh" class="screen">
    <div class="app-header">
        <button onclick="switchScreen('setup')" class="hdr-btn">← Back</button>
        <h1 id="fresh-title" style="color:var(--amber)">FRESH Tally</h1>
        <div class="sync-dot"></div>
    </div>
    <div class="search-container">
        <input type="text" id="fresh-scan-input" class="search-field" style="border-color:var(--amber)" placeholder="Scan any pallet...">
    </div>
    <div class="scroll-area" id="fresh-list" style="padding-top:0;">
        <div id="fresh-overview" style="padding-top:16px;"></div>
        <div id="fresh-detail" style="display:none; padding-top:16px;"></div>
    </div>
    <div class="bottom-bar">
        <button class="primary-btn" style="background:var(--amber)" onclick="submitFreshAudit()">Submit Fresh Audit</button>
    </div>
</div>

<script>
const NovusSettings = (() => {
  const STORAGE_KEY = 'novus_settings';
  const DEFAULTS = { userName: '', theme: 'dark', pollInterval: 10, hapticFeedback: true, compactMode: false };

  const LIGHT_VARS = {
    '--bg': '#f8f9fb', '--surface': '#ffffff', '--surface-2': '#f1f3f5', '--surface-3': '#e5e7eb',
    '--border': '#d1d5dc', '--text': '#111827', '--text-2': '#374151', '--text-3': '#6b7280',
    '--accent': '#2563eb', '--accent-dim': 'rgba(37,99,235,.07)',
    '--green': '#059669', '--green-bg': 'rgba(5,150,105,.08)', '--green-border': 'rgba(5,150,105,.25)',
    '--red': '#dc2626', '--red-bg': 'rgba(220,38,38,.07)', '--red-border': 'rgba(220,38,38,.25)',
    '--amber': '#b45309', '--amber-bg': 'rgba(180,83,9,.07)', '--amber-border': 'rgba(180,83,9,.25)',
    '--purple': '#7c3aed', '--purple-bg': 'rgba(124,58,237,.07)', '--purple-border': 'rgba(124,58,237,.25)',
    '--cyan': '#0e7490', '--cyan-bg': 'rgba(14,116,144,.07)', '--cyan-border': 'rgba(14,116,144,.25)'
  };

  const DARK_VARS = {
    '--bg': '#0f1117', '--surface': '#181a23', '--surface-2': '#1f2230', '--surface-3': '#2a2d3a',
    '--border': '#313546', '--text': '#eceef4', '--text-2': '#9ba1b5', '--text-3': '#6c7189',
    '--accent': '#5b9aff', '--accent-dim': 'rgba(91,154,255,.1)',
    '--green': '#34d399', '--green-bg': 'rgba(52,211,153,.1)', '--green-border': 'rgba(52,211,153,.25)',
    '--red': '#f87171', '--red-bg': 'rgba(248,113,113,.1)', '--red-border': 'rgba(248,113,113,.25)',
    '--amber': '#fbbf24', '--amber-bg': 'rgba(251,191,36,.1)', '--amber-border': 'rgba(251,191,36,.25)',
    '--purple': '#a78bfa', '--purple-bg': 'rgba(167,139,250,.1)', '--purple-border': 'rgba(167,139,250,.25)',
    '--cyan': '#22d3ee', '--cyan-bg': 'rgba(34,211,238,.1)', '--cyan-border': 'rgba(34,211,238,.25)'
  };

  function loadAll() {
    try { const r = localStorage.getItem(STORAGE_KEY); return r ? { ...DEFAULTS, ...JSON.parse(r) } : { ...DEFAULTS }; }
    catch { return { ...DEFAULTS }; }
  }
  function saveAll(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

  let _cache = loadAll();
  const legacyName = localStorage.getItem('novus_name');
  if (legacyName && !_cache.userName) { _cache.userName = legacyName; saveAll(_cache); }

  function get(key) { return _cache[key] !== undefined ? _cache[key] : DEFAULTS[key]; }
  function set(key, val) {
    _cache[key] = val; saveAll(_cache);
    if (key === 'userName') {
        localStorage.setItem('novus_name', val);
        const disp = document.getElementById('name-display');
        if(disp) disp.innerText = val || 'Operator';
    }
    if (key === 'theme') applyTheme();
  }
  function getUser() { return get('userName') || 'Operator'; }
  function applyTheme() {
    const vars = get('theme') === 'light' ? LIGHT_VARS : DARK_VARS;
    Object.entries(vars).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
    document.body.setAttribute('data-theme', get('theme'));
    
    const bb = document.querySelector('.bottom-bar');
    if (bb) bb.style.background = get('theme') === 'light' ? 'rgba(255,255,255,0.95)' : 'rgba(15,17,23,0.95)';
  }

  let _modalInjected = false;
  function _injectModal() {
    if (_modalInjected) return;
    _modalInjected = true;
    const overlay = document.createElement('div');
    overlay.id = 'novus-settings-overlay';
    overlay.innerHTML = `
      <div class="ns-modal">
        <div class="ns-header"><h3>⚙ Settings</h3><button class="ns-close" onclick="NovusSettings.closeModal()">✕</button></div>
        <div class="ns-body">
          <div class="ns-section"><div class="ns-section-title">Identity</div>
            <label class="ns-field-label">Your Name / ID</label>
            <input type="text" class="ns-input" id="ns-username" placeholder="Enter your name...">
            <div class="ns-hint">Attached to all audit payloads and reports</div></div>
          <div class="ns-section"><div class="ns-section-title">Appearance</div>
            <div class="ns-toggle-row"><div><div class="ns-toggle-label">Theme</div><div class="ns-hint" style="margin-top:2px">Dark or light mode</div></div>
              <div class="ns-theme-switch" id="ns-theme-switch" onclick="NovusSettings._toggleTheme()">
                <span class="ns-switch-option" data-val="dark">🌙 Dark</span>
                <span class="ns-switch-option" data-val="light">☀️ Light</span>
                <div class="ns-switch-slider" id="ns-switch-slider"></div></div></div></div>
        </div>
        <div class="ns-footer"><button class="ns-save-btn" onclick="NovusSettings._save()">Save & Close</button></div>
      </div>`;
    document.body.appendChild(overlay);
    const style = document.createElement('style');
    style.textContent = `
      #novus-settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:9999;align-items:center;justify-content:center;padding:20px}
      #novus-settings-overlay.open{display:flex}
      .ns-modal{background:var(--surface);width:100%;max-width:480px;border-radius:16px;border:1.5px solid var(--border);display:flex;flex-direction:column;max-height:90vh;overflow:hidden}
      .ns-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
      .ns-header h3{font-size:16px;font-weight:800;color:var(--text)}
      .ns-close{background:none;border:none;color:var(--text-3);font-size:18px;font-weight:900;cursor:pointer}
      .ns-body{padding:0;overflow-y:auto;flex:1}
      .ns-section{padding:16px 20px;border-bottom:1px solid var(--border)}.ns-section:last-child{border-bottom:none}
      .ns-section-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:12px}
      .ns-field-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3);display:block;margin-bottom:6px}
      .ns-input{width:100%;padding:12px 14px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;color:var(--text);outline:none;font-family:inherit}
      .ns-input:focus{border-color:var(--accent)}
      .ns-hint{font-size:9px;color:var(--text-3);margin-top:4px}
      .ns-toggle-row{display:flex;justify-content:space-between;align-items:center}
      .ns-toggle-label{font-size:12px;font-weight:700;color:var(--text)}
      .ns-theme-switch{display:flex;position:relative;background:var(--surface-2);border-radius:8px;border:1px solid var(--border);overflow:hidden;cursor:pointer;user-select:none}
      .ns-switch-option{padding:6px 14px;font-size:10px;font-weight:800;color:var(--text-3);position:relative;z-index:2;transition:color .2s}
      .ns-switch-option.active{color:#fff}
      .ns-switch-slider{position:absolute;top:2px;left:2px;width:calc(50% - 2px);height:calc(100% - 4px);background:var(--accent);border-radius:6px;transition:transform .2s ease;z-index:1}
      .ns-switch-slider.right{transform:translateX(100%)}
      .ns-footer{padding:12px 20px;border-top:1px solid var(--border)}
      .ns-save-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}`;
    document.body.appendChild(style);
  }

  function openModal() {
    _injectModal();
    document.getElementById('novus-settings-overlay').classList.add('open');
    document.getElementById('ns-username').value = get('userName');
    _updateThemeSwitch();
  }
  function closeModal() { const o = document.getElementById('novus-settings-overlay'); if (o) o.classList.remove('open'); }
  function _updateThemeSwitch() {
    const s = document.getElementById('ns-switch-slider'); const opts = document.querySelectorAll('.ns-switch-option');
    if (!s) return; s.classList.toggle('right', get('theme') === 'light');
    opts.forEach(o => o.classList.toggle('active', o.dataset.val === get('theme')));
  }
  function _toggleTheme() { set('theme', get('theme') === 'dark' ? 'light' : 'dark'); _updateThemeSwitch(); }
  function _save() {
    set('userName', document.getElementById('ns-username').value.trim());
    closeModal(); 
    if(typeof showToast === 'function') showToast('Settings saved', 'green');
  }

  applyTheme();
  return { get, set, getUser, applyTheme, openModal, closeModal, _toggleTheme, _save };
})();
</script>

<script>
    const FRESH_PRODUCTS = ["3305704","3307506","3307509","3307515","3307518","3307525","3307710","3308356","3309009","3309016","3309017","3309019","3309138","3309139"];
    const API_URL = 'https://script.google.com/macros/s/AKfycbwZ1Dhmf6cK_hWV2xLKYmwEImUvifIRCPqVm0Fz4E7gjvfcpyzoqhAFIgvgwrjBretc/exec';
    
    // Generate a unique session ID for idempotency checks on the backend
    const SESSION_ID = 'sess_' + Math.random().toString(36).substr(2, 9);
    
    let sapMaster = [];
    let sessionRegistry = new Map(); 
    let currentAisle = "";
    let currentBinIdx = 0;
    let currentBins = [];
    let activeFreshProduct = null;

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('name-display').innerText = NovusSettings.getUser();
        renderAisleGrid();
        pullSAPData();

        document.getElementById('hub-search').addEventListener('keypress', e => {
            if(e.key === 'Enter') { handleGateway(e.target.value.trim().toUpperCase()); e.target.value = ''; }
        });
        document.getElementById('fresh-scan-input').addEventListener('keypress', e => {
            if(e.key === 'Enter') { processFreshScan(e.target.value.trim().toUpperCase()); e.target.value = ''; }
        });
    });

    function handleGateway(input) {
        if (!input) return;
        if (input === 'FRESH') return initFreshMode();
        if (input.match(/^W[A-P][0-9]{2}[A-C]$/)) return startAisleAudit(input.charAt(1), input);
        showToast("Use Aisle Grid for structured counts", "amber");
    }

    function startAisleAudit(aisle, targetBin = null) {
        currentAisle = aisle;
        currentBins = [];
        const max = (aisle === 'B' || aisle === 'C') ? 25 : 38;
        for(let i=0; i<=max; i++) {
            const num = String(i).padStart(2, '0');
            ["A","B","C"].forEach(s => currentBins.push(`W${aisle}${num}${s}`));
        }
        currentBinIdx = targetBin ? currentBins.indexOf(targetBin) : 0;
        switchScreen('count');
        updateBinView();
    }

    // ==========================================
    // CENTRALIZED CARD TEMPLATE
    // ==========================================
    function createHUCard(item) {
        const reg = sessionRegistry.get(item.hu);
        const movedElsewhere = !reg && Array.from(sessionRegistry.values()).find(r => r.hu === item.hu && r.status === 'MOVEMENT');
        const statusLabel = reg ? reg.status : (movedElsewhere ? 'MOVED' : 'PENDING');
        const statusClass = reg ? reg.status.toLowerCase() : (movedElsewhere ? 'move' : 'pending');
        const currentQty = reg ? reg.scanQty : item.sapQty;
        const isAdj = currentQty !== item.sapQty;

        // Display Expected Bin prominently in Fresh mode
        const isFresh = document.getElementById('screen-fresh').classList.contains('active');

        return `
            <div class="hu-card ${reg ? reg.status.toLowerCase() : ''}">
                <div class="hu-header">
                    <span class="hu-id">${item.hu}</span>
                    <span class="hu-status ${statusClass}">${statusLabel}</span>
                </div>
                <div class="hu-meta" style="margin-bottom:8px;">
                    <div style="flex:2">
                        <div class="hu-meta-label">Product</div>
                        <div class="hu-meta-value">${item.product}</div>
                        <div style="font-size:10px; color:var(--text-2); margin-top:2px; line-height:1.3;">${item.desc || ''}</div>
                    </div>
                    ${isFresh ? `
                    <div style="flex:1">
                        <div class="hu-meta-label">Expected Bin</div>
                        <div class="hu-meta-value mono" style="font-size:13px; color:var(--accent)">${item.sapBin}</div>
                    </div>` : `
                    <div style="flex:1">
                        <div class="hu-meta-label">SAP Qty</div>
                        <div class="hu-meta-value mono">${item.sapQty}</div>
                    </div>`}
                </div>
                ${movedElsewhere ? `<div style="font-size:11px; color:var(--purple); font-weight:700; margin-bottom:12px">📍 Found earlier in ${movedElsewhere.foundIn}</div>` : ''}
                ${reg && reg.note ? `<div style="font-size:12px; padding:8px; background:var(--surface-3); border-radius:6px; margin-bottom:12px; font-style:italic;">💬 ${reg.note}</div>` : ''}
                <div class="qty-row">
                    <button class="qty-stepper" onclick="adjQty('${item.hu}', -1)">−</button>
                    <input type="number" class="qty-input qty-val-${item.hu}" value="${currentQty}" onchange="setQty('${item.hu}', this.value)">
                    <button class="qty-stepper" onclick="adjQty('${item.hu}', 1)">+</button>
                </div>
                <div style="display:flex; gap:6px; flex-wrap:wrap;">
                    <button class="primary-btn" style="flex:2; padding:12px; font-size:13px; background:${isAdj ? 'var(--amber)' : 'var(--green)'}" onclick="confirmItem('${item.hu}')">
                        ${isAdj ? 'Confirm Adj' : 'Confirm'}
                    </button>
                    <button class="secondary-btn" style="flex:1; padding:12px; font-size:12px; color:var(--purple)" onclick="initiateMovement('${item.hu}')">Move</button>
                    <button class="secondary-btn" style="flex:1; padding:12px; font-size:12px" onclick="addNote('${item.hu}')">Note</button>
                    <button class="secondary-btn" style="flex:1; padding:12px; font-size:12px; color:var(--red)" onclick="markMissing('${item.hu}')">Miss</button>
                </div>
            </div>
        `;
    }

    // ==========================================
    // DATA CONTROLLER LOGIC
    // ==========================================
    function saveToRegistry(hu, updates) {
        const sap = sapMaster.find(i => i.hu === hu);
        const isFresh = document.getElementById('screen-fresh').classList.contains('active');
        
        // If in Fresh mode, default the bin to where SAP expects it unless moved
        const currentBin = isFresh ? sap.sapBin : currentBins[currentBinIdx];
        
        const current = sessionRegistry.get(hu) || { 
            ...sap, scanQty: sap.sapQty, scanBin: currentBin, foundIn: currentBin, note: '', type: 'ok', status: 'PENDING' 
        };
        
        const merged = { ...current, ...updates };
        
        if (merged.status === 'MISSING' || merged.scanQty === 0) {
            merged.type = 'miss'; merged.status = 'MISSING'; merged.scanQty = 0;
        } else {
            const isMoved = merged.scanBin !== merged.sapBin;
            const isAdj = merged.scanQty !== merged.sapQty;
            if (isMoved && isAdj) { merged.type = 'move_adj'; merged.status = 'MOVEMENT'; }
            else if (isMoved) { merged.type = 'move'; merged.status = 'MOVEMENT'; }
            else if (isAdj) { merged.type = 'adj'; merged.status = 'ADJUSTED'; }
            else { merged.type = 'ok'; merged.status = 'OK'; }
        }
        
        sessionRegistry.set(hu, merged);
        
        // Re-render the appropriate view
        if (isFresh) {
            if (activeFreshProduct) showFreshDetail(activeFreshProduct);
            updateFreshOverview();
        } else {
            renderHUList();
        }
    }

    function confirmItem(hu) { 
        const inputEl = document.querySelector(`.active .qty-val-${hu}`);
        const val = parseInt(inputEl.value, 10) || 0;
        const isFresh = document.getElementById('screen-fresh').classList.contains('active');
        const sap = sapMaster.find(i => i.hu === hu);
        const scanBin = isFresh ? sap.sapBin : currentBins[currentBinIdx];
        
        saveToRegistry(hu, { scanQty: val, scanBin: scanBin }); 
    }
    
    function adjQty(hu, delta) { 
        const cur = sessionRegistry.get(hu); 
        const sap = sapMaster.find(i => i.hu === hu);
        saveToRegistry(hu, { scanQty: Math.max(0, (cur ? cur.scanQty : sap.sapQty) + delta) }); 
    }
    
    function setQty(hu, val) { 
        saveToRegistry(hu, { scanQty: parseInt(val, 10) || 0 }); 
    }
    
    function markMissing(hu) { 
        saveToRegistry(hu, { status: 'MISSING' }); 
    }
    
    function addNote(hu) { 
        const note = prompt("Enter note:", sessionRegistry.get(hu)?.note || ''); 
        if (note !== null) saveToRegistry(hu, { note: note.trim() }); 
    }
    
    function initiateMovement(hu) {
        const sap = sapMaster.find(i => i.hu === hu);
        const dest = prompt(`Transfer HU ${hu}\nExpected: ${sap.sapBin}\nEnter new bin:`, sessionRegistry.get(hu)?.scanBin || sap.sapBin);
        if (dest && dest.trim() !== '') { 
            saveToRegistry(hu, { scanBin: dest.trim().toUpperCase() }); 
            showToast(`Routed to ${dest.trim().toUpperCase()}`, "purple"); 
        }
    }

    // ==========================================
    // AISLE AUDIT RENDERING
    // ==========================================
    function renderHUList() {
        const container = document.getElementById('hu-list');
        const bin = currentBins[currentBinIdx];
        container.innerHTML = '';
        document.getElementById('count-title').innerText = bin;

        const expected = sapMaster.filter(i => i.sapBin === bin);
        const movementsHere = Array.from(sessionRegistry.values()).filter(i => i.foundIn === bin && i.sapBin !== bin);

        const allItems = [...expected];
        movementsHere.forEach(m => { if(!allItems.find(i => i.hu === m.hu)) allItems.push(m); });

        allItems.forEach(item => {
            container.innerHTML += createHUCard(item);
        });
    }

    // ==========================================
    // FRESH AUDIT RENDERING & LOGIC
    // ==========================================
    function initFreshMode() {
        document.getElementById('fresh-detail').style.display = 'none';
        document.getElementById('fresh-overview').style.display = 'block';
        activeFreshProduct = null;
        updateFreshOverview();
        switchScreen('fresh');
    }

    function updateFreshOverview() {
        const overview = document.getElementById('fresh-overview');
        overview.innerHTML = '';
        
        FRESH_PRODUCTS.forEach(prod => {
            const sapItem = sapMaster.find(i => i.product === prod);
            const desc = sapItem ? sapItem.desc : "Product description unavailable";
            const expectedHUs = sapMaster.filter(i => i.product === prod);
            
            let totalFound = 0;
            expectedHUs.forEach(huItem => {
                const reg = sessionRegistry.get(huItem.hu);
                if (reg && reg.scanQty > 0) totalFound++;
            });

            const card = document.createElement('div');
            card.className = 'hu-card'; 
            card.style.cursor = 'pointer';
            
            if (totalFound === expectedHUs.length && expectedHUs.length > 0) {
                card.style.borderColor = 'var(--green)';
            } else if (totalFound > 0) {
                card.style.borderColor = 'var(--amber)';
            }
            
            card.onclick = () => showFreshDetail(prod);
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start">
                    <div style="flex:1; padding-right:12px;">
                        <div class="hu-meta-label">Product</div>
                        <div style="font-size:20px; font-weight:900">${prod}</div>
                        <div style="font-size:11px; color:var(--text-2); margin-top:4px; line-height:1.3;">${desc}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:32px; font-weight:900; color:${totalFound === expectedHUs.length && expectedHUs.length > 0 ? 'var(--green)' : 'var(--amber)'}">
                            ${totalFound} <span style="font-size:16px; color:var(--text-3)">/ ${expectedHUs.length}</span>
                        </div>
                        <div class="hu-meta-label">Pallets Found</div>
                    </div>
                </div>
            `;
            overview.appendChild(card);
        });
    }

    function showFreshDetail(product) {
        activeFreshProduct = product;
        document.getElementById('fresh-overview').style.display = 'none';
        const detail = document.getElementById('fresh-detail');
        detail.style.display = 'block';
        
        const sapItem = sapMaster.find(i => i.product === product);
        const desc = sapItem ? sapItem.desc : "";
        const expectedHUs = sapMaster.filter(i => i.product === product);
        
        let html = `
            <button onclick="initFreshMode()" class="hdr-btn" style="padding: 8px 16px; margin-bottom: 16px; width: auto; font-size: 12px; display:inline-flex;">← Back to Products</button>
            <div style="margin-bottom: 16px;">
                <div style="font-size: 22px; font-weight: 900; color: var(--accent);">${product}</div>
                <div style="font-size: 13px; color: var(--text-2); margin-top:2px;">${desc}</div>
                <div style="font-size: 11px; color: var(--text-3); margin-top:6px; font-weight:700;">Expected Pallets: ${expectedHUs.length}</div>
            </div>
        `;
        
        if(expectedHUs.length === 0) {
            html += `<div style="text-align:center; padding: 20px; color: var(--text-3);">No pallets expected in SAP for this Product.</div>`;
        } else {
            expectedHUs.forEach(item => {
                html += createHUCard(item);
            });
        }
        detail.innerHTML = html;
    }

    function processFreshScan(input) {
        const sap = sapMaster.find(i => i.hu === input);
        if (sap && FRESH_PRODUCTS.includes(sap.product)) {
            
            // Auto-confirm the scanned pallet in its expected bin
            sessionRegistry.set(input, { 
                ...sap, scanQty: sap.sapQty, status: 'OK', type: 'ok', scanBin: sap.sapBin, foundIn: sap.sapBin 
            });
            showToast(`Found Pallet ${input}`, "green");
            
            // Route user to the detail view for that product
            if (activeFreshProduct !== sap.product) {
                showFreshDetail(sap.product);
            } else {
                showFreshDetail(sap.product); // Re-render to show updated state
            }
            
            updateFreshOverview();
            if(NovusSettings.get('hapticFeedback') && navigator.vibrate) navigator.vibrate(50);
            
        } else { 
            showToast("Scan a specific Pallet (HU) from the FRESH list", "red"); 
            if(navigator.vibrate) navigator.vibrate([100,50,100]); 
        }
    }

    // ==========================================
    // UTILS & NAVIGATION
    // ==========================================
    function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(`screen-${id}`).classList.add('active'); }
    function renderBinStrip() {
        const strip = document.getElementById('bin-strip');
        strip.innerHTML = '';
        const start = Math.max(0, currentBinIdx - 2);
        const end = Math.min(currentBins.length, start + 10);
        for(let i=start; i<end; i++) {
            const dot = document.createElement('div');
            dot.className = `strip-dot ${i === currentBinIdx ? 'active' : ''}`;
            dot.innerText = currentBins[i].slice(-3);
            dot.onclick = () => { currentBinIdx = i; updateBinView(); };
            strip.appendChild(dot);
        }
    }

    function prevBin() { if(currentBinIdx > 0) { currentBinIdx--; updateBinView(); } }
    
    function updateBinView() {
        renderHUList(); renderBinStrip();
        const pBtn = document.getElementById('btn-prev'), nTop = document.getElementById('btn-next-top'), nBot = document.getElementById('btn-next');
        if(pBtn) pBtn.disabled = currentBinIdx === 0;
        if(nTop) nTop.disabled = currentBinIdx === currentBins.length - 1;
        if(nBot) {
            if (currentBinIdx === currentBins.length - 1) { nBot.innerText = "Finish Aisle ✓"; nBot.style.background = "var(--purple)"; } 
            else { nBot.innerText = "Next Bin →"; nBot.style.background = "var(--green)"; }
        }
    }

    function showToast(msg, color) {
        const t = document.getElementById('toast');
        document.getElementById('toast-text').innerText = msg;
        t.className = `toast ${color} show`;
        setTimeout(() => t.classList.remove('show'), 2000);
    }
    window.toast = showToast; 

    async function pullSAPData() {
        try {
            const res = await fetch(API_URL + '?type=sapdata');
            const data = await res.json();
            sapMaster = data.sapData;
            document.querySelectorAll('.sync-dot').forEach(d => d.classList.remove('offline'));
        } catch(e) { document.querySelectorAll('.sync-dot').forEach(d => d.classList.add('offline')); }
    }

    function renderAisleGrid() {
        const grid = document.getElementById('aisle-grid');
        "ABCDEFGHJKLMNP".split("").forEach(l => {
            const btn = document.createElement('div');
            btn.className = 'aisle-btn'; btn.innerText = l;
            btn.onclick = () => startAisleAudit(l);
            grid.appendChild(btn);
        });
    }

    // ==========================================
    // AUTO-SYNC LOGIC
    // ==========================================
    async function syncBinData(binName, isFresh = false) {
        let itemsToSync = [];
        
        if (isFresh) {
            itemsToSync = Array.from(sessionRegistry.values());
            if (itemsToSync.length === 0) {
                showToast("No counts to submit", "amber");
                return false;
            }
        } else {
            // Auto-confirm any expected items the auditor didn't touch (Implicit OK)
            const expected = sapMaster.filter(i => i.sapBin === binName);
            expected.forEach(sap => {
                if (!sessionRegistry.has(sap.hu)) {
                    sessionRegistry.set(sap.hu, { 
                        ...sap, scanQty: sap.sapQty, scanBin: binName, foundIn: binName, note: '', type: 'ok', status: 'OK' 
                    });
                }
            });

            // Gather all items evaluated for this specific bin
            itemsToSync = Array.from(sessionRegistry.values()).filter(r => r.foundIn === binName || r.sapBin === binName);
            if (itemsToSync.length === 0) return true; // Empty bin, nothing to do
        }

        const itemsToLog = itemsToSync.map(record => ({
            hu: record.hu,
            product: record.product,
            desc: record.desc,
            batch: record.batch,
            sapBin: record.sapBin,
            sapQty: record.sapQty,
            countQty: record.scanQty,
            type: record.type,
            note: record.note
        }));

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                redirect: 'follow',
                body: JSON.stringify({
                    action: 'logAudit',
                    user: NovusSettings.getUser(),
                    bin: binName,
                    sessionId: SESSION_ID,
                    items: itemsToLog
                })
            });
            
            const result = await res.json();
            
            if (result.success || result.skipped) {
                if (isFresh) sessionRegistry.clear();
                return true;
            } else {
                showToast("Server error: " + (result.error || "Unknown"), "red");
                return false;
            }
        } catch (err) {
            showToast("Network Error: Could not reach server", "red");
            return false;
        }
    }

    async function nextBin() { 
        const btn = document.getElementById('btn-next');
        const origText = btn.innerText;
        const origBg = btn.style.background;
        
        // Lock UI during sync
        btn.disabled = true;
        btn.innerText = "Syncing...";
        btn.style.background = "var(--text-3)"; 

        const currentBin = currentBins[currentBinIdx];
        const success = await syncBinData(currentBin, false);
        
        // Unlock UI
        btn.disabled = false;
        btn.innerText = origText;
        btn.style.background = origBg;

        if (success) {
            if(currentBinIdx < currentBins.length - 1) { 
                currentBinIdx++; 
                updateBinView(); 
            } else {
                showToast("Aisle Complete ✓", "green");
                switchScreen('setup');
            }
        }
    }

    async function submitFreshAudit() {
        const btn = document.querySelector('#screen-fresh .primary-btn');
        const origText = btn.innerText;
        
        btn.disabled = true;
        btn.innerText = "Syncing...";

        const success = await syncBinData("FRESH", true);
        
        btn.disabled = false;
        btn.innerText = origText;

        if (success) {
            showToast("Fresh Audit Complete", "green");
            switchScreen('setup');
            hideFreshDetail();
            initFreshMode(); 
        }
    }
</script>
