<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Novus Ops — Cycle Counter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#181a23;--surface-2:#1f2230;--surface-3:#2a2d3a;--border:#313546;--text:#eceef4;--text-2:#9ba1b5;--text-3:#6c7189;--accent:#5b9aff;--accent-dim:rgba(91,154,255,.1);--green:#34d399;--green-bg:rgba(52,211,153,.1);--red:#f87171;--red-bg:rgba(248,113,113,.1);--amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);--purple:#a78bfa;--purple-bg:rgba(167,139,250,.1);--radius:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}
button{cursor:pointer;border:none;font-family:inherit;transition:transform .1s}
button:active{transform:scale(.97)}

/* View Management */
.view{display:none;flex-direction:column;height:100dvh}
.view.active{display:flex}

/* Header */
.header{padding:16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.header h1{font-size:18px;font-weight:900;letter-spacing:-0.5px}

/* Search Area */
.search-container{position:relative;margin-bottom:20px; padding:0 16px}
.search-input{width:100%;padding:16px 16px 16px 48px;border-radius:14px;border:2px solid var(--border);background:var(--surface-2);color:#fff;font-size:16px;outline:none}
.search-input:focus{border-color:var(--accent)}

/* Aisle Grid */
.aisle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 16px 20px}
.aisle-btn{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:20px 0;text-align:center}
.aisle-btn .letter{font-size:24px;font-weight:900;color:var(--text);display:block}

/* Audit Cards */
.audit-scroll{flex:1;overflow-y:auto;padding:16px}
.hu-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;flex-direction:column;gap:12px}
.hu-card.ok{border-color:var(--green);background:var(--green-bg)}
.hu-card.missing{border-color:var(--red);background:var(--red-bg)}
.hu-card.movement{border-color:var(--purple);background:var(--purple-bg)}

.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.hu-info .hu-num{font-family:'JetBrains Mono';font-size:16px;font-weight:800;color:var(--accent)}
.hu-info .sku-num{font-size:12px;color:var(--text-2);font-weight:700}

.qty-control{display:flex;align-items:center;gap:10px;background:var(--surface-2);padding:8px;border-radius:10px;width:fit-content}
.qty-btn{width:32px;height:32px;border-radius:6px;background:var(--surface-3);color:#fff;font-size:18px;font-weight:900}
.qty-val{font-family:'JetBrains Mono';font-size:18px;font-weight:700;min-width:40px;text-align:center}

.card-actions{display:flex;gap:8px}
.act-btn{flex:1;padding:12px;border-radius:10px;font-size:11px;font-weight:800;text-transform:uppercase}
.btn-confirm{background:var(--green);color:#000}
.btn-miss{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.btn-note{background:var(--surface-3);color:var(--text-2)}

/* FRESH Mode */
.fresh-tally-list{display:flex;flex-direction:column;gap:12px;padding:16px}
.fresh-sku-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:16px;display:flex;justify-content:space-between;align-items:center}
.tally-count{font-family:'JetBrains Mono';font-size:32px;font-weight:900;color:var(--amber)}

/* Navigation Strip */
.bin-strip{display:flex;gap:6px;overflow-x:auto;padding:12px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);scrollbar-width:none}
.strip-dot{min-width:50px;height:32px;border-radius:8px;background:var(--surface-3);color:var(--text-2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.strip-dot.active{background:var(--accent);color:#fff; border: 2px solid #fff}

.footer{padding:16px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px}
.footer-btn{padding:16px;border-radius:12px;font-size:13px;font-weight:800;text-transform:uppercase}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;background:var(--accent);color:#000;font-weight:800;z-index:9999;display:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--surface);padding:30px;border-radius:20px;width:100%;max-width:400px;text-align:center;border:2px solid var(--accent)}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- HUB VIEW -->
<div id="view-hub" class="view active">
    <header class="header">
        <h1>Novus Ops</h1>
        <div style="font-size:10px; color:var(--text-3)">PLANT 1730</div>
    </header>
    <div class="hub-content" style="flex:1; overflow-y:auto; padding-top:20px">
        <div class="search-container">
            <input type="text" id="hub-search" class="search-input" placeholder="Scan SKU, HU, or type 'FRESH'...">
        </div>
        <h3 style="padding:0 16px; font-size:11px; color:var(--text-dim); text-transform:uppercase; margin-bottom:10px">Aisle Audit</h3>
        <div class="aisle-grid" id="aisle-grid"></div>
        <div style="padding:0 16px">
            <button onclick="initFreshMode()" style="width:100%; padding:20px; border-radius:14px; background:linear-gradient(135deg, var(--amber), #d97706); font-weight:900; color:#000">START FRESH AUDIT</button>
        </div>
    </div>
</div>

<!-- AUDIT VIEW -->
<div id="view-audit" class="view">
    <header class="header">
        <button onclick="showView('hub')" style="background:none; color:var(--accent); font-weight:800">← EXIT</button>
        <h1 id="audit-title" onclick="manualJump()">Audit</h1>
        <div id="audit-meta" style="font-size:10px; background:var(--accent-dim); color:var(--accent); padding:4px 8px; border-radius:10px"></div>
    </header>
    <div class="bin-strip" id="bin-strip"></div>
    <main class="audit-scroll" id="audit-list"></main>
    <footer class="footer">
        <button class="footer-btn" style="flex:1; background:var(--surface-3); color:#fff" onclick="prevBin()">PREV</button>
        <button class="footer-btn" style="flex:3; background:var(--green); color:#000" onclick="submitAndNext()">SUBMIT & NEXT →</button>
    </footer>
</div>

<!-- FRESH VIEW -->
<div id="view-fresh" class="view">
    <header class="header">
        <button onclick="showView('hub')" style="background:none; color:var(--amber); font-weight:800">← EXIT</button>
        <h1 style="color:var(--amber)">FRESH Tally</h1>
        <div></div>
    </header>
    <div class="search-container" style="margin-top:15px">
        <input type="text" id="fresh-scan-input" class="search-input" style="border-color:var(--amber)" placeholder="Scan any FRESH Pallet...">
    </div>
    <div class="fresh-tally-list" id="fresh-list"></div>
    <footer class="footer">
        <button class="footer-btn" style="width:100%; background:var(--amber); color:#000" onclick="finalizeFresh()">SUBMIT FRESH AUDIT</button>
    </footer>
</div>

<!-- GHOST MODAL -->
<div id="modal-ghost" class="modal-overlay">
    <div class="modal">
        <div style="font-size:40px">👻</div>
        <h2 style="margin:10px 0">Ghost Item</h2>
        <p style="color:var(--text-2); font-size:14px; margin-bottom:20px">HU <span id="ghost-hu" style="color:var(--accent); font-weight:800"></span> is not in SAP. Cycle count recommended.</p>
        <div style="display:flex; gap:10px">
            <button class="act-btn btn-note" onclick="closeModal()">DISMISS</button>
            <button class="act-btn btn-confirm" onclick="pivotToProductAudit()">START PRODUCT AUDIT</button>
        </div>
    </div>
</div>

<script>
/**
 * NOVUS OPS RECONCILIATION ENGINE
 */
const API_URL = 'https://script.google.com/macros/s/AKfycbwZ1Dhmf6cK_hWV2xLKYmwEImUvifIRCPqVm0Fz4E7gjvfcpyzoqhAFIgvgwrjBretc/exec';
const FRESH_SKUS = ["3305704","3307506","3307509","3307515","3307518","3307525","3307710","3308356","3309009","3309016","3309017","3309019","3309138","3309139"];

let sapMaster = [];
let sessionRegistry = new Map(); // Global State (HU -> RegistryRecord)
let currentMode = 'HUB';
let currentAisle = "";
let currentBinIdx = 0;
let currentBins = [];
let activeGhostHU = "";

document.addEventListener('DOMContentLoaded', () => {
    initAisleGrid();
    pullSAPData();
    
    // Command Bar
    document.getElementById('hub-search').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const val = e.target.value.trim().toUpperCase();
            if(val === 'FRESH') initFreshMode();
            else handleGlobalSearch(val);
            e.target.value = '';
        }
    });

    // Fresh Mode Scanner
    document.getElementById('fresh-scan-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            handleFreshScan(e.target.value.trim());
            e.target.value = '';
        }
    });
});

/**
 * 1. RECONCILIATION & CONFLICT RESOLUTION
 */
function handleGlobalSearch(input) {
    const huMatch = sapMaster.find(i => i.hu === input);
    if (huMatch) {
        initProductAudit(huMatch.product);
        return;
    }
    const skuMatch = sapMaster.filter(i => i.product === input);
    if (skuMatch.length > 0) {
        initProductAudit(input);
        return;
    }
    if (input.match(/^W[A-P][0-9]{2}[A-C]$/)) {
        startAisleAudit(input.charAt(1), input);
        return;
    }
    showToast("No SAP Match Found", "red");
}

function processScan(hu, bin) {
    const sapMatch = sapMaster.find(i => i.hu === hu);
    if (!sapMatch) {
        activeGhostHU = hu;
        showGhostModal(hu);
        return;
    }

    const isOk = sapMatch.sapBin === bin;
    const status = isOk ? 'OK' : 'MOVEMENT';

    // Conflict Resolution: If found in Bin A, it's MOVEMENT.
    // When we reach expected Bin B, this registry entry prevents a MISSING log.
    sessionRegistry.set(hu, {
        ...sapMatch,
        status: status,
        scanQty: sapMatch.sapQty,
        foundIn: bin,
        note: status === 'MOVEMENT' ? `Found in ${bin} (Expected ${sapMatch.sapBin})` : ''
    });

    notify(status === 'OK' ? "Verified" : "Movement Logged");
    renderAuditList();
    renderBinStrip();
}

/**
 * 2. AUDIT MODES
 */
function startAisleAudit(aisle, targetBin = null) {
    currentMode = 'AISLE';
    currentAisle = aisle;
    currentBins = [];
    for(let i=0; i<=38; i++) {
        const num = String(i).padStart(2, '0');
        ["A","B","C"].forEach(s => currentBins.push(`W${aisle}${num}${s}`));
    }
    currentBinIdx = targetBin ? currentBins.indexOf(targetBin) : 0;
    showView('audit');
    renderAuditList();
    renderBinStrip();
}

function initProductAudit(sku) {
    currentMode = 'PRODUCT';
    currentAisle = `SKU: ${sku}`;
    currentBins = ["GLOBAL"]; 
    showView('audit');
    document.getElementById('bin-strip').innerHTML = '';
    renderAuditList(sku);
}

function initFreshMode() {
    currentMode = 'FRESH';
    const list = document.getElementById('fresh-list');
    list.innerHTML = '';
    FRESH_SKUS.forEach(sku => {
        const card = document.createElement('div');
        card.className = 'fresh-sku-card';
        card.innerHTML = `
            <div>
                <div style="font-size:10px; color:var(--text-3)">SKU</div>
                <div style="font-weight:800; font-size:18px; color:var(--accent)">${sku}</div>
            </div>
            <div class="tally-display">
                <div class="tally-count" id="tally-${sku}">0</div>
                <div style="font-size:9px; font-weight:700; color:var(--text-3)">PALLETS</div>
            </div>
        `;
        list.appendChild(card);
    });
    showView('fresh');
}

/**
 * 3. CARD RENDERING & ACTIONS
 */
function renderAuditList(filterSku = null) {
    const list = document.getElementById('audit-list');
    const bin = currentBins[currentBinIdx];
    list.innerHTML = '';

    document.getElementById('audit-title').innerText = currentMode === 'AISLE' ? bin : `SKU: ${filterSku}`;
    
    let displayItems = (currentMode === 'AISLE') ? sapMaster.filter(i => i.sapBin === bin) : sapMaster.filter(i => i.product === filterSku);
    
    // Merge Registry (Found here, but expected elsewhere)
    const movementsHere = Array.from(sessionRegistry.values()).filter(i => i.foundIn === bin && i.sapBin !== bin);
    const allItems = [...displayItems];
    movementsHere.forEach(m => { if(!allItems.find(i => i.hu === m.hu)) allItems.push(m); });

    allItems.forEach(item => {
        const reg = sessionRegistry.get(item.hu);
        // Overlap Rule: check if this item was found in another bin already
        const movedElsewhere = !reg && Array.from(sessionRegistry.values()).find(r => r.hu === item.hu && r.status === 'MOVEMENT');
        
        const card = document.createElement('div');
        card.className = `hu-card ${reg ? reg.status.toLowerCase() : ''}`;
        card.innerHTML = `
            <div class="card-top">
                <div class="hu-info">
                    <div class="hu-num">${item.hu}</div>
                    <div class="sku-num">${item.product}</div>
                    ${movedElsewhere ? `<div style="color:var(--purple); font-size:10px; font-weight:800">FOUND IN ${movedElsewhere.foundIn}</div>` : ''}
                </div>
                <div class="qty-control">
                    <button class="qty-btn" onclick="adjQty('${item.hu}', -1)">-</button>
                    <div class="qty-val">${reg ? reg.scanQty : item.sapQty}</div>
                    <button class="qty-btn" onclick="adjQty('${item.hu}', 1)">+</button>
                </div>
            </div>
            <div class="card-actions">
                <button class="act-btn btn-confirm" onclick="confirmItem('${item.hu}')">Confirm</button>
                <button class="act-btn btn-miss" onclick="missItem('${item.hu}')">Missing</button>
                <button class="act-btn btn-note" onclick="addNote('${item.hu}')">Note</button>
            </div>
        `;
        list.appendChild(card);
    });
}

function confirmItem(hu) {
    const item = sapMaster.find(i => i.hu === hu);
    const bin = currentBins[currentBinIdx];
    sessionRegistry.set(hu, { ...item, status: (item.sapBin === bin ? 'OK' : 'MOVEMENT'), scanQty: item.sapQty, foundIn: bin });
    renderAuditList();
}

function missItem(hu) {
    const item = sapMaster.find(i => i.hu === hu);
    sessionRegistry.set(hu, { ...item, status: 'MISSING', scanQty: 0 });
    renderAuditList();
}

function adjQty(hu, delta) {
    const item = sapMaster.find(i => i.hu === hu);
    const reg = sessionRegistry.get(hu) || { ...item, scanQty: item.sapQty };
    reg.scanQty = Math.max(0, reg.scanQty + delta);
    reg.status = (reg.scanQty === 0) ? 'MISSING' : (reg.sapBin === currentBins[currentBinIdx] ? 'OK' : 'MOVEMENT');
    sessionRegistry.set(hu, reg);
    renderAuditList();
}

function addNote(hu) {
    const note = prompt("Add note / movement info:");
    if (note) {
        const reg = sessionRegistry.get(hu) || { ...sapMaster.find(i => i.hu === hu), scanQty: sapMaster.find(i => i.hu === hu).sapQty };
        reg.note = note;
        sessionRegistry.set(hu, reg);
        renderAuditList();
    }
}

/**
 * 4. API SYNC
 */
async function submitAndNext() {
    const bin = currentBins[currentBinIdx];
    const itemsToLog = Array.from(sessionRegistry.values()).filter(i => i.foundIn === bin || (i.sapBin === bin && i.status === 'MISSING'));
    
    if (itemsToLog.length > 0) {
        const payload = {
            action: 'logAudit',
            user: localStorage.getItem('novus_name') || 'Counter',
            bin: bin,
            sessionId: 'S-' + new Date().getTime(),
            items: itemsToLog.map(i => ({
                hu: i.hu, product: i.product, sapBin: i.sapBin, sapQty: i.sapQty,
                countQty: i.scanQty, type: i.status === 'MISSING' ? 'miss' : i.status.toLowerCase(), note: i.note
            }))
        };
        
        notify("Syncing Bin...");
        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        } catch(e) { showToast("Offline - Saved Locally", "amber"); }
    }
    
    nextBin();
}

/**
 * UI NAVIGATION
 */
function nextBin() { if (currentBinIdx < currentBins.length - 1) { currentBinIdx++; renderAuditList(); renderBinStrip(); } }
function prevBin() { if (currentBinIdx > 0) { currentBinIdx--; renderAuditList(); renderBinStrip(); } }
function manualJump() {
    const target = prompt("Jump to Bin:").toUpperCase();
    if (currentBins.includes(target)) { currentBinIdx = currentBins.indexOf(target); renderAuditList(); renderBinStrip(); }
}

function renderBinStrip() {
    const strip = document.getElementById('bin-strip');
    strip.innerHTML = '';
    const start = Math.max(0, currentBinIdx - 4);
    const end = Math.min(currentBins.length, start + 10);
    for(let i=start; i<end; i++) {
        const dot = document.createElement('div');
        dot.className = `strip-dot ${i === currentBinIdx ? 'active' : ''}`;
        dot.innerText = currentBins[i].slice(-3);
        dot.onclick = () => { currentBinIdx = i; renderAuditList(); renderBinStrip(); };
        strip.appendChild(dot);
    }
}

function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(`view-${id}`).classList.add('active'); }
function initAisleGrid() {
    const grid = document.getElementById('aisle-grid');
    "ABCDEFGHJKLMNP".split("").forEach(l => {
        const btn = document.createElement('div');
        btn.className = 'aisle-btn';
        btn.onclick = () => startAisleAudit(l);
        btn.innerHTML = `<span class="letter">${l}</span>`;
        grid.appendChild(btn);
    });
}

function pivotToProductAudit() {
    closeModal();
    const match = sapMaster.find(i => i.hu === activeGhostHU);
    initProductAudit(match ? match.product : "UNKNOWN");
}

function showGhostModal(hu) { document.getElementById('ghost-hu').innerText = hu; document.getElementById('modal-ghost').style.display = 'flex'; }
function closeModal() { document.getElementById('modal-ghost').style.display = 'none'; }
function showToast(msg, color="accent") { const t = document.getElementById('toast'); t.innerText = msg; t.style.background = `var(--${color})`; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
function notify(msg) { showToast(msg); }

async function pullSAPData() {
    try {
        const res = await fetch(API_URL + '?type=sapdata');
        const data = await res.json();
        sapMaster = data.sapData;
    } catch(e) { showToast("Offline Mode", "amber"); }
}
</script>
</body>
</html>
