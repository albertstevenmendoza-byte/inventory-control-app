<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cycle Counter — Novus Ops</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#181a23;--surface-2:#1f2230;--surface-3:#2a2d3a;
  --border:#313546;--text:#eceef4;--text-2:#9ba1b5;--text-3:#6c7189;
  --accent:#5b9aff;--accent-dim:rgba(91,154,255,.1);
  --green:#34d399;--green-bg:rgba(52,211,153,.1);--green-border:rgba(52,211,153,.25);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);--red-border:rgba(248,113,113,.25);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);--amber-border:rgba(251,191,36,.25);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.1);
  --cyan:#22d3ee;--cyan-bg:rgba(34,211,238,.1);
  --fresh:#f472b6;--fresh-bg:rgba(244,114,182,.1);--fresh-border:rgba(244,114,182,.25);
  --radius:14px;--radius-sm:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100dvh}
button{font-family:inherit;border:none;cursor:pointer;-webkit-appearance:none}
button:active{transform:scale(.96)}
input,textarea,select{font-family:inherit}
.mono{font-family:'JetBrains Mono',monospace}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:12px;font-size:12px;font-weight:700;z-index:9998;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.toast.green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.toast.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.toast.blue{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(79,140,255,.2)}
.toast.amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.toast.pink{background:var(--fresh-bg);color:var(--fresh);border:1px solid var(--fresh-border)}
.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden}
.screen.active{display:flex;animation:screen-in .18s ease}
@keyframes screen-in{from{opacity:0}to{opacity:1}}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.header h1{font-size:15px;font-weight:800;white-space:nowrap}
.header-sub{font-size:10px;color:var(--text-2);font-weight:600}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hdr-btn{background:var(--surface-2);color:var(--text-2);padding:7px 11px;border-radius:var(--radius-sm);font-size:10px;font-weight:700;white-space:nowrap;transition:background .15s,color .15s}
.hdr-btn:hover{background:var(--accent-dim);color:var(--accent)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
.sync-dot.offline{background:var(--amber);animation:pulse 1.5s infinite}
.queue-badge{background:var(--amber-bg);color:var(--amber);padding:3px 8px;border-radius:6px;font-size:9px;font-weight:800}
@keyframes pulse{50%{opacity:.3}}

/* ── Audit mode bar ── */
.mode-bar{display:flex;gap:2px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.mode-btn{flex:1;padding:10px 0;border-radius:10px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;background:var(--surface-2);color:var(--text-3);border:1.5px solid var(--border);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.mode-btn.active-std{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.mode-btn.active-fresh{background:var(--fresh-bg);border-color:var(--fresh);color:var(--fresh)}

/* ── Fresh sub-mode panel ── */
.fresh-panel{display:none;flex-direction:column;gap:0;background:var(--fresh-bg);border-bottom:1px solid var(--fresh-border);flex-shrink:0}
.fresh-panel.visible{display:flex}
.fresh-submode-bar{display:flex;gap:2px;padding:8px 16px}
.fresh-sub-btn{flex:1;padding:9px 0;border-radius:9px;font-size:11px;font-weight:800;text-transform:uppercase;background:transparent;color:var(--fresh);border:1.5px solid var(--fresh-border);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;opacity:.6}
.fresh-sub-btn.active{background:var(--fresh);color:#fff;border-color:var(--fresh);opacity:1}
.fresh-threshold-row{display:flex;align-items:center;gap:10px;padding:0 16px 8px}
.fresh-threshold-row label{font-size:10px;font-weight:700;color:var(--fresh);flex-shrink:0}
.fresh-threshold-row input{width:64px;padding:5px 8px;background:var(--surface);border:1.5px solid var(--fresh-border);border-radius:8px;font-size:12px;font-weight:700;color:var(--fresh);outline:none;text-align:center;font-family:'JetBrains Mono',monospace}
.fresh-threshold-row span{font-size:10px;color:var(--fresh);opacity:.7}

/* ── Pallet count form ── */
.pallet-form{display:none;flex-direction:column;gap:0;padding-bottom:90px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.pallet-form.visible{display:flex}
.pallet-form::-webkit-scrollbar{display:none}
.pallet-section{padding:16px}
.pallet-section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--fresh);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pallet-field-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3);display:block;margin-bottom:6px;margin-top:14px}
.pallet-field-label:first-of-type{margin-top:0}
.pallet-input{width:100%;padding:14px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-weight:600;color:var(--text);outline:none;transition:border-color .15s}
.pallet-input:focus{border-color:var(--fresh)}
.pallet-input::placeholder{color:var(--text-3)}
.pallet-select{width:100%;padding:14px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-weight:700;color:var(--text);outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none;cursor:pointer}
.pallet-select:focus{border-color:var(--fresh)}
.pallet-select option{background:var(--surface-2);color:var(--text)}
.pallet-qty-row{display:flex;align-items:center;gap:8px;background:var(--surface-2);border-radius:12px;padding:8px;margin-top:6px}
.pallet-qty-btn{width:64px;height:64px;border-radius:12px;background:var(--surface-3);font-size:28px;font-weight:900;color:var(--text-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
.pallet-qty-btn:hover{background:var(--fresh-bg);color:var(--fresh)}
.pallet-qty-input{flex:1;background:transparent;border:none;text-align:center;font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:700;color:var(--fresh);outline:none;min-width:0}
.pallet-qty-input::placeholder{color:var(--surface-3)}
.pallet-hint{font-size:9px;font-weight:700;color:var(--text-3);text-align:center;margin-top:4px}
.pallet-submit-btn{width:100%;padding:20px;border-radius:var(--radius);font-size:14px;font-weight:800;text-transform:uppercase;background:var(--fresh);color:#fff;min-height:60px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;transition:filter .15s}
.pallet-submit-btn:hover{filter:brightness(1.1)}
.pallet-submit-btn:disabled{background:var(--surface-3);color:var(--text-3);pointer-events:none}
/* Recent pallet submissions list */
.pallet-log{margin-top:16px;display:flex;flex-direction:column;gap:6px}
.pallet-log-item{background:var(--surface);border:1px solid var(--fresh-border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;animation:card-in .18s ease}
@keyframes card-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.pallet-log-icon{font-size:20px;flex-shrink:0}
.pallet-log-info{flex:1;min-width:0}
.pallet-log-sku{font-size:12px;font-weight:800;color:var(--fresh)}
.pallet-log-detail{font-size:10px;color:var(--text-2);margin-top:2px}
.pallet-log-qty{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--fresh);flex-shrink:0}

/* ── Setup screen ── */
.setup-content{flex:1;overflow-y:auto;padding:16px;padding-bottom:90px;-webkit-overflow-scrolling:touch}
.setup-content::-webkit-scrollbar{display:none}
.stat-row{display:flex;gap:8px;margin-bottom:16px}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;transition:border-color .2s}
.stat-box:hover{border-color:var(--accent)}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent)}
.stat-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3);margin-top:4px}
.section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);margin:18px 0 10px}
.aisle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.aisle-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:0;text-align:center;font-size:22px;font-weight:900;color:var(--text);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:72px;transition:border-color .15s,background .15s,transform .1s}
.aisle-btn:hover{border-color:var(--accent);background:var(--accent-dim)}
.aisle-btn:active{transform:scale(.93)}
.aisle-btn.done{border-color:var(--green-border);background:var(--green-bg)}
.aisle-btn.in-progress{border-color:var(--amber-border);background:var(--amber-bg)}
.aisle-btn .a-letter{font-size:22px;font-weight:900;line-height:1}
.aisle-btn .a-count{font-size:8px;font-weight:700;color:var(--text-3);margin-top:2px}
.aisle-prog{position:absolute;bottom:0;left:0;height:3px;background:var(--accent);transition:width .4s ease}
.aisle-btn.done .aisle-prog{background:var(--green)}
.aisle-btn.in-progress .aisle-prog{background:var(--amber)}
.phase-bar{display:flex;gap:2px;padding:10px 16px 0;background:var(--surface)}
.phase-step{flex:1;height:4px;border-radius:2px;background:var(--surface-3);transition:background .3s}
.phase-step.active{background:var(--accent)}
.phase-step.done{background:var(--green)}
.phase-labels{display:flex;justify-content:space-between;padding:4px 16px 10px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);background:var(--surface);border-bottom:1px solid var(--border)}
.phase-labels span.active{color:var(--accent)}
.phase-labels span.done{color:var(--green)}
.bin-nav{display:flex;gap:6px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;align-items:center}
.nav-btn{width:50px;height:50px;border-radius:12px;background:var(--surface-2);color:var(--text-3);font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
.nav-btn:hover{background:var(--accent-dim);color:var(--accent)}
.bin-input{flex:1;padding:13px;background:var(--surface-2);border:2px solid var(--border);border-radius:12px;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);text-transform:uppercase;text-align:center;outline:none;transition:border-color .15s}
.bin-input:focus{border-color:var(--accent)}
.aisle-progress-banner{display:none;align-items:center;gap:10px;padding:7px 16px;border-bottom:1px solid var(--amber-border);flex-shrink:0;font-size:10px;font-weight:700;color:var(--amber);background:var(--amber-bg)}
.aisle-progress-banner.visible{display:flex}
.aisle-prog-bar-wrap{flex:1;height:4px;background:var(--surface-3);border-radius:2px;overflow:hidden}
.aisle-prog-bar-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .4s ease}
.bin-strip{display:flex;gap:3px;padding:8px 16px;overflow-x:auto;background:var(--surface);scrollbar-width:none;flex-shrink:0}
.bin-strip::-webkit-scrollbar{display:none}
.strip-dot{min-width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;background:var(--surface-2);color:var(--text-3);flex-shrink:0;cursor:pointer;transition:background .15s,color .15s}
.strip-dot:hover{background:var(--accent-dim);color:var(--accent)}
.strip-dot.current{min-width:38px;font-size:10px;background:var(--accent);color:#fff;cursor:default}
.strip-dot.done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.hu-list{flex:1;overflow-y:auto;padding:12px 16px 260px;-webkit-overflow-scrolling:touch}
.hu-list::-webkit-scrollbar{display:none}
.hu-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;transition:border-color .2s,background .2s;animation:card-in .18s ease both}
.hu-card.confirmed{border-color:var(--green-border);background:var(--green-bg)}
.hu-card.missing{border-color:var(--red-border);opacity:.7;background:var(--red-bg)}
.hu-card.adjusted{border-color:var(--amber-border);background:var(--amber-bg)}
.hu-card.extra{border-color:rgba(6,182,212,.25);background:var(--cyan-bg)}
.hu-card.fresh-expired{border-color:var(--red-border);background:var(--red-bg)}
.hu-card.fresh-expiring{border-color:var(--amber-border);background:var(--amber-bg)}
.hu-card.fresh-valid{border-color:var(--green-border);background:var(--green-bg)}
.hu-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.hu-id{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-dim);padding:3px 10px;border-radius:6px;flex-shrink:0}
.hu-badges{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.hu-badge{font-size:8px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:5px;letter-spacing:.5px;white-space:nowrap}
.hu-badge.ok{background:var(--green-bg);color:var(--green)}
.hu-badge.miss{background:var(--red-bg);color:var(--red)}
.hu-badge.adj{background:var(--amber-bg);color:var(--amber)}
.hu-badge.ext{background:var(--cyan-bg);color:var(--cyan)}
.hu-badge.sled-valid{background:var(--green-bg);color:var(--green)}
.hu-badge.sled-expiring{background:var(--amber-bg);color:var(--amber)}
.hu-badge.sled-expired{background:var(--red-bg);color:var(--red)}
.hu-meta{display:flex;gap:16px;margin-bottom:6px;flex-wrap:wrap}
.meta-item{display:flex;flex-direction:column}
.meta-label{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-3)}
.meta-val{font-size:13px;font-weight:700;margin-top:1px}
.hu-desc{font-size:10px;color:var(--text-2);margin-bottom:10px;line-height:1.4}
.sled-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:var(--surface-2);border-radius:8px;border:1px solid var(--border)}
.sled-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-3)}
.sled-date{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;margin-left:auto}
.sled-date.expired{color:var(--red)}
.sled-date.expiring{color:var(--amber)}
.sled-date.valid{color:var(--green)}
.qty-row{display:flex;align-items:center;gap:6px;background:var(--surface-2);border-radius:12px;padding:6px;margin-bottom:8px}
.qty-btn{width:60px;height:60px;border-radius:12px;background:var(--surface-3);font-size:26px;font-weight:900;color:var(--text-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
.qty-btn.plus{color:var(--accent)}
.qty-btn.plus:hover{background:var(--accent-dim)}
.qty-input{flex:1;background:transparent;border:none;text-align:center;font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:var(--accent);outline:none;min-width:0}
.qty-input::placeholder{color:var(--surface-3)}
.sap-hint{text-align:center;font-size:9px;font-weight:700;color:var(--text-3);margin-bottom:8px}
.hu-actions{display:flex;gap:6px}
.act-btn{flex:1;padding:16px 0;border-radius:12px;font-size:12px;font-weight:800;text-transform:uppercase;min-height:54px;display:flex;align-items:center;justify-content:center;transition:filter .15s}
.act-btn:hover{filter:brightness(1.1)}
.act-btn.confirm{background:var(--green);color:#fff}
.act-btn.miss{background:var(--surface-3);color:var(--red);border:1.5px solid var(--red-border)}
.act-btn.miss.active{background:var(--red);color:#fff;border-color:transparent}
.resolved-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:6px}
.resolved-label{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-3)}
.resolved-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.resolved-val.match{color:var(--green)}
.resolved-val.mismatch{color:var(--amber)}
.undo-btn{width:100%;padding:8px;background:none;color:var(--text-3);font-size:9px;font-weight:700}
.card-actions-row{display:flex;gap:6px;margin-top:6px}
.note-btn{flex:1;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:10px;font-weight:700;color:var(--text-3);text-align:left;transition:background .15s,border-color .15s,color .15s;cursor:pointer}
.note-btn:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.note-btn.has{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.move-btn{flex:1;padding:9px 12px;background:var(--purple-bg);border:1px solid rgba(167,139,250,.3);border-radius:var(--radius-sm);font-size:10px;font-weight:700;color:var(--purple);cursor:pointer;transition:filter .15s}
.move-btn:hover{filter:brightness(1.2)}
.empty-bin{text-align:center;padding:48px 24px;color:var(--text-3)}
.empty-bin .icon{font-size:40px;margin-bottom:10px;display:block}
.counted-banner{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius);margin-bottom:8px;background:var(--green-bg);border:1px solid var(--green-border);animation:card-in .18s ease}
.counted-banner strong{font-size:11px;color:var(--green);font-weight:800}
.counted-banner small{font-size:9px;color:var(--text-2)}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px calc(env(safe-area-inset-bottom,14px) + 10px);background:rgba(11,12,16,.93);backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:50}
.bottom-row{display:flex;gap:6px;margin-bottom:8px}
.btn-sec{flex:1;padding:13px 0;border-radius:12px;font-size:11px;font-weight:800;text-transform:uppercase;background:var(--surface-2);color:var(--text-2);border:1.5px solid var(--border);text-align:center;min-height:46px;transition:background .15s,border-color .15s,color .15s}
.btn-sec:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.btn-pri{width:100%;padding:17px 0;border-radius:var(--radius);font-size:14px;font-weight:800;text-transform:uppercase;background:var(--green);color:#fff;min-height:58px;display:flex;align-items:center;justify-content:center;transition:filter .15s}
.btn-pri:hover{filter:brightness(1.1)}
.btn-pri.disabled{background:var(--surface-3);color:var(--text-3);pointer-events:none}
.btn-pri.fresh-mode{background:var(--fresh)}
.setup-nav{position:fixed;bottom:0;left:0;right:0;display:flex;gap:6px;padding:10px 16px calc(env(safe-area-inset-bottom,14px) + 10px);background:rgba(11,12,16,.93);backdrop-filter:blur(20px);border-top:1px solid var(--border)}
.setup-nav .nav-tab{flex:1;padding:13px 0;border-radius:12px;font-size:11px;font-weight:800;text-transform:uppercase;background:var(--surface-2);color:var(--text-2);border:1.5px solid var(--border);text-align:center;min-height:46px;transition:background .15s,color .15s;text-decoration:none;display:flex;align-items:center;justify-content:center}
.setup-nav .nav-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.extra-form{background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;animation:card-in .18s ease}
.extra-form h3{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--cyan);margin-bottom:10px}
.field{width:100%;padding:13px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-weight:600;color:var(--text);outline:none;margin-bottom:6px;transition:border-color .15s}
.field:focus{border-color:var(--accent)}
.field::placeholder{color:var(--text-3)}
.field-row{display:flex;gap:6px}
.hidden{display:none!important}
#modal-move{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(5px);z-index:100;align-items:center;justify-content:center;padding:20px}
#modal-move .move-box{background:var(--surface);width:100%;max-width:400px;padding:20px;border-radius:var(--radius);border:1px solid var(--purple);animation:card-in .2s ease}
@keyframes shimmer{to{background-position:-200% 0}}
</style>
</head>
<body>
<div id="toast" class="toast"><span id="toast-text"></span></div>

<!-- ══ SCREEN 1: SETUP ══ -->
<div id="screen-setup" class="screen active">
  <div class="header">
    <div>
      <h1>Cycle Counter</h1>
      <div class="header-sub"><span id="stat-progress">0 / 0</span> bins today</div>
    </div>
    <div class="header-right">
      <span class="queue-badge hidden" id="queue-badge">0 queued</span>
      <button class="hdr-btn" id="refresh-btn" onclick="refreshAll()">↻</button>
      <div class="sync-dot" id="sync-dot"></div>
      <button class="hdr-btn" onclick="NovusSettings.openModal()">⚙</button>
      <button class="hdr-btn" onclick="setName()">👤 <span id="name-display">Set Name</span></button>
    </div>
  </div>

  <!-- Audit mode: Standard / Fresh -->
  <div class="mode-bar">
    <button class="mode-btn active-std" id="mode-std"   onclick="setAuditMode('standard')">📦 Standard</button>
    <button class="mode-btn"            id="mode-fresh" onclick="setAuditMode('fresh')">🧊 Fresh / Perishable</button>
  </div>

  <!-- Fresh sub-panel (hidden until fresh mode selected) -->
  <div class="fresh-panel" id="fresh-panel">
    <div class="fresh-submode-bar">
      <button class="fresh-sub-btn active" id="submode-hu"     onclick="setFreshSubMode('hu')">🔍 Count by HU</button>
      <button class="fresh-sub-btn"        id="submode-pallet" onclick="setFreshSubMode('pallet')">📦 Count by Pallet</button>
    </div>
    <div class="fresh-threshold-row" id="fresh-threshold-row">
      <label>Expiry warning within</label>
      <input type="number" id="fresh-threshold-days" value="7" min="1" max="90">
      <span>days of today</span>
    </div>
  </div>

  <!-- Pallet count form (shown when fresh + pallet mode) -->
  <div class="pallet-form" id="pallet-form">
    <div class="pallet-section">
      <div class="pallet-section-title">🧊 Fresh Pallet Count</div>

      <label class="pallet-field-label">SKU / Product Number</label>
      <select class="pallet-select" id="pallet-sku">
        <option value="">— Select Fresh SKU —</option>
      </select>

      <label class="pallet-field-label">Location / Bin</label>
      <input type="text" class="pallet-input mono" id="pallet-bin"
             placeholder="e.g. WA12A or Cooler Row 3"
             style="text-transform:uppercase">

      <label class="pallet-field-label">Total Pallets</label>
      <div class="pallet-qty-row">
        <button class="pallet-qty-btn" onclick="adjustPallets(-1)">−</button>
        <input type="number" inputmode="numeric" class="pallet-qty-input"
               id="pallet-qty" placeholder="0" min="0">
        <button class="pallet-qty-btn" onclick="adjustPallets(1)">+</button>
      </div>
      <div class="pallet-hint">Enter total pallets at this location</div>

      <label class="pallet-field-label">Note (optional)</label>
      <input type="text" class="pallet-input" id="pallet-note" placeholder="e.g. staging area, receiving dock…">

      <button class="pallet-submit-btn" id="pallet-submit-btn" onclick="submitPalletCount()">
        🧊 Log Pallet Count
      </button>

      <!-- Recently logged pallet counts this session -->
      <div id="pallet-log-title" class="section-title" style="display:none;color:var(--fresh)">
        Logged This Session
      </div>
      <div class="pallet-log" id="pallet-log"></div>
    </div>
  </div>

  <!-- Standard setup content (aisle grid + product search) -->
  <div class="setup-content" id="setup-content">
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val" id="stat-loaded">—</div><div class="stat-label">SAP Items</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-bins">—</div><div class="stat-label">Total Bins</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-done">0</div><div class="stat-label">Done Today</div></div>
    </div>
    <div class="section-title">Count By Product</div>
    <div style="display:flex;gap:8px;margin-bottom:24px">
      <input type="text" id="product-search" class="field mono"
             placeholder="Enter Product #…"
             style="flex:1;padding:12px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--accent);font-weight:700;outline:none;margin:0">
      <button class="hdr-btn" style="background:var(--accent);color:#fff;font-size:12px;padding:0 16px"
              onclick="searchProduct()">Search</button>
    </div>
    <div class="section-title">Select Aisle</div>
    <div class="aisle-grid" id="aisle-grid"></div>
  </div>

  <div class="setup-nav">
    <button class="nav-tab active">Count</button>
    <a href="index.html" class="nav-tab">Home</a>
  </div>
</div>

<!-- ══ SCREEN 2: COUNTING ══ -->
<div id="screen-counting" class="screen">
  <div class="header">
    <button class="hdr-btn" onclick="backToSetup()">← Back</button>
    <div style="flex:1;text-align:center">
      <h1 id="count-bin-title">—</h1>
      <div class="header-sub" id="count-aisle-label"></div>
    </div>
    <div class="sync-dot" id="sync-dot-2"></div>
  </div>
  <div class="aisle-progress-banner" id="aisle-progress-banner">
    <span id="aisle-progress-text">Aisle —</span>
    <div class="aisle-prog-bar-wrap"><div class="aisle-prog-bar-fill" id="aisle-prog-fill" style="width:0%"></div></div>
    <span id="aisle-progress-pct">0%</span>
  </div>
  <div class="phase-bar">
    <div class="phase-step" id="ph1"></div>
    <div class="phase-step" id="ph2"></div>
    <div class="phase-step" id="ph3"></div>
  </div>
  <div class="phase-labels">
    <span id="phl1">Check HUs</span>
    <span id="phl2">Extras</span>
    <span id="phl3">Finalize</span>
  </div>
  <div class="bin-nav">
    <button class="nav-btn" onclick="stepBin(-1)">◀</button>
    <input type="text" class="bin-input" id="bin-input" placeholder="SCAN BIN…">
    <button class="nav-btn" onclick="stepBin(1)">▶</button>
  </div>
  <div class="bin-strip" id="bin-strip"></div>
  <div class="hu-list" id="hu-list"></div>
  <div class="bottom-bar">
    <div class="bottom-row">
      <button class="btn-sec" onclick="toggleExtra()">+ Found Extra</button>
      <button class="btn-sec" id="btn-confirm-all" onclick="confirmAll()">✓ All</button>
    </div>
    <button class="btn-pri" id="btn-finalize" onclick="finalizeBin()">Finalize & Next →</button>
  </div>
</div>

<!-- ══ MOVE MODAL ══ -->
<div id="modal-move" style="display:none;align-items:center;justify-content:center;padding:20px;">
  <div class="move-box">
    <h3 style="color:var(--purple);font-size:16px;font-weight:800;margin-bottom:16px">🔄 Move Item to Another Bin</h3>
    <label style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3);display:block;margin-bottom:6px">HU Number</label>
    <input type="text" id="qm-hu" class="field mono" placeholder="HU Number" style="margin-bottom:0" readonly>
    <div id="qm-info" style="margin:8px 0 16px;font-size:11px;color:var(--text-2);min-height:40px;background:var(--surface-2);padding:8px;border-radius:8px"></div>
    <div style="display:flex;gap:8px">
      <div style="flex:2">
        <label style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3);display:block;margin-bottom:6px">Found In Bin</label>
        <input type="text" id="qm-bin" class="field mono" placeholder="e.g. WA12A" style="text-transform:uppercase">
      </div>
      <div style="flex:1">
        <label style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3);display:block;margin-bottom:6px">Actual Qty</label>
        <input type="number" inputmode="numeric" id="qm-qty" class="field mono" placeholder="Qty">
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:24px">
      <button class="btn-sec" onclick="document.getElementById('modal-move').style.display='none'" style="flex:1">Cancel</button>
      <button class="act-btn" style="flex:2;background:var(--purple);color:#fff;border:none" onclick="submitQuickMove()">Log Movement</button>
    </div>
  </div>
</div>

<script src="novus-core.js"></script>
<script>
'use strict';

// ─────────────────────────────────────────
// FRESH SKU LIST — the 14 target products
// ─────────────────────────────────────────
const FRESH_SKUS = [
  '3305704','3307506','3307509','3307515','3307518','3307525',
  '3307710','3308356','3309009','3309016','3309017','3309019',
  '3309138','3309139',
];

// Populate the pallet SKU dropdown on load
(function buildSkuDropdown() {
  const sel = document.getElementById('pallet-sku');
  FRESH_SKUS.forEach(sku => {
    const opt = document.createElement('option');
    opt.value = sku;
    opt.textContent = sku;
    sel.appendChild(opt);
  });
})();

// ─────────────────────────────────────────
// FRESH SKU DROPDOWN — change event listener
// Fires whenever the user selects a SKU from
// the Fresh panel dropdown.
//
// Count by HU mode:  finds all bins for that SKU,
//                    navigates to the first one,
//                    and renders HU cards normally.
//
// Count by Pallet mode: does nothing extra — the
//                       user fills the pallet form manually.
// ─────────────────────────────────────────
document.getElementById('pallet-sku').addEventListener('change', function () {
  const sku = this.value;
  if (!sku) return;

  if (freshSubMode === 'hu') {
    // Find every bin in SAP master that holds this SKU
    const bins = [
      ...new Set(
        sapMaster
          .filter(i => i.product.toUpperCase() === sku.toUpperCase())
          .map(i => i.sapBin)
      )
    ].sort();

    if (!bins.length) {
      toast(`No SAP records found for ${sku}`, 'amber');
      return;
    }

    // Set up navigation state and go to first bin
    targetProduct = sku.toUpperCase();
    activeAisle   = null;
    aisleBins     = bins;
    binIdx        = 0;

    toast(`🧊 ${sku} — ${bins.length} bin(s) found`, 'pink');
    navigateToBin(aisleBins[0]);
  }
  // In pallet mode the dropdown is just a form field —
  // no navigation or HU rendering needed.
});

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let sapMaster   = JSON.parse(localStorage.getItem('novus_sap') || '[]');
let binIndex    = {}, huIndex = new Map();

const _todayStr = new Date().toDateString();
let _rawDone    = JSON.parse(localStorage.getItem('novus_done') || '{"date":"","bins":[]}');
let completedBins = new Set();
if (Array.isArray(_rawDone) || _rawDone.date !== _todayStr) {
  localStorage.setItem('novus_done', JSON.stringify({ date: _todayStr, bins: [] }));
} else {
  completedBins = new Set(_rawDone.bins);
}

let offlineQueue  = JSON.parse(localStorage.getItem('novus_queue') || '[]');
let auditorName   = NovusSettings.getUser();
let auditMode     = 'standard';  // 'standard' | 'fresh'
let freshSubMode  = 'hu';        // 'hu' | 'pallet'
let freshDays     = 7;

let currentBin    = '', currentItems = [], phase = 1;
let aisleBins     = [], binIdx = 0, showingExtra = false;
let targetProduct = null, activeAisle = null, activeMoveIdx = -1;
let isOnline      = navigator.onLine;

// Session pallet log (display only — persisted to GAS)
let palletSessionLog = [];

// ─────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────
document.getElementById('name-display').textContent = auditorName || 'Set Name';
document.getElementById('aisle-grid').innerHTML = NovusLoader.skeletonAisleCards(14);
updateQueueBadge();
updateSyncDot();

window.addEventListener('online',  () => { isOnline = true;  updateSyncDot(); flushQueue(); });
window.addEventListener('offline', () => { isOnline = false; updateSyncDot(); });

if (sapMaster.length > 0) { buildIndexes(); showSetup(); }
else { pullCloud(); }

// ─────────────────────────────────────────
// AUDIT MODE
// ─────────────────────────────────────────

function setAuditMode(mode) {
  auditMode = mode;
  document.getElementById('mode-std').className   = 'mode-btn' + (mode === 'standard' ? ' active-std'   : '');
  document.getElementById('mode-fresh').className = 'mode-btn' + (mode === 'fresh'    ? ' active-fresh'  : '');
  document.getElementById('fresh-panel').classList.toggle('visible', mode === 'fresh');

  if (mode === 'fresh') {
    setFreshSubMode(freshSubMode); // re-apply current sub-mode
    toast('🧊 Fresh audit mode active', 'pink');
  } else {
    // Restore standard view
    document.getElementById('pallet-form').classList.remove('visible');
    document.getElementById('setup-content').style.display = '';
    toast('📦 Standard audit mode', 'blue');
  }
}

// ─────────────────────────────────────────
// FRESH SUB-MODE: hu vs pallet
// ─────────────────────────────────────────

function setFreshSubMode(mode) {
  freshSubMode = mode;
  document.getElementById('submode-hu').classList.toggle('active',     mode === 'hu');
  document.getElementById('submode-pallet').classList.toggle('active', mode === 'pallet');

  // Threshold row only relevant for HU mode
  document.getElementById('fresh-threshold-row').style.display = mode === 'hu' ? 'flex' : 'none';

  if (mode === 'pallet') {
    // Show pallet form, hide normal aisle grid
    document.getElementById('pallet-form').classList.add('visible');
    document.getElementById('setup-content').style.display = 'none';
  } else {
    // Show normal grid, hide pallet form
    document.getElementById('pallet-form').classList.remove('visible');
    document.getElementById('setup-content').style.display = '';
  }
}

// ─────────────────────────────────────────
// PALLET COUNT — adjust / submit
// ─────────────────────────────────────────

function adjustPallets(delta) {
  const input = document.getElementById('pallet-qty');
  const current = parseInt(input.value, 10) || 0;
  input.value = Math.max(0, current + delta);
}

async function submitPalletCount() {
  const sku    = document.getElementById('pallet-sku').value.trim();
  const bin    = document.getElementById('pallet-bin').value.trim().toUpperCase();
  const qty    = parseInt(document.getElementById('pallet-qty').value, 10) || 0;
  const note   = document.getElementById('pallet-note').value.trim();

  // Validation
  if (!sku)  { _palletFieldError('pallet-sku',  'Select a SKU');       return; }
  if (!bin)  { _palletFieldError('pallet-bin',  'Enter a location');   return; }
  if (qty <= 0) { _palletFieldError('pallet-qty', 'Enter pallet count'); return; }

  const btn = document.getElementById('pallet-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '⏳ Logging…';

  const sessionId = 'PLT-' + new Date().toISOString().split('T')[0];
  const payload = {
    action:         'logAudit',
    user:           auditorName || 'Counter',
    bin,
    aisle:          bin.charAt(1) || '',
    auditMode:      'fresh',
    sessionId,
    idempotencyKey: `${sessionId}|${bin}|${sku}|${auditorName}|${qty}|${Date.now()}`,
    items: [{
      hu:         '',          // no HU in pallet mode
      product:    sku,
      desc:       'Fresh Pallet Count',
      batch:      '',
      sapBin:     bin,
      sapQty:     0,           // no SAP qty reference for bulk pallet count
      unit:       'PALLET',
      countQty:   qty,
      type:       'pallet_count',
      note:       note || `${qty} pallet(s) counted at ${bin}`,
      sled:       '',
      sledStatus: '',
    }],
  };

  const success = await sendPayload(payload, `✓ ${qty} pallet(s) of ${sku} logged`);

  if (success) {
    // Add to session log
    palletSessionLog.unshift({ sku, bin, qty, note });
    _renderPalletLog();

    // Clear form fields (keep SKU selected for rapid re-entry)
    document.getElementById('pallet-bin').value  = '';
    document.getElementById('pallet-qty').value  = '';
    document.getElementById('pallet-note').value = '';
  }

  btn.disabled = false;
  btn.innerHTML = '🧊 Log Pallet Count';
}

function _palletFieldError(id, msg) {
  toast(msg, 'amber');
  const el = document.getElementById(id);
  if (!el) return;
  el.style.borderColor = 'var(--red)';
  el.focus();
  setTimeout(() => { el.style.borderColor = ''; }, 2000);
}

function _renderPalletLog() {
  const logEl = document.getElementById('pallet-log');
  const titleEl = document.getElementById('pallet-log-title');
  if (!palletSessionLog.length) { logEl.innerHTML = ''; titleEl.style.display = 'none'; return; }
  titleEl.style.display = '';
  logEl.innerHTML = palletSessionLog.map(entry => `
    <div class="pallet-log-item">
      <span class="pallet-log-icon">🧊</span>
      <div class="pallet-log-info">
        <div class="pallet-log-sku">${entry.sku}</div>
        <div class="pallet-log-detail">📍 ${entry.bin}${entry.note ? ' · ' + entry.note : ''}</div>
      </div>
      <div class="pallet-log-qty">${entry.qty}</div>
    </div>`).join('');
}

// ─────────────────────────────────────────
// SYNC INDICATORS
// ─────────────────────────────────────────
function updateSyncDot() {
  document.querySelectorAll('.sync-dot').forEach(d =>
    d.className = isOnline ? 'sync-dot' : 'sync-dot offline'
  );
}
function updateQueueBadge() {
  const b = document.getElementById('queue-badge');
  if (offlineQueue.length > 0) { b.textContent = `${offlineQueue.length} queued`; b.classList.remove('hidden'); }
  else b.classList.add('hidden');
}

// ─────────────────────────────────────────
// INDEXES
// ─────────────────────────────────────────
function buildIndexes() {
  binIndex = {}; huIndex = new Map();
  sapMaster.forEach(i => {
    i.sapBin  = String(i.sapBin  || i.expectedBin || '').trim().toUpperCase();
    i.hu      = String(i.hu      || '').trim();
    i.product = String(i.product || '').trim();
    i.batch   = String(i.batch   || '').trim();
    i.desc    = String(i.desc    || '');
    i.sapQty  = Number(i.sapQty  || i.expectedQty) || 0;
    i.unit    = String(i.unit    || 'LB').trim();
    i.sled    = String(i.sled    || '').trim();
    if (i.sapBin) { if (!binIndex[i.sapBin]) binIndex[i.sapBin] = []; binIndex[i.sapBin].push(i); }
    if (i.hu) huIndex.set(i.hu, i);
  });
  document.getElementById('stat-loaded').textContent = sapMaster.length.toLocaleString();
  document.getElementById('stat-bins').textContent   = Object.keys(binIndex).length.toLocaleString();
  updateDoneCount();
}
function showSetup() { switchScreen('setup'); buildAisleGrid(); }

// ─────────────────────────────────────────
// CLOUD FETCH
// ─────────────────────────────────────────
async function pullCloud() {
  NovusLoader.start();
  try {
    const res  = await fetch(API_URL + '?type=sapdata', { redirect: 'follow' });
    const data = JSON.parse(await res.text());
    if (data.sapData && data.sapData.length > 0) {
      sapMaster = data.sapData;
      localStorage.setItem('novus_sap', JSON.stringify(sapMaster));
      buildIndexes(); showSetup();
      toast(`${sapMaster.length.toLocaleString()} items loaded`, 'blue');
    } else { _showNoData(); }
  } catch {
    isOnline = false; updateSyncDot();
    if (sapMaster.length > 0) { buildIndexes(); showSetup(); toast('Offline — using cached data', 'amber'); }
    else _showNoData();
  } finally { NovusLoader.done(); }
}
function _showNoData() {
  showSetup();
  document.getElementById('aisle-grid').innerHTML = `
    <div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--text-3)">
      <span style="font-size:36px;display:block;margin-bottom:10px">📭</span>
      <p style="font-weight:700">No SAP data yet</p>
      <p style="font-size:11px;margin-top:4px">Upload from Control Center first</p>
    </div>`;
}
async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '…'; btn.style.opacity = '.5'; btn.style.pointerEvents = 'none';
  NovusLoader.start();
  try {
    const res  = await fetch(API_URL + '?type=sapdata', { redirect: 'follow' });
    const data = JSON.parse(await res.text());
    if (data.sapData && data.sapData.length > 0) {
      sapMaster = data.sapData;
      localStorage.setItem('novus_sap', JSON.stringify(sapMaster));
      buildIndexes(); buildAisleGrid(); isOnline = true; updateSyncDot();
      if (completedBins.size > 0 && confirm('New SAP data loaded!\n\nClear "Already Counted" bins?')) {
        completedBins.clear();
        localStorage.setItem('novus_done', JSON.stringify({ date: new Date().toDateString(), bins: [] }));
        updateDoneCount(); buildAisleGrid();
      }
      toast(`Refreshed · ${sapMaster.length.toLocaleString()} items`, 'blue');
    }
  } catch { isOnline = false; updateSyncDot(); toast('Refresh failed', 'red'); }
  finally { NovusLoader.done(); btn.textContent = '↻'; btn.style.opacity = ''; btn.style.pointerEvents = ''; }
}

// ─────────────────────────────────────────
// DONE COUNT + AISLE GRID
// ─────────────────────────────────────────
function updateDoneCount() {
  document.getElementById('stat-done').textContent     = completedBins.size;
  document.getElementById('stat-progress').textContent = `${completedBins.size} / ${Object.keys(binIndex).length}`;
}
function buildAisleGrid() {
  const grid = document.getElementById('aisle-grid'); grid.innerHTML = '';
  AISLE_ROWS.forEach(letter => {
    const bins = Object.keys(binIndex).filter(b => b.charAt(1) === letter);
    const done = bins.filter(b => completedBins.has(b)).length, total = bins.length;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const allDone = total > 0 && done >= total, inProg = done > 0 && !allDone;
    const btn = document.createElement('button');
    btn.className = `aisle-btn${allDone ? ' done' : inProg ? ' in-progress' : ''}`;
    btn.innerHTML = `<span class="a-letter">${letter}</span><span class="a-count">${done}/${total}</span><div class="aisle-prog" style="width:${pct}%"></div>`;
    btn.onclick = () => selectAisle(letter);
    grid.appendChild(btn);
  });
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function selectAisle(letter) {
  targetProduct = null; activeAisle = letter;
  const limit = 'BC'.includes(letter) ? 25 : 38;
  aisleBins = [];
  for (let n = 0; n <= limit; n++) ['A','B','C'].forEach(s => aisleBins.push(`W${letter}${String(n).padStart(2,'0')}${s}`));
  binIdx = 0; navigateToBin(aisleBins[0]);
}
function searchProduct() {
  const prod = document.getElementById('product-search').value.trim().toUpperCase();
  if (!prod) return;
  const bins = [...new Set(sapMaster.filter(i => i.product.toUpperCase() === prod).map(i => i.sapBin))].sort();
  if (!bins.length) { toast(`Product ${prod} not found`, 'amber'); return; }
  targetProduct = prod; activeAisle = null; aisleBins = bins; binIdx = 0;
  toast(`${prod} in ${bins.length} bin(s)`, 'blue');
  navigateToBin(aisleBins[0]);
}
function navigateToBin(bin) {
  if (!bin) return;
  currentBin = bin.toUpperCase();
  binIdx = aisleBins.indexOf(currentBin); if (binIdx < 0) binIdx = 0;
  let expected = binIndex[currentBin] || [];
  if (targetProduct) expected = expected.filter(i => i.product.toUpperCase() === targetProduct);
  freshDays = parseInt(document.getElementById('fresh-threshold-days').value, 10) || 7;
  currentItems = expected.map(i => ({
    hu: i.hu, product: i.product, desc: i.desc, batch: i.batch,
    sapBin: i.sapBin, sapQty: i.sapQty, unit: i.unit, sled: i.sled,
    scannedQty: 0, status: 'pending', isExtra: false, note: '',
  }));
  phase = 1; showingExtra = false;
  switchScreen('counting');
  document.getElementById('count-bin-title').textContent = currentBin;
  document.getElementById('bin-input').value = currentBin;
  document.getElementById('count-aisle-label').textContent = activeAisle ? `Aisle ${currentBin.charAt(1)}` : '';
  document.getElementById('btn-finalize').className = 'btn-pri' + (auditMode === 'fresh' ? ' fresh-mode' : '');
  _updateAisleProgressBanner(); renderPhase(); renderStrip(); renderHUList(); updateFinalizeBtn();
}
function stepBin(dir) { const n = binIdx + dir; if (n >= 0 && n < aisleBins.length) navigateToBin(aisleBins[n]); }

// ─────────────────────────────────────────
// AISLE PROGRESS BANNER
// ─────────────────────────────────────────
function _updateAisleProgressBanner() {
  const banner = document.getElementById('aisle-progress-banner');
  if (!activeAisle) { banner.classList.remove('visible'); return; }
  const done = aisleBins.filter(b => completedBins.has(b)).length, total = aisleBins.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('aisle-progress-text').textContent = `Aisle ${activeAisle}: ${done}/${total} bins`;
  document.getElementById('aisle-prog-fill').style.width = pct + '%';
  document.getElementById('aisle-progress-pct').textContent = pct + '%';
  const fill = document.getElementById('aisle-prog-fill');
  fill.style.background = pct === 100 ? 'var(--green)' : 'var(--amber)';
  banner.style.background  = pct === 100 ? 'var(--green-bg)'     : 'var(--amber-bg)';
  banner.style.borderColor = pct === 100 ? 'var(--green-border)' : 'var(--amber-border)';
  banner.style.color       = pct === 100 ? 'var(--green)'        : 'var(--amber)';
  banner.classList.add('visible');
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function renderStrip() {
  const strip = document.getElementById('bin-strip'); strip.innerHTML = ''; const seen = {};
  aisleBins.forEach(b => {
    const num = b.substring(2,4); if (seen[num]) return; seen[num] = true;
    const isCur = currentBin.substring(2,4) === num;
    const isDone = aisleBins.filter(x => x.substring(2,4) === num).some(x => completedBins.has(x));
    const dot = document.createElement('button');
    dot.className = `strip-dot${isCur ? ' current' : ''}${isDone && !isCur ? ' done' : ''}`;
    dot.textContent = isCur ? num : (isDone ? '✓' : num);
    dot.onclick = () => navigateToBin(`W${currentBin.charAt(1)}${num}A`);
    strip.appendChild(dot);
  });
  setTimeout(() => { const c = strip.querySelector('.current'); if (c) c.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); }, 50);
}
function renderPhase() {
  ['ph1','ph2','ph3'].forEach((id,i) => { document.getElementById(id).className = 'phase-step' + (phase===i+1?' active':'') + (phase>i+1?' done':''); });
  ['phl1','phl2','phl3'].forEach((id,i) => { document.getElementById(id).className = (phase===i+1?'active':'') + (phase>i+1?' done':''); });
}

// ─────────────────────────────────────────
// FRESH SLED HELPERS
// ─────────────────────────────────────────
function parseSLED(s) { if(!s)return null; const d=new Date(s); if(!isNaN(d))return d; const m=s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/); if(m)return new Date(`${m[3]}-${m[2]}-${m[1]}`); return null; }
function sledStatus(s) { const d=parseSLED(s); if(!d)return'unknown'; const now=new Date(); now.setHours(0,0,0,0); const thr=new Date(now); thr.setDate(thr.getDate()+freshDays); if(d<now)return'expired'; if(d<=thr)return'expiring'; return'valid'; }
function formatSLED(s) { const d=parseSLED(s); if(!d)return s||'—'; return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }

// ─────────────────────────────────────────
// HU LIST RENDER
// ─────────────────────────────────────────
function renderHUList() {
  const list = document.getElementById('hu-list'); list.innerHTML = '';
  if (completedBins.has(currentBin)) list.innerHTML += `<div class="counted-banner"><span>✅</span><div><strong>Already Counted Today</strong><small>Counting again replaces results</small></div></div>`;
  if (!currentItems.length && !showingExtra) list.innerHTML += `<div class="empty-bin"><span class="icon">📭</span><p>SAP shows this bin as empty</p><p style="color:var(--accent);font-weight:700;font-size:11px;margin-top:6px">Tap "+ Found Extra" if you find anything</p></div>`;
  currentItems.filter(i => !i.isExtra).forEach((item, idx) => list.innerHTML += renderCard(item, idx));
  const extras = currentItems.filter(i => i.isExtra);
  if (extras.length) { list.innerHTML += `<div class="section-title" style="color:var(--cyan)">🔍 Extra Items Found</div>`; extras.forEach(item => list.innerHTML += renderCard(item, currentItems.indexOf(item))); }
  if (showingExtra) list.innerHTML += `<div class="extra-form"><h3>🔍 Found Extra Item</h3><input type="text" class="field mono" id="extra-hu" placeholder="HU number (0 if none)" oninput="extraLookup()"><div id="extra-autofill"></div><div class="field-row"><input type="text" class="field" id="extra-product" placeholder="Product #" style="flex:1"><input type="number" inputmode="numeric" class="field mono" id="extra-qty" placeholder="Qty" style="width:80px;text-align:center"></div><div style="display:flex;gap:8px;margin-top:10px"><button class="btn-sec" onclick="toggleExtra()" style="flex:1">Cancel</button><button class="act-btn confirm" onclick="addExtra()" style="flex:2">Add Item</button></div></div>`;
  updateFinalizeBtn();
}
function renderCard(item, idx) {
  const isPending=item.status==='pending',isOk=item.status==='confirmed',isMiss=item.status==='missing',isAdj=item.status==='adjusted';
  let cardCls='';
  if (auditMode==='fresh'&&item.sled&&!item.isExtra) { const ss=sledStatus(item.sled); cardCls=ss==='expired'?'fresh-expired':ss==='expiring'?'fresh-expiring':ss==='valid'?'fresh-valid':''; }
  else { cardCls=isMiss?'missing':isOk?'confirmed':isAdj?'adjusted':item.isExtra?'extra':''; }
  const statusBadge=isOk?'<span class="hu-badge ok">✓ Confirmed</span>':isMiss?'<span class="hu-badge miss">✗ Missing</span>':isAdj?'<span class="hu-badge adj">± Adjusted</span>':item.isExtra?'<span class="hu-badge ext">+ Extra</span>':'';
  let sledBadge='';
  if (auditMode==='fresh'&&item.sled) { const ss=sledStatus(item.sled); if(ss!=='unknown'){const lbl=ss==='expired'?'⚠ EXPIRED':ss==='expiring'?'⚡ EXPIRING':'✓ VALID'; sledBadge=`<span class="hu-badge sled-${ss}">${lbl}</span>`;}}
  let sledRow='';
  if (auditMode==='fresh'&&item.sled) { const ss=sledStatus(item.sled),cls=ss==='unknown'?'':ss; sledRow=`<div class="sled-row"><span class="sled-label">Best-By / SLED</span><span class="sled-date ${cls}">${formatSLED(item.sled)}</span></div>`; }
  const qtyMatch = item.scannedQty===item.sapQty;
  let body='';
  if (isPending||isAdj) { body=`<div class="qty-row"><button class="qty-btn" onclick="adjustQty(${idx},-1)">−</button><input type="number" inputmode="numeric" class="qty-input" value="${item.scannedQty||''}" placeholder="${item.sapQty}" onfocus="this.select()" oninput="setQty(${idx},this.value)"><button class="qty-btn plus" onclick="adjustQty(${idx},1)">+</button></div><div class="sap-hint">SAP expects <strong>${item.sapQty} ${item.unit||'LB'}</strong></div><div class="hu-actions"><button class="act-btn confirm" onclick="confirmHU(${idx})">Confirm ${item.sapQty}</button><button class="act-btn miss${isMiss?' active':''}" onclick="markMissing(${idx})">Missing</button></div>`; }
  else { body=`<div class="resolved-row"><span class="resolved-label">Count</span><span class="resolved-val ${qtyMatch?'match':'mismatch'}">${item.scannedQty}</span></div><button class="undo-btn" onclick="resetHU(${idx})">↺ Undo</button>`; }
  return `<div class="hu-card ${cardCls}"><div class="hu-top"><span class="hu-id">HU ${item.hu||'—'}</span><div class="hu-badges">${statusBadge}${sledBadge}</div></div><div class="hu-meta"><div class="meta-item"><span class="meta-label">Product</span><span class="meta-val">${item.product}</span></div><div class="meta-item"><span class="meta-label">SAP Qty</span><span class="meta-val mono">${item.sapQty}</span></div>${item.batch?`<div class="meta-item"><span class="meta-label">Batch</span><span class="meta-val mono" style="font-size:11px">${item.batch}</span></div>`:''}</div>${item.desc?`<div class="hu-desc">${item.desc}</div>`:''}${sledRow}${body}<div class="card-actions-row"><button class="note-btn${item.note?' has':''}" onclick="addNote(${idx})">📝 ${item.note?item.note.substring(0,28)+(item.note.length>28?'…':''):'Add Note'}</button><button class="move-btn" onclick="openMoveModal(${idx})">🔄 Move</button></div></div>`;
}

// ─────────────────────────────────────────
// HU STATE ACTIONS
// ─────────────────────────────────────────
function confirmHU(idx){haptic();if(!currentItems[idx].scannedQty)currentItems[idx].scannedQty=currentItems[idx].sapQty;currentItems[idx].status=currentItems[idx].scannedQty===currentItems[idx].sapQty?'confirmed':'adjusted';checkPhaseAdvance();renderHUList();}
function markMissing(idx){haptic();if(currentItems[idx].status==='missing'){currentItems[idx].status='pending';currentItems[idx].scannedQty=0;}else{currentItems[idx].status='missing';currentItems[idx].scannedQty=0;}checkPhaseAdvance();renderHUList();}
function adjustQty(idx,delta){haptic();currentItems[idx].scannedQty=Math.max(0,(currentItems[idx].scannedQty||0)+delta);currentItems[idx].status='adjusted';renderHUList();}
function setQty(idx,val){currentItems[idx].scannedQty=parseFloat(val)||0;if(currentItems[idx].scannedQty>0)currentItems[idx].status=currentItems[idx].scannedQty===currentItems[idx].sapQty?'confirmed':'adjusted';updateFinalizeBtn();}
function resetHU(idx){haptic();currentItems[idx].status='pending';currentItems[idx].scannedQty=0;phase=1;renderPhase();renderHUList();}
function confirmAll(){haptic();currentItems.forEach((item,i)=>{if(!item.isExtra&&item.status==='pending'){currentItems[i].scannedQty=item.sapQty;currentItems[i].status='confirmed';}});checkPhaseAdvance();renderHUList();}
function addNote(idx){const note=prompt('Note:',currentItems[idx].note||'');if(note!==null){currentItems[idx].note=note.trim();renderHUList();}}
function checkPhaseAdvance(){if(currentItems.filter(i=>!i.isExtra).every(i=>i.status!=='pending')&&phase===1){phase=2;renderPhase();}}

// ─────────────────────────────────────────
// MOVE MODAL
// ─────────────────────────────────────────
function openMoveModal(idx){activeMoveIdx=idx;const item=currentItems[idx];document.getElementById('qm-hu').value=item.hu;document.getElementById('qm-qty').value=item.scannedQty||item.sapQty||0;document.getElementById('qm-bin').value='';document.getElementById('qm-info').innerHTML=`<strong style="color:var(--accent)">Moving from ${currentBin}</strong><br>Product: ${item.product} · SAP Qty: ${item.sapQty} ${item.unit}`;document.getElementById('modal-move').style.display='flex';}
async function submitQuickMove(){
  const hu=document.getElementById('qm-hu').value.trim(),scanBin=document.getElementById('qm-bin').value.trim().toUpperCase(),scanQty=parseFloat(document.getElementById('qm-qty').value);
  if(!hu||!scanBin||isNaN(scanQty)){toast('Fill all fields','amber');return;}
  if(activeMoveIdx<0){toast('No item selected','red');return;}
  const item=currentItems[activeMoveIdx],type=scanQty===item.sapQty?'move':'move_adj';
  if(item.isExtra)currentItems.splice(activeMoveIdx,1);else{item.scannedQty=0;item.status='missing';item.note=`Moved to ${scanBin}`;}
  renderHUList();checkPhaseAdvance();
  const sessId='MOVE-'+new Date().toISOString().split('T')[0];
  const payload={action:'logAudit',user:auditorName||'Counter',bin:scanBin,aisle:scanBin.charAt(1),auditMode,sessionId:sessId,idempotencyKey:makeIdempotencyKey(scanBin,sessId),items:[{hu:item.hu,product:item.product,desc:item.desc,batch:item.batch,sapBin:item.sapBin,sapQty:item.sapQty,countQty:scanQty,type,note:`Moved from ${currentBin}`,sled:item.sled||'',sledStatus:sledStatus(item.sled)}]};
  document.getElementById('modal-move').style.display='none';
  await sendPayload(payload,'Movement logged');
}

// ─────────────────────────────────────────
// EXTRA ITEMS
// ─────────────────────────────────────────
function toggleExtra(){showingExtra=!showingExtra;renderHUList();}
function extraLookup(){const hu=document.getElementById('extra-hu').value.trim();if(hu.length<4)return;const m=huIndex.get(hu);if(m){document.getElementById('extra-product').value=m.product;document.getElementById('extra-autofill').innerHTML='<span style="font-size:9px;font-weight:700;color:var(--green);background:var(--green-bg);padding:3px 8px;border-radius:6px;margin-bottom:6px;display:inline-block">✓ Auto-filled from SAP</span>';}else document.getElementById('extra-autofill').innerHTML='';}
function addExtra(){const hu=document.getElementById('extra-hu').value.trim()||'0',product=document.getElementById('extra-product').value.trim(),qty=parseFloat(document.getElementById('extra-qty').value)||0;if(!product||!qty){toast('Enter product # and qty','amber');return;}const m=huIndex.get(hu);currentItems.push({hu,product,desc:m?m.desc:'FOUND (Extra)',batch:m?m.batch:'',sapBin:m?m.sapBin:'',sapQty:m?m.sapQty:0,unit:m?m.unit:'LB',sled:m?m.sled:'',scannedQty:qty,status:'confirmed',isExtra:true,note:''});showingExtra=false;renderHUList();toast('Extra item added','blue');}

// ─────────────────────────────────────────
// FINALIZE BIN
// ─────────────────────────────────────────
function updateFinalizeBtn(){
  const p=currentItems.filter(i=>i.status==='pending').length,btn=document.getElementById('btn-finalize'),fc=auditMode==='fresh'?' fresh-mode':'';
  if(p>0){btn.className='btn-pri disabled';btn.textContent=`${p} item${p>1?'s':''} unchecked`;}
  else{btn.className='btn-pri'+fc;btn.textContent=currentItems.length===0?'Skip Empty Bin →':'Finalize & Next →';}
  document.getElementById('btn-confirm-all').style.display=currentItems.filter(i=>!i.isExtra&&i.status==='pending').length<=1?'none':'';
}
async function finalizeBin(){
  if(currentItems.some(i=>i.status==='pending'))return; haptic();
  const items=currentItems.map(i=>{let type='ok';if(i.status==='missing')type='miss';else if(i.isExtra)type=(i.sapBin&&i.sapBin!==currentBin)?(i.scannedQty===i.sapQty?'move':'move_adj'):'unexpected';else if(i.scannedQty!==i.sapQty)type='adj';return{hu:i.hu,product:i.product,desc:i.desc,batch:i.batch,sapBin:i.sapBin,sapQty:i.sapQty,unit:i.unit,countQty:i.scannedQty,type,note:i.note,sled:i.sled||'',sledStatus:auditMode==='fresh'?sledStatus(i.sled):''};});
  const sessId='S-'+new Date().toISOString().split('T')[0];
  const payload={action:'logAudit',user:auditorName||'Counter',bin:currentBin,aisle:currentBin.charAt(1),auditMode,sessionId:sessId,idempotencyKey:makeIdempotencyKey(currentBin,sessId,items),items};
  const ok=await sendPayload(payload,'Bin finalized ✓');
  if(ok){completedBins.add(currentBin);localStorage.setItem('novus_done',JSON.stringify({date:new Date().toDateString(),bins:[...completedBins]}));updateDoneCount();_updateAisleProgressBanner();stepBin(1);}
}

// ─────────────────────────────────────────
// NETWORK
// ─────────────────────────────────────────
function makeIdempotencyKey(bin,sessId,items){const fp=items?`${items.length}|${items[0]?.hu||'empty'}`:'nofp';return`${sessId}|${bin}|${auditorName}|${fp}`;}
async function sendPayload(payload,successMsg){
  try{const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},redirect:'follow',body:JSON.stringify(payload)});const text=await res.text();let result;try{result=JSON.parse(text);}catch{_enqueue(payload);return true;}if(result.success===false){toast('Server error: '+(result.error||'unknown'),'red');return false;}if(result.skipped)toast('Already synced','amber');else if(successMsg)toast(successMsg,'green');isOnline=true;updateSyncDot();return true;}
  catch{_enqueue(payload);isOnline=false;updateSyncDot();toast('Saved offline — will sync later','amber');return true;}
}
function _enqueue(p){offlineQueue.push(p);localStorage.setItem('novus_queue',JSON.stringify(offlineQueue));updateQueueBadge();}
async function flushQueue(){if(!offlineQueue.length)return;const batch=[...offlineQueue];offlineQueue=[];const failed=[];for(const p of batch){try{const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},redirect:'follow',body:JSON.stringify(p)});const text=await res.text();try{const r=JSON.parse(text);if(r.success===false)failed.push(p);}catch{failed.push(p);}}catch{failed.push(p);}}offlineQueue=failed;localStorage.setItem('novus_queue',JSON.stringify(offlineQueue));updateQueueBadge();if(!failed.length&&batch.length)toast(`${batch.length} queued item(s) synced`,'green');}
setInterval(flushQueue,15000);

// ─────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────
function switchScreen(name){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+name).classList.add('active');}
function backToSetup(){targetProduct=null;activeAisle=null;document.getElementById('product-search').value='';switchScreen('setup');buildAisleGrid();}
function setName(){const name=prompt('Your name:',auditorName);if(name!==null){auditorName=name.trim();NovusSettings.set('userName',auditorName);document.getElementById('name-display').textContent=auditorName||'Set Name';}}
function haptic(){if(NovusSettings.get('hapticFeedback')&&navigator.vibrate)navigator.vibrate(15);}
window.addEventListener('novus-settings-changed',()=>{auditorName=NovusSettings.getUser();document.getElementById('name-display').textContent=auditorName||'Set Name';});
document.getElementById('bin-input').addEventListener('keydown',e=>{if(e.key==='Enter')navigateToBin(e.target.value.trim());});
</script>
</body>
