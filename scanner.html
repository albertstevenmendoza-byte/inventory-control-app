<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cycle Counter — Novus Ops</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
:root {
  --bg:#0f1117;--surface:#181a23;--surface-2:#1f2230;--surface-3:#2a2d3a;
  --border:#313546;--text:#eceef4;--text-2:#9ba1b5;--text-3:#6c7189;
  --accent:#5b9aff;--accent-dim:rgba(91,154,255,.1);
  --green:#34d399;--green-bg:rgba(52,211,153,.1);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.1);
  --radius:14px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; }

/* Global Toast */
.toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); padding:10px 20px; border-radius:12px; font-size:12px; font-weight:700; z-index:99999; pointer-events:none; opacity:0; transition:opacity .3s; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.toast.show { opacity:1; }
.toast.green { background:var(--green-bg); color:var(--green); border:1px solid rgba(52,211,153,.25); }
.toast.red { background:var(--red-bg); color:var(--red); border:1px solid rgba(248,113,113,.25); }
.toast.amber { background:var(--amber-bg); color:var(--amber); border:1px solid rgba(251,191,36,.25); }
.toast.blue { background:var(--accent-dim); color:var(--accent); border:1px solid rgba(91,154,255,.25); }

.hdr-btn { background:var(--surface-2); color:var(--text-2); padding:8px 14px; border-radius:10px; font-size:11px; font-weight:700; text-decoration:none; border:none; cursor:pointer; font-family:inherit; transition:background .2s; }
.hdr-btn:hover { background:var(--surface-3); color:var(--text); }
</style>
</head>
<body>

<div id="toast" class="toast"><span id="toast-text"></span></div>
<div id="root"></div>

<script>
const NovusSettings = (() => {
  const STORAGE_KEY = 'novus_settings';
  const DEFAULTS = { userName: '', theme: 'dark', pollInterval: 10, hapticFeedback: true, compactMode: false };

  const LIGHT_VARS = {
    '--bg': '#f8f9fb', '--surface': '#ffffff', '--surface-2': '#f1f3f5', '--surface-3': '#e5e7eb',
    '--border': '#d1d5dc', '--text': '#111827', '--text-2': '#374151', '--text-3': '#6b7280',
    '--accent': '#2563eb', '--accent-dim': 'rgba(37,99,235,.07)',
    '--green': '#059669', '--green-bg': 'rgba(5,150,105,.08)',
    '--red': '#dc2626', '--red-bg': 'rgba(220,38,38,.07)',
    '--amber': '#b45309', '--amber-bg': 'rgba(180,83,9,.07)',
    '--purple': '#7c3aed', '--purple-bg': 'rgba(124,58,237,.07)',
  };

  const DARK_VARS = {
    '--bg': '#0f1117', '--surface': '#181a23', '--surface-2': '#1f2230', '--surface-3': '#2a2d3a',
    '--border': '#313546', '--text': '#eceef4', '--text-2': '#9ba1b5', '--text-3': '#6c7189',
    '--accent': '#5b9aff', '--accent-dim': 'rgba(91,154,255,.1)',
    '--green': '#34d399', '--green-bg': 'rgba(52,211,153,.1)',
    '--red': '#f87171', '--red-bg': 'rgba(248,113,113,.1)',
    '--amber': '#fbbf24', '--amber-bg': 'rgba(251,191,36,.1)',
    '--purple': '#a78bfa', '--purple-bg': 'rgba(167,139,250,.1)',
  };

  function loadAll() {
    try { const r = localStorage.getItem(STORAGE_KEY); return r ? { ...DEFAULTS, ...JSON.parse(r) } : { ...DEFAULTS }; }
    catch { return { ...DEFAULTS }; }
  }
  function saveAll(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

  let _cache = loadAll();
  const legacyName = localStorage.getItem('novus_name');
  if (legacyName && !_cache.userName) { _cache.userName = legacyName; saveAll(_cache); }

  function get(key) { return _cache[key] !== undefined ? _cache[key] : DEFAULTS[key]; }
  function set(key, val) {
    _cache[key] = val; saveAll(_cache);
    if (key === 'userName') localStorage.setItem('novus_name', val);
    if (key === 'theme') applyTheme();
  }
  function getUser() { return get('userName') || ''; }
  function applyTheme() {
    const vars = get('theme') === 'light' ? LIGHT_VARS : DARK_VARS;
    Object.entries(vars).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
    document.body.setAttribute('data-theme', get('theme'));
  }

  let _modalInjected = false;
  function _injectModal() {
    if (_modalInjected) return;
    _modalInjected = true;
    const overlay = document.createElement('div');
    overlay.id = 'novus-settings-overlay';
    overlay.innerHTML = `
      <div class="ns-modal">
        <div class="ns-header"><h3>⚙ Settings</h3><button class="ns-close" onclick="NovusSettings.closeModal()">✕</button></div>
        <div class="ns-body">
          <div class="ns-section"><div class="ns-section-title">Identity</div>
            <label class="ns-field-label">Your Name / ID</label>
            <input type="text" class="ns-input" id="ns-username" placeholder="Enter your name...">
          </div>
          <div class="ns-section"><div class="ns-section-title">Appearance</div>
            <div class="ns-toggle-row"><div><div class="ns-toggle-label">Theme</div></div>
              <div class="ns-theme-switch" id="ns-theme-switch" onclick="NovusSettings._toggleTheme()">
                <span class="ns-switch-option" data-val="dark">🌙 Dark</span>
                <span class="ns-switch-option" data-val="light">☀️ Light</span>
                <div class="ns-switch-slider" id="ns-switch-slider"></div></div></div></div>
        </div>
        <div class="ns-footer"><button class="ns-save-btn" onclick="NovusSettings._save()">Save & Close</button></div>
      </div>`;
    document.body.appendChild(overlay);
    
    const style = document.createElement('style');
    style.textContent = `
      #novus-settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:99999;align-items:center;justify-content:center;padding:20px}
      #novus-settings-overlay.open{display:flex}
      .ns-modal{background:var(--surface);width:100%;max-width:480px;border-radius:16px;border:1.5px solid var(--border);display:flex;flex-direction:column;max-height:90vh;overflow:hidden}
      .ns-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
      .ns-header h3{font-size:16px;font-weight:800;color:var(--text)}
      .ns-close{background:none;border:none;color:var(--text-3);font-size:18px;font-weight:900;cursor:pointer}
      .ns-body{padding:0;overflow-y:auto;flex:1}
      .ns-section{padding:16px 20px;border-bottom:1px solid var(--border)}.ns-section:last-child{border-bottom:none}
      .ns-section-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:12px}
      .ns-field-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3);display:block;margin-bottom:6px}
      .ns-input{width:100%;padding:12px 14px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;color:var(--text);outline:none;font-family:inherit}
      .ns-toggle-row{display:flex;justify-content:space-between;align-items:center}
      .ns-toggle-label{font-size:12px;font-weight:700;color:var(--text)}
      .ns-theme-switch{display:flex;position:relative;background:var(--surface-2);border-radius:8px;border:1px solid var(--border);overflow:hidden;cursor:pointer;user-select:none}
      .ns-switch-option{padding:6px 14px;font-size:10px;font-weight:800;color:var(--text-3);position:relative;z-index:2;transition:color .2s}
      .ns-switch-option.active{color:#fff}
      .ns-switch-slider{position:absolute;top:2px;left:2px;width:calc(50% - 2px);height:calc(100% - 4px);background:var(--accent);border-radius:6px;transition:transform .2s ease;z-index:1}
      .ns-switch-slider.right{transform:translateX(100%)}
      .ns-footer{padding:12px 20px;border-top:1px solid var(--border)}
      .ns-save-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}`;
    document.body.appendChild(style);
  }

  function openModal() {
    _injectModal();
    document.getElementById('novus-settings-overlay').classList.add('open');
    document.getElementById('ns-username').value = get('userName');
    _updateThemeSwitch();
  }
  function closeModal() { const o = document.getElementById('novus-settings-overlay'); if (o) o.classList.remove('open'); }
  function _updateThemeSwitch() {
    const s = document.getElementById('ns-switch-slider'); const opts = document.querySelectorAll('.ns-switch-option');
    if (!s) return; s.classList.toggle('right', get('theme') === 'light');
    opts.forEach(o => o.classList.toggle('active', o.dataset.val === get('theme')));
  }
  function _toggleTheme() { set('theme', get('theme') === 'dark' ? 'light' : 'dark'); _updateThemeSwitch(); }
  function _save() {
    set('userName', document.getElementById('ns-username').value.trim());
    closeModal();
    if (typeof window.toast === 'function') window.toast('Settings saved', 'green');
    window.dispatchEvent(new CustomEvent('novus-settings-changed'));
  }

  applyTheme();
  return { get, set, getUser, applyTheme, openModal, closeModal, _toggleTheme, _save };
})();

window.toast = function(msg, color = 'blue') {
  const t = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  t.className = `toast ${color} show`;
  setTimeout(() => t.classList.remove('show'), 2500);
};
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const API_URL = 'https://script.google.com/macros/s/AKfycbwZ1Dhmf6cK_hWV2xLKYmwEImUvifIRCPqVm0Fz4E7gjvfcpyzoqhAFIgvgwrjBretc/exec';

const FRESH_ITEMS = [
  "3305704","3307506","3307509","3307515","3307518","3307525",
  "3307710","3308356","3309009","3309016","3309017","3309019",
  "3309138","3309139"
];

const AISLES = ["WA","WB","WC","WD","WE","WF","WG","WH","WJ","WK","WL","WM","WN","WP"];
const BIN_SUFFIXES = ["A","B","C"];
const BIN_NUMBERS = Array.from({length:39},(_,i)=>String(i).padStart(2,"0"));

const generateBins = (aisle) => {
  const bins = [];
  BIN_NUMBERS.forEach(n => BIN_SUFFIXES.forEach(s => bins.push(`${aisle}${n}${s}`)));
  return bins;
};

const Icon = ({name, size=20}) => {
  const icons = {
    search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M20 6L9 17l-5-5"/></svg>,
    x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>,
    alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>,
    box: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>,
    grid: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
    zap: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
    back: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
    minus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M5 12h14"/></svg>,
    clipboard: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>,
  };
  return icons[name] || null;
};

function CycleCounter() {
  const [sapData, setSapData] = useState({});
  const [mode, setMode] = useState("idle"); 
  const [records, setRecords] = useState({}); 
  const [ghostItems, setGhostItems] = useState([]); 

  const [selectedAisle, setSelectedAisle] = useState(null);
  const [currentBinIndex, setCurrentBinIndex] = useState(0);
  const [productSearch, setProductSearch] = useState("");
  const [activeProduct, setActiveProduct] = useState(null);

  const [freshCounts, setFreshCounts] = useState({}); 

  const [scanInput, setScanInput] = useState("");
  const [showReport, setShowReport] = useState(false);
  const [ghostPrompt, setGhostPrompt] = useState(null);
  const scanRef = useRef(null);

  const notify = useCallback((msg, type="info") => {
    let color = 'blue';
    if(type === 'success') color = 'green';
    if(type === 'error') color = 'red';
    if(type === 'warning') color = 'amber';
    if (window.toast) window.toast(msg, color);
  }, []);

  // ─── LIVE FETCH ───────────────────────────────────────────────────
  useEffect(() => {
    const fetchSAP = async () => {
      try {
        const res = await fetch(API_URL + '?type=sapdata');
        const data = await res.json();
        
        if (data.sapData && data.sapData.length > 0) {
          const formattedData = {};
          data.sapData.forEach(row => {
            formattedData[row.hu] = {
              hu: row.hu,
              material: row.product,
              expectedBin: row.sapBin,
              qty: row.sapQty,
              desc: row.desc,
              batch: row.batch
            };
          });
          setSapData(formattedData);
          notify(`Loaded ${data.sapData.length} SAP items`, "success");
        }
      } catch (err) {
        console.error("SAP Fetch Error:", err);
        notify("Offline or API Error", "error");
      }
    };
    fetchSAP();
  }, [notify]);

  // ─── DERIVED DATA ─────────────────────────────────────────────────
  const currentBins = useMemo(() => {
    if (mode === "aisle" && selectedAisle) return generateBins(selectedAisle);
    return [];
  }, [mode, selectedAisle]);

  const currentBin = currentBins[currentBinIndex] || null;

  const expectedHUsForBin = useMemo(() => {
    if (!currentBin) return [];
    return Object.values(sapData).filter(h => h.expectedBin === currentBin);
  }, [currentBin, sapData]);

  const productLocations = useMemo(() => {
    if (!activeProduct) return [];
    return Object.values(sapData).filter(h => h.material === activeProduct);
  }, [activeProduct, sapData]);

  const freshSAPData = useMemo(() => {
    const grouped = {};
    FRESH_ITEMS.forEach(mat => {
      const hus = Object.values(sapData).filter(h => h.material === mat);
      grouped[mat] = { material: mat, hus, totalExpected: hus.reduce((s,h)=>s+h.qty,0), binCount: new Set(hus.map(h=>h.expectedBin)).size };
    });
    return grouped;
  }, [sapData]);

  // ─── CONFLICT RESOLUTION ENGINE ───────────────────────────────────
  const resolveState = useCallback((hu, foundBin) => {
    const sapRecord = sapData[hu];
    if (!sapRecord) return "GHOST";
    if (sapRecord.expectedBin === foundBin) return "OK";
    return "MOVEMENT";
  }, [sapData]);

  const checkMovementConflict = useCallback((hu) => {
    return records[hu]?.state === "MOVEMENT";
  }, [records]);

  // ─── SCAN HANDLERS ────────────────────────────────────────────────
  const handleScan = useCallback((inputHU, contextBin) => {
    const hu = inputHU.trim();
    if (!hu) return;

    const state = resolveState(hu, contextBin);
    const sapRecord = sapData[hu];

    if (state === "GHOST") {
      setGhostPrompt({ hu, bin: contextBin });
      return;
    }

    const record = {
      hu, state,
      foundBin: contextBin,
      expectedBin: sapRecord.expectedBin,
      material: sapRecord.material,
      qty: sapRecord.qty,
      timestamp: Date.now()
    };

    setRecords(prev => ({ ...prev, [hu]: record }));

    if (state === "OK") {
      notify(`✓ HU ${hu} verified in ${contextBin}`, "success");
    } else if (state === "MOVEMENT") {
      notify(`⇄ HU ${hu} MOVED — expected ${sapRecord.expectedBin}, found ${contextBin}`, "warning");
    }

    setScanInput("");
    scanRef.current?.focus();
  }, [resolveState, sapData, notify]);

  const finalizeBin = useCallback(async (bin) => {
    const expected = Object.values(sapData).filter(h => h.expectedBin === bin);
    const newRecords = { ...records };
    let missingCount = 0;
    const itemsToPost = [];

    expected.forEach(h => {
      if (!newRecords[h.hu] && !checkMovementConflict(h.hu)) {
        newRecords[h.hu] = {
          hu: h.hu, state: "MISSING", foundBin: null,
          expectedBin: h.expectedBin, material: h.material,
          qty: h.qty, timestamp: Date.now()
        };
        missingCount++;
      }
      
      const rec = newRecords[h.hu];
      if (rec) {
        let gasType = 'ok';
        if (rec.state === 'MISSING') gasType = 'miss';
        if (rec.state === 'MOVEMENT') gasType = 'move';

        itemsToPost.push({
          hu: rec.hu,
          product: rec.material,
          desc: sapData[rec.hu]?.desc || '',
          batch: sapData[rec.hu]?.batch || '',
          sapBin: rec.expectedBin,
          sapQty: rec.qty,
          countQty: rec.state === 'MISSING' ? 0 : rec.qty, 
          type: gasType,
          note: rec.state === 'MOVEMENT' ? `Found in ${rec.foundBin}` : ''
        });
      }
    });

    setRecords(newRecords);

    if (itemsToPost.length > 0) {
      const sessionId = 'REACT-' + new Date().toISOString().split('T')[0];
      const payload = {
        action: 'logAudit',
        user: window.NovusSettings.getUser() || 'React Counter',
        bin: bin,
        sessionId: sessionId,
        idempotencyKey: `${sessionId}|${bin}|ReactCounter|${itemsToPost.length}`,
        items: itemsToPost
      };

      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        
        if (missingCount > 0) notify(`${missingCount} items missing. Bin ${bin} finalized.`, "warning");
        else notify(`Bin ${bin} synced to SAP.`, "success");
      } catch (err) {
        notify("Failed to sync to SAP.", "error");
      }
    } else {
      notify(`Bin ${bin} empty/skipped.`, "info");
    }
  }, [sapData, records, checkMovementConflict, notify]);

  // ─── GHOST LOGIC ──────────────────────────────────────────────────
  const acceptGhostAudit = useCallback(() => {
    if (!ghostPrompt) return;
    setGhostItems(prev => [...prev, ghostPrompt]);
    setActiveProduct(ghostPrompt.hu);
    setMode("product");
    setGhostPrompt(null);
    notify("Pivoting to Product Audit for ghost item", "info");
  }, [ghostPrompt, notify]);

  const dismissGhost = useCallback(() => {
    if (!ghostPrompt) return;
    setGhostItems(prev => [...prev, ghostPrompt]);
    setGhostPrompt(null);
    notify("Ghost item logged", "info");
  }, [ghostPrompt, notify]);

  // ─── FRESH LOGIC ──────────────────────────────────────────────────
  const updateFreshCount = useCallback((material, bin, delta) => {
    setFreshCounts(prev => {
      const existing = prev[material] || { locations: [], totalQty: 0 };
      const locIdx = existing.locations.findIndex(l => l.bin === bin);
      let newLocs = [...existing.locations];
      if (locIdx >= 0) {
        const newQty = Math.max(0, newLocs[locIdx].qty + delta);
        if (newQty === 0) newLocs.splice(locIdx, 1);
        else newLocs[locIdx] = { ...newLocs[locIdx], qty: newQty };
      } else if (delta > 0) {
        newLocs.push({ bin, qty: delta });
      }
      const totalQty = newLocs.reduce((s,l)=>s+l.qty, 0);
      return { ...prev, [material]: { locations: newLocs, totalQty } };
    });
  }, []);

  const addFreshScan = useCallback((material, bin, amount = 1) => {
    if (!bin.trim()) return;
    updateFreshCount(material, bin.trim().toUpperCase(), amount);
  }, [updateFreshCount]);

  const launchMode = useCallback((newMode, payload) => {
    setRecords({}); setGhostItems([]); setFreshCounts({}); setShowReport(false);
    setCurrentBinIndex(0); setActiveProduct(null); setSelectedAisle(null);

    if (newMode === "aisle") { setSelectedAisle(payload); setMode("aisle"); }
    else if (newMode === "product") { setActiveProduct(payload); setMode("product"); }
    else if (newMode === "fresh") { setMode("fresh"); }
    else { setMode("idle"); }
  }, []);

  const handleModeSearch = useCallback((val) => {
    if (val.toUpperCase() === "FRESH") { launchMode("fresh"); setProductSearch(""); return; }
    setProductSearch(val);
  }, [launchMode]);

  // ─── REPORTS ──────────────────────────────────────────────────────
  const reportData = useMemo(() => {
    const all = Object.values(records);
    return {
      total: all.length,
      ok: all.filter(r => r.state === "OK").length,
      missing: all.filter(r => r.state === "MISSING").length,
      movement: all.filter(r => r.state === "MOVEMENT").length,
      ghosts: ghostItems.length,
      records: all,
      accuracy: all.length ? ((all.filter(r=>r.state==="OK").length / all.length)*100).toFixed(1) : "0.0"
    };
  }, [records, ghostItems]);

      const variance = counted.totalQty - sap.totalExpected;
      return { material: mat, expected: sap.totalExpected, counted: counted.totalQty, variance, locations: counted.locations, sapBins: sap.binCount };
    });

              const variance = counted.totalQty - sap.totalExpected;

              let bgColor = "var(--surface)";

              return (
                <button key={mat} onClick={() => { setActiveFreshItem(mat); setTimeout(()=>freshBinRef.current?.focus(), 100); }}

                  <button onClick={() => updateFreshCount(activeFreshItem, loc.bin, -1)} style={{ width: 36, height: 36, borderRadius: 8, border: "none", background: "var(--red-bg)", cursor: "pointer", color: "var(--red)", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon name="minus" size={16}/></button>
                  <span style={{ fontSize: 20, fontWeight: 800, color: "var(--text)", width: 40, textAlign: "center", fontFamily: "var(--font-mono)" }}>{loc.qty}</span>
                  <button onClick={() => updateFreshCount(activeFreshItem, loc.bin, 1)} style={{ width: 36, height: 36, borderRadius: 8, border: "none", background: "var(--green-bg)", cursor: "pointer", color: "var(--green)", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon name="plus" size={16}/></button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  };

  const ReportModal = () => {
    if (!showReport) return null;
    const isFresh = mode === "fresh";

    return (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "flex-start", justifyContent: "center", zIndex: 9990, padding: 20, overflowY: "auto" }}>
        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 16, padding: 24, maxWidth: 560, width: "100%", marginTop: 40, marginBottom: 40 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800 }}>{isFresh ? "FRESH Variance Report" : "Audit Variance Report"}</h3>
            <button onClick={() => setShowReport(false)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-3)" }}><Icon name="x" size={20}/></button>
          </div>

          {isFresh ? (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
                <div style={{ background: "var(--surface-2)", borderRadius: 12, padding: 14, textAlign: "center" }}>
                  <div style={{ fontSize: 9, color: "var(--text-3)", textTransform: "uppercase", fontWeight: 800 }}>Items Counted</div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: "var(--green)" }}>{freshReportData.filter(r => r.counted > 0).length}/{FRESH_ITEMS.length}</div>
                </div>
                <div style={{ background: "var(--surface-2)", borderRadius: 12, padding: 14, textAlign: "center" }}>
                  <div style={{ fontSize: 9, color: "var(--text-3)", textTransform: "uppercase", fontWeight: 800 }}>Total Variance</div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: freshReportData.reduce((s,r)=>s+Math.abs(r.variance),0) === 0 ? "var(--green)" : "var(--red)" }}>
                    {freshReportData.reduce((s,r)=>s+Math.abs(r.variance),0)}
                  </div>
                </div>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead><tr style={{ borderBottom: "1px solid var(--border)", color: "var(--text-3)", textAlign: "left" }}><th>Material</th><th>Exp</th><th>Count</th><th>Var</th></tr></thead>
                  <tbody>
                    {freshReportData.map(r => (
                      <tr key={r.material} style={{ borderBottom: "1px solid var(--border)" }}>
                        <td style={{ padding: "8px 0", fontWeight: 700, fontFamily: "var(--font-mono)" }}>{r.material}</td>
                        <td style={{ color: "var(--text-2)" }}>{r.expected}</td>
                        <td style={{ fontWeight: 700, color: r.counted > 0 ? "var(--green)" : "var(--text-3)" }}>{r.counted}</td>
                        <td style={{ fontWeight: 800, color: r.variance === 0 ? "var(--green)" : r.variance > 0 ? "var(--amber)" : "var(--red)" }}>{r.variance > 0 ? "+" : ""}{r.variance}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>
          ) : (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 20 }}>
                {[ { label: "OK", value: reportData.ok, color: "var(--green)" }, { label: "Missing", value: reportData.missing, color: "var(--red)" }, { label: "Moved", value: reportData.movement, color: "var(--amber)" }, { label: "Ghost", value: reportData.ghosts, color: "var(--accent)" }].map(s => (
                  <div key={s.label} style={{ background: "var(--surface-2)", borderRadius: 10, padding: 12, textAlign: "center" }}>
                    <div style={{ fontSize: 9, color: s.color, fontWeight: 800, textTransform: "uppercase", marginBottom: 4 }}>{s.label}</div>
                    <div style={{ fontSize: 20, fontWeight: 800, color: s.color }}>{s.value}</div>
                  </div>
                ))}
              </div>

              {reportData.records.filter(r => r.state !== "OK").length > 0 && (
                <>
                  <p style={{ fontSize: 9, color: "var(--text-3)", margin: "0 0 8px", textTransform: "uppercase", fontWeight: 800 }}>Discrepancies</p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4, maxHeight: 300, overflowY: "auto" }}>
                    {reportData.records.filter(r => r.state !== "OK").map(r => (
                      <div key={r.hu} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 6, background: "var(--surface-2)", fontSize: 11 }}>
                        <span style={{ padding: "2px 6px", borderRadius: 4, fontSize: 9, fontWeight: 800, textTransform: "uppercase", background: r.state === "MISSING" ? "var(--red-bg)" : "var(--amber-bg)", color: r.state === "MISSING" ? "var(--red)" : "var(--amber)" }}>{r.state}</span>
                        <span style={{ fontWeight: 700, fontFamily: "var(--font-mono)" }}>{r.hu}</span>
                        <span style={{ color: "var(--text-3)" }}>{r.material}</span>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </>
          )}

          <button onClick={() => setShowReport(false)} style={{ width: "100%", marginTop: 20, padding: 14, borderRadius: 10, border: "none", background: "var(--surface-2)", color: "var(--text)", fontWeight: 700, cursor: "pointer" }}>Close</button>
        </div>
      </div>
    );
  };

  return (
    <>
      <GhostModalUI />
      <ReportModal />
      {mode === "idle" && <IdleScreen />}
      {mode === "aisle" && <AisleAuditScreen />}
      {mode === "product" && <ProductAuditScreen />}
      {mode === "fresh" && <FreshAuditScreen />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CycleCounter />);
</script>
</body>
</html>
