<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cycle Counter 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* [KEEPING YOUR EXACT CSS FROM LAYOUT 2.0] */
        :root {
            --bg: #f5f5f7; --surface: #ffffff; --surface-2: #f0f0f3; --surface-3: #e8e8ec;
            --border: #dcdce2; --text: #1a1a1f; --text-2: #6b6b78; --text-3: #9898a6;
            --accent: #3b6cf5; --accent-glow: rgba(59,108,245,0.08); --green: #16a34a;
            --green-bg: #f0fdf4; --green-border: #bbf7d0; --red: #dc2626; --red-bg: #fef2f2;
            --red-border: #fecaca; --amber: #d97706; --amber-bg: #fffbeb; --amber-border: #fde68a;
            --purple: #7c3aed; --purple-bg: #f5f3ff; --purple-border: #ddd6fe; --cyan: #0891b2;
            --cyan-bg: #ecfeff; --cyan-border: #a5f3fc; --radius: 16px; --radius-sm: 10px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overscroll-behavior: none; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        button { font-family: inherit; border: none; cursor: pointer; -webkit-user-select: none; user-select: none; }
        button:active { transform: scale(0.96); }
        .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .screen.active { display: flex; }
        .app-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); box-shadow: var(--shadow-sm); }
        .app-header h1 { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
        .sync-dot.queued { background: var(--amber); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .phase-bar { display: flex; gap: 2px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .phase-step { flex: 1; height: 4px; border-radius: 2px; background: var(--surface-3); transition: background 0.4s; }
        .phase-step.done { background: var(--green); }
        .phase-step.active { background: var(--accent); }
        .phase-label { display: flex; justify-content: space-between; padding: 0 16px 8px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-3); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 16px 16px 240px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .hu-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 10px; box-shadow: var(--shadow-sm); }
        .hu-card.confirmed { border-color: var(--green-border); background: var(--green-bg); }
        .hu-card.missing { border-color: var(--red-border); background: var(--red-bg); }
        .hu-card.extra { border-color: var(--cyan-border); background: var(--cyan-bg); }
        .hu-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .hu-id { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-glow); padding: 4px 10px; border-radius: 6px; }
        .qty-row { display: flex; align-items: center; gap: 6px; background: var(--surface-2); border-radius: var(--radius-sm); padding: 8px; margin-bottom: 10px; }
        .qty-stepper { width: 60px; height: 60px; border-radius: var(--radius-sm); background: var(--surface-3); font-size: 26px; font-weight: 900; }
        .qty-input { flex: 1; border: none; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 36px; font-weight: 700; color: var(--accent); background: transparent; outline: none; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px calc(env(safe-area-inset-bottom, 16px) + 12px); background: rgba(255,255,255,0.95); backdrop-filter: blur(24px); border-top: 1px solid var(--border); z-index: 50; }
        .primary-btn { width: 100%; padding: 20px 0; border-radius: var(--radius); font-size: 15px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; justify-content: center; min-height: 58px; }
        .primary-btn.blue { background: var(--accent); color: white; }
        .primary-btn.green { background: var(--green); color: white; }
        .primary-btn.disabled { background: var(--surface-3); color: var(--text-3); pointer-events: none; }
        .aisle-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 16px 20px; }
        .aisle-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px 0; text-align: center; font-size: 24px; font-weight: 900; position: relative; overflow: hidden; }
        .aisle-fill { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(79,125,249,0.12), transparent); }
        .bin-header { padding: 14px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .bin-nav { display: flex; gap: 8px; align-items: center; }
        .bin-input { flex: 1; background: var(--surface-2); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); text-align: center; outline: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
        .modal-sheet { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-height: 85vh; padding: 24px 20px; }
        .toast { position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-120%); z-index: 999; padding: 12px 24px; border-radius: var(--radius); font-size: 12px; font-weight: 800; color: white; transition: 0.4s; }
        .toast.show { transform: translateX(-50%) translateY(12px); }
    </style>
</head>
<body>

<div id="toast" class="toast">Saved</div>

<!-- SCREEN: SETUP -->
<div id="screen-setup" class="screen active">
    <div class="app-header">
        <h1>Cycle Counter</h1>
        <div style="display:flex; align-items:center; gap:10px;">
            <button onclick="refreshAll()" style="font-size:11px; font-weight:700; background:var(--surface-2); padding:8px 12px; border-radius:8px;">↻ Refresh</button>
            <div id="sync-dot" class="sync-dot"></div>
            <button onclick="showNameModal()" style="font-size:11px; font-weight:700; background:var(--surface-2); padding:8px 12px; border-radius:8px;">👤 <span id="name-display">Set Name</span></button>
        </div>
    </div>
    <div class="scroll-area">
        <div id="setup-ready">
            <div style="padding:20px 16px 10px; font-size:10px; font-weight:800; color:var(--text-3); text-transform:uppercase; letter-spacing:1.5px;">Select Aisle</div>
            <div class="aisle-grid" id="aisle-grid"></div>
        </div>
    </div>
</div>

<!-- SCREEN: COUNTING -->
<div id="screen-count" class="screen">
    <div class="app-header">
        <button onclick="leaveAisle()" style="font-size:11px; font-weight:700; background:var(--surface-2); padding:8px 12px; border-radius:8px;">← Back</button>
        <h1 id="count-title">Counting</h1>
        <div class="sync-dot"></div>
    </div>
    <div class="phase-bar">
        <div id="phase-1" class="phase-step active"></div>
        <div id="phase-2" class="phase-step"></div>
        <div id="phase-3" class="phase-step"></div>
    </div>
    <div class="phase-label">
        <span id="phase-1-label" class="active">Check HUs</span>
        <span id="phase-2-label">Scan Extras</span>
        <span id="phase-3-label">Finalize</span>
    </div>
    <div class="bin-header">
        <div class="bin-nav">
            <button onclick="stepBin(-1)" style="width:52px; height:52px; background:var(--surface-2); border-radius:10px;">◀</button>
            <input type="text" id="bin-input" class="bin-input" onchange="selectBin(this.value)">
            <button onclick="stepBin(1)" style="width:52px; height:52px; background:var(--surface-2); border-radius:10px;">▶</button>
        </div>
    </div>
    <div id="hu-list" class="scroll-area"></div>
    <div class="bottom-bar">
        <button id="btn-finalize" onclick="finalizeBin()" class="primary-btn disabled">Check all HUs first</button>
    </div>
</div>

<!-- MODAL: NAME -->
<div id="modal-name" class="modal-overlay" style="display:none;">
    <div class="modal-sheet">
        <div style="font-size:18px; font-weight:800; margin-bottom:12px;">Your Name</div>
        <input type="text" id="name-input" style="width:100%; padding:14px; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; font-size:18px; text-align:center;">
        <button onclick="saveName()" class="primary-btn blue" style="margin-top:16px;">Save</button>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwZ1Dhmf6cK_hWV2xLKYmwEImUvifIRCPqVm0Fz4E7gjvfcpyzoqhAFIgvgwrjBretc/exec";
const AISLE_ROWS = "ABCDEFGHJKLMNP".split("");

let sapMaster = JSON.parse(localStorage.getItem('sap2') || '[]');
let auditorName = localStorage.getItem('auditorName2') || '';
let offlineQueue = JSON.parse(localStorage.getItem('offQ2') || '[]');
let completedBins = new Set(JSON.parse(localStorage.getItem('doneBins2') || '[]'));
let currentBin = '', currentItems = [];

function haptic() { if (navigator.vibrate) navigator.vibrate(25); }
function toast(msg, color = 'var(--green)') {
    const t = document.getElementById('toast');
    t.style.background = color;
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
}

function showNameModal() { document.getElementById('modal-name').style.display = 'flex'; }
function saveName() {
    auditorName = document.getElementById('name-input').value.trim();
    localStorage.setItem('auditorName2', auditorName);
    document.getElementById('name-display').textContent = auditorName || 'Set Name';
    document.getElementById('modal-name').style.display = 'none';
}

async function refreshAll() {
    try {
        const res = await fetch(API_URL + '?type=sapdata');
        const data = await res.json();
        sapMaster = data.sapData || [];
        localStorage.setItem('sap2', JSON.stringify(sapMaster));
        buildAisleGrid();
        toast('SAP Data Refreshed');
    } catch (e) { toast('Offline Mode', 'var(--amber)'); }
}

function buildAisleGrid() {
    const grid = document.getElementById('aisle-grid'); grid.innerHTML = '';
    AISLE_ROWS.forEach(row => {
        const btn = document.createElement('button'); btn.className = 'aisle-btn';
        btn.innerHTML = `<span style="position:relative;z-index:1;">${row}</span>`;
        btn.onclick = () => selectBin(`W${row}00A`);
        grid.appendChild(btn);
    });
}

function selectBin(binStr) {
    currentBin = binStr.toUpperCase();
    currentItems = sapMaster.filter(i => i.sapBin === currentBin).map(i => ({
        ...i, countQty: i.sapQty, status: 'pending'
    }));
    document.getElementById('bin-input').value = currentBin;
    document.getElementById('count-title').textContent = currentBin;
    switchScreen('count');
    renderHUList();
}

function renderHUList() {
    const container = document.getElementById('hu-list'); container.innerHTML = '';
    if (currentItems.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:#991b1b;">Bin is empty in SAP</div>';
    }
    currentItems.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = `hu-card ${item.status === 'confirmed' ? 'confirmed' : (item.status === 'missing' ? 'missing' : '')}`;
        card.innerHTML = `
            <div class="hu-header"><span class="hu-id">HU ${item.hu}</span></div>
            <div style="font-size:13px; font-weight:600; margin-bottom:10px;">${item.product}</div>
            <div class="qty-row">
                <button class="qty-stepper" onclick="updateQty(${idx}, -1)">−</button>
                <input type="number" class="qty-input" value="${item.countQty}" onchange="setQty(${idx}, this.value)">
                <button class="qty-stepper" onclick="updateQty(${idx}, 1)">+</button>
            </div>
            <div style="display:flex; gap:8px;">
                <button onclick="confirmHU(${idx})" style="flex:2; background:var(--green); color:white; padding:12px; border-radius:8px; font-weight:800;">Confirm</button>
                <button onclick="missHU(${idx})" style="flex:1; background:var(--surface-3); color:var(--red); padding:12px; border-radius:8px; font-weight:800;">Miss</button>
            </div>
        `;
        container.appendChild(card);
    });
    updatePhase();
}

function updateQty(idx, delta) { currentItems[idx].countQty = Math.max(0, currentItems[idx].countQty + delta); renderHUList(); }
function confirmHU(idx) { currentItems[idx].status = 'confirmed'; haptic(); renderHUList(); }
function missHU(idx) { currentItems[idx].status = 'missing'; currentItems[idx].countQty = 0; haptic(); renderHUList(); }

function updatePhase() {
    const allDone = currentItems.every(i => i.status !== 'pending');
    const btn = document.getElementById('btn-finalize');
    if (allDone && currentItems.length > 0) {
        btn.className = 'primary-btn green'; btn.textContent = 'Finalize Bin →';
    } else {
        btn.className = 'primary-btn disabled'; btn.textContent = 'Check all HUs first';
    }
}

async function finalizeBin() {
    const items = currentItems.map(i => ({
        hu: i.hu, product: i.product, scannedBin: currentBin, sapBin: i.sapBin,
        sapQty: i.sapQty, countQty: i.countQty, type: i.status === 'missing' ? 'miss' : (i.countQty != i.sapQty ? 'adj' : 'ok')
    }));
    toast('Syncing...', 'var(--accent)');
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'logAudit', user: auditorName, bin: currentBin, items }) });
    toast('Bin Finalized');
    stepBin(1);
}

function stepBin(dir) {
    const letter = currentBin.charAt(1);
    const num = parseInt(currentBin.substring(2,4));
    const nextNum = String(num + dir).padStart(2, '0');
    selectBin(`W${letter}${nextNum}A`);
}

function leaveAisle() { switchScreen('setup'); }

window.onload = () => {
    if (auditorName) document.getElementById('name-display').textContent = auditorName;
    buildAisleGrid();
};
</script>
</body>
</html>
