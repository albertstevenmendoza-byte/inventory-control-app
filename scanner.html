<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novus Ops — Cycle Counter 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface-2: #f0f0f3;
            --surface-3: #e8e8ec;
            --border: #dcdce2;
            --text: #1a1a1f;
            --text-2: #6b6b78;
            --text-3: #9898a6;
            --accent: #3b6cf5;
            --accent-glow: rgba(59,108,245,0.08);
            --green: #16a34a;
            --green-bg: #f0fdf4;
            --green-border: #bbf7d0;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --red-border: #fecaca;
            --amber: #d97706;
            --amber-bg: #fffbeb;
            --amber-border: #fde68a;
            --purple: #7c3aed;
            --purple-bg: #f5f3ff;
            --purple-border: #ddd6fe;
            --cyan: #0891b2;
            --cyan-bg: #ecfeff;
            --cyan-border: #a5f3fc;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overscroll-behavior: none; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        button { font-family: inherit; border: none; cursor: pointer; -webkit-user-select: none; user-select: none; transition: transform 0.1s; }
        button:active { transform: scale(0.96); }
        input { font-family: inherit; }

        /* ===== SCREENS ===== */
        .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .screen.active { display: flex; }

        /* ===== HEADER ===== */
        .app-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); box-shadow: var(--shadow-sm); }
        .app-header h1 { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
        .sync-dot.offline { background: var(--red); animation: pulse 1.5s infinite; }

        /* ===== BIN NAVIGATION ===== */
        .bin-nav-cluster { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-arrow { background: var(--surface-3); color: var(--text); width: 36px; height: 36px; border-radius: 8px; font-size: 18px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .nav-arrow:disabled { opacity: 0.3; pointer-events: none; }

        /* ===== PHASE INDICATOR ===== */
        .phase-bar { display: flex; gap: 2px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .phase-step { flex: 1; height: 4px; border-radius: 2px; background: var(--surface-3); transition: background 0.4s; }
        .phase-step.done { background: var(--green); }
        .phase-step.active { background: var(--accent); }
        .phase-label { display: flex; justify-content: space-between; padding: 0 16px 8px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-3); }
        .phase-label span.active { color: var(--accent); }

        /* ===== HU CARDS ===== */
        .scroll-area { flex: 1; overflow-y: auto; padding: 16px 16px 200px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .hu-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 10px; transition: all 0.25s; box-shadow: var(--shadow-sm); }
        .hu-card.ok { border-color: var(--green-border); background: var(--green-bg); }
        .hu-card.missing { border-color: var(--red-border); background: var(--red-bg); opacity: 0.65; }
        .hu-card.movement { border-color: var(--purple-border); background: var(--purple-bg); }
        .hu-card.adjusted { border-color: var(--amber-border); background: var(--amber-bg); }

        .hu-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .hu-id { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-glow); padding: 4px 10px; border-radius: 6px; }
        .hu-status { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; border-radius: 6px; }
        
        .hu-meta { display: flex; gap: 16px; margin-bottom: 12px; }
        .hu-meta-label { font-size: 8px; font-weight: 700; text-transform: uppercase; color: var(--text-3); }
        .hu-meta-value { font-size: 14px; font-weight: 700; color: var(--text); }

        /* ===== QTY STEPPER ===== */
        .qty-row { display: flex; align-items: center; gap: 6px; background: var(--surface-2); border-radius: var(--radius-sm); padding: 8px; margin-bottom: 10px; }
        .qty-stepper { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--surface-3); color: var(--text); font-size: 20px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .qty-input { flex: 1; background: transparent; border: none; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 700; color: var(--accent); outline: none; }

        /* ===== BOTTOM BAR ===== */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px calc(env(safe-area-inset-bottom, 16px) + 12px); background: rgba(255,255,255,0.95); backdrop-filter: blur(24px); border-top: 1px solid var(--border); z-index: 50; display: flex; gap: 8px; }
        .primary-btn { flex: 3; padding: 18px 0; border-radius: var(--radius); font-size: 14px; font-weight: 800; text-transform: uppercase; background: var(--green); color: white; transition: background 0.2s; }
        .secondary-btn { flex: 1; padding: 18px 0; border-radius: var(--radius); font-size: 14px; background: var(--surface-3); color: var(--text-2); font-weight: 800; }

        /* ===== HUB SPECIFICS ===== */
        .aisle-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 16px; }
        .aisle-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px 0; text-align: center; font-size: 24px; font-weight: 900; }
        
        .search-container { padding: 16px; position: relative; }
        .search-field { width: 100%; padding: 16px 16px 16px 44px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface); font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 30px; top: 34px; color: var(--text-3); }

        /* ===== BIN STRIP ===== */
        .bin-strip { display: flex; gap: 6px; overflow-x: auto; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .strip-dot { min-width: 50px; height: 32px; border-radius: 8px; background: var(--surface-2); color: var(--text-2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; }
        .strip-dot.active { background: var(--accent); color: white; }

        /* ===== MODALS ===== */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
        .modal-sheet { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; width: 100%; padding: 24px 20px; animation: sheet-up 0.3s ease-out; }
        @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 20px; background: var(--accent); color: white; font-weight: 700; z-index: 1000; display: none; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="screen-setup" class="screen active">
    <div class="app-header">
        <h1>Novus Ops</h1>
        <div class="header-right">
            <div id="sync-dot" class="sync-dot"></div>
            <button class="name-btn">👤 <span id="name-display">Operator</span></button>
        </div>
    </div>
    <div class="scroll-area">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="hub-search" class="search-field" placeholder="Scan SKU, Bin, or type 'FRESH'...">
        </div>
        
        <div class="section-title" style="padding: 0 16px; font-size: 10px; font-weight: 800; color: var(--text-3); text-transform: uppercase;">Aisle Audit</div>
        <div class="aisle-grid" id="aisle-grid"></div>

        <div style="padding: 0 16px">
            <button onclick="initFreshMode()" style="width:100%; padding:20px; border-radius:var(--radius); background:linear-gradient(135deg, var(--amber), #d97706); color:white; font-weight:900; font-size:15px">START FRESH AUDIT</button>
        </div>
    </div>
</div>

<div id="screen-count" class="screen">
    <div class="app-header">
        <button onclick="switchScreen('setup')" style="background:none; font-weight:700; color:var(--accent); font-size: 13px;">← EXIT</button>
        <div class="bin-nav-cluster">
            <button id="btn-prev" class="nav-arrow" onclick="prevBin()">←</button>
            <h1 id="count-title" class="mono" style="font-size: 16px; width: 65px; text-align: center;"></h1>
            <button id="btn-next-top" class="nav-arrow" onclick="nextBin()">→</button>
        </div>
        <div class="sync-dot"></div>
    </div>
    <div class="phase-bar">
        <div id="p1" class="phase-step active"></div>
        <div id="p2" class="phase-step"></div>
        <div id="p3" class="phase-step"></div>
    </div>
    <div class="phase-label">
        <span id="l1" class="active">Verify</span>
        <span id="l2">Extras</span>
        <span id="l3">Review</span>
    </div>
    <div class="bin-strip" id="bin-strip"></div>
    <div class="scroll-area" id="hu-list">
        </div>
    <div class="bottom-bar">
        <button class="secondary-btn" onclick="manualJump()">Jump</button>
        <button class="primary-btn" id="btn-next" onclick="nextBin()">Next Bin →</button>
    </div>
</div>

<div id="screen-fresh" class="screen">
    <div class="app-header">
        <button onclick="switchScreen('setup')" style="background:none; font-weight:700; color:var(--amber)">← EXIT</button>
        <h1 id="fresh-title">FRESH Tally</h1>
        <div class="sync-dot"></div>
    </div>
    <div class="search-container">
        <input type="text" id="fresh-scan-input" class="search-field" style="border-color:var(--amber)" placeholder="Scan any pallet...">
    </div>
    <div class="scroll-area" id="fresh-list">
        </div>
    <div class="bottom-bar">
        <button class="primary-btn" style="background:var(--amber)" onclick="finalizeFresh()">Finalize Audit</button>
    </div>
</div>

<div id="modal-cc-trigger" class="modal-overlay">
    <div class="modal-sheet">
        <div style="text-align:center; margin-bottom:20px">
            <div style="font-size:48px">👻</div>
            <h2 style="font-weight:900">Ghost Item Detected</h2>
            <p style="color:var(--text-2); font-size:14px">HU <span id="ghost-hu" class="mono" style="color:var(--accent); font-weight:700"></span> is not in SAP.</p>
        </div>
        <p style="text-align:center; font-size:13px; color:var(--text-2); margin-bottom:24px">Would you like to pivot to a global Product Audit for this item?</p>
        <div style="display:flex; gap:10px">
            <button class="secondary-btn" style="flex:1" onclick="closeGhostModal()">Dismiss</button>
            <button class="primary-btn" style="flex:2; background:var(--accent)" onclick="pivotToProduct()">Start Audit</button>
        </div>
    </div>
</div>

<script>
    /**
     * STATE & CONFIG
     */
    const FRESH_SKUS = ["3305704","3307506","3307509","3307515","3307518","3307525","3307710","3308356","3309009","3309016","3309017","3309019","3309138","3309139"];
    const API_URL = 'https://script.google.com/macros/s/AKfycbwZ1Dhmf6cK_hWV2xLKYmwEImUvifIRCPqVm0Fz4E7gjvfcpyzoqhAFIgvgwrjBretc/exec';
    
    let sapMaster = [];
    let sessionRegistry = new Map(); // Global State (HU -> Record)
    let currentAisle = "";
    let currentBinIdx = 0;
    let currentBins = [];
    let activeGhostHU = "";

    // Init
    document.addEventListener('DOMContentLoaded', () => {
        renderAisleGrid();
        pullSAPData();

        // Command Bar Logic
        document.getElementById('hub-search').addEventListener('keypress', e => {
            if(e.key === 'Enter') {
                handleGateway(e.target.value.trim().toUpperCase());
                e.target.value = '';
            }
        });

        // Fresh Mode Scanner
        document.getElementById('fresh-scan-input').addEventListener('keypress', e => {
            if(e.key === 'Enter') {
                processFreshScan(e.target.value.trim().toUpperCase());
                e.target.value = '';
            }
        });
    });

    /**
     * 1. GATEWAY & NAVIGATION
     */
    function handleGateway(input) {
        if (!input) return;
        if (input === 'FRESH') return initFreshMode();
        
        const huMatch = sapMaster.find(i => i.hu === input);
        if (huMatch) return initProductAudit(huMatch.product);

        const skuMatch = sapMaster.filter(i => i.product === input);
        if (skuMatch.length > 0) return initProductAudit(input);

        if (input.match(/^W[A-P][0-9]{2}[A-C]$/)) {
            startAisleAudit(input.charAt(1), input);
            return;
        }
        showToast("No SAP Match Found", "red");
    }

    function startAisleAudit(aisle, targetBin = null) {
        currentAisle = aisle;
        currentBins = [];
        const max = (aisle === 'B' || aisle === 'C') ? 25 : 38;
        for(let i=0; i<=max; i++) {
            const num = String(i).padStart(2, '0');
            ["A","B","C"].forEach(s => currentBins.push(`W${aisle}${num}${s}`));
        }
        currentBinIdx = targetBin ? currentBins.indexOf(targetBin) : 0;
        switchScreen('count');
        updateBinView();
    }

    /**
     * 2. RECONCILIATION UI 
     */
    function renderHUList() {
        const container = document.getElementById('hu-list');
        const bin = currentBins[currentBinIdx];
        container.innerHTML = '';
        document.getElementById('count-title').innerText = bin;

        const expected = sapMaster.filter(i => i.sapBin === bin);
        const movementsHere = Array.from(sessionRegistry.values()).filter(i => i.foundIn === bin && i.sapBin !== bin);

        const allItems = [...expected];
        movementsHere.forEach(m => { if(!allItems.find(i => i.hu === m.hu)) allItems.push(m); });

        allItems.forEach(item => {
            const reg = sessionRegistry.get(item.hu);
            const movedElsewhere = !reg && Array.from(sessionRegistry.values()).find(r => r.hu === item.hu && r.status === 'MOVEMENT');

            const card = document.createElement('div');
            card.className = `hu-card ${reg ? reg.status.toLowerCase() : ''}`;
            
            const statusLabel = reg ? reg.status : (movedElsewhere ? 'MOVED' : 'PENDING');
            const statusClass = reg ? reg.status.toLowerCase() : (movedElsewhere ? 'move' : 'pending');

            // Dynamic UI states
            const currentQty = reg ? reg.scanQty : item.sapQty;
            const isAdj = currentQty !== item.sapQty;

            card.innerHTML = `
                <div class="hu-header">
                    <span class="hu-id">${item.hu}</span>
                    <span class="hu-status ${statusClass}">${statusLabel}</span>
                </div>
                <div class="hu-meta">
                    <div style="flex:2"><div class="hu-meta-label">Product</div><div class="hu-meta-value">${item.product}</div></div>
                    <div style="flex:1"><div class="hu-meta-label">SAP Qty</div><div class="hu-meta-value mono">${item.sapQty}</div></div>
                </div>
                
                ${movedElsewhere ? `<div style="font-size:11px; color:var(--purple); font-weight:700; margin-bottom:12px">📍 Found earlier in ${movedElsewhere.foundIn}</div>` : ''}
                
                ${reg && reg.note ? `<div style="font-size:12px; padding:8px; background:var(--surface-3); border-radius:6px; margin-bottom:12px; font-style:italic;">💬 ${reg.note}</div>` : ''}
                
                <div class="qty-row">
                    <button class="qty-stepper" onclick="adjQty('${item.hu}', -1)">−</button>
                    <input type="number" class="qty-input" id="qty-${item.hu}" value="${currentQty}" onchange="setQty('${item.hu}', this.value)">
                    <button class="qty-stepper" onclick="adjQty('${item.hu}', 1)">+</button>
                </div>

                <div style="display:flex; gap:6px; flex-wrap:wrap;">
                    <button class="primary-btn" style="flex:2; padding:12px; font-size:13px; background:${isAdj ? 'var(--amber)' : 'var(--green)'}" onclick="confirmItem('${item.hu}')">
                        ${isAdj ? 'Confirm Adj' : 'Confirm'}
                    </button>
                    <button class="secondary-btn" style="flex:1; padding:12px; font-size:12px; color:var(--purple)" onclick="initiateMovement('${item.hu}')">Move</button>
                    <button class="secondary-btn" style="flex:1; padding:12px; font-size:12px" onclick="addNote('${item.hu}')">Note</button>
                    <button class="secondary-btn" style="flex:1; padding:12px; font-size:12px; color:var(--red)" onclick="markMissing('${item.hu}')">Miss</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    /**
     * 3. STATE CONTROLLER (GAS Backend formatting)
     */
    function saveToRegistry(hu, updates) {
        const sap = sapMaster.find(i => i.hu === hu);
        const currentBin = currentBins[currentBinIdx];
        
        // Base object defaults to SAP expected values
        const current = sessionRegistry.get(hu) || {
            ...sap,
            scanQty: sap.sapQty,
            scanBin: currentBin, // defaults to physical bin being counted
            foundIn: currentBin,
            note: '',
            type: 'ok',
            status: 'PENDING'
        };
        
        const merged = { ...current, ...updates };
        
        // Evaluate Data Matrix for GAS Backend
        if (merged.status === 'MISSING' || merged.scanQty === 0) {
            merged.type = 'miss';
            merged.status = 'MISSING';
            merged.scanQty = 0; // Enforce 0 if marked missing
        } else {
            const isMoved = merged.scanBin !== merged.sapBin;
            const isAdj = merged.scanQty !== merged.sapQty;
            
            if (isMoved && isAdj) {
                merged.type = 'move_adj';
                merged.status = 'MOVEMENT';
            } else if (isMoved) {
                merged.type = 'move';
                merged.status = 'MOVEMENT';
            } else if (isAdj) {
                merged.type = 'adj';
                merged.status = 'ADJUSTED';
            } else {
                merged.type = 'ok';
                merged.status = 'OK';
            }
        }
        
        sessionRegistry.set(hu, merged);
        renderHUList();
    }

    // --- UI Action Wrappers ---

    function confirmItem(hu) {
        // Reads whatever is currently in the input field to lock it in
        const inputVal = parseInt(document.getElementById(`qty-${hu}`).value, 10) || 0;
        saveToRegistry(hu, { scanQty: inputVal, scanBin: currentBins[currentBinIdx] });
    }

    function adjQty(hu, delta) {
        const sap = sapMaster.find(i => i.hu === hu);
        const reg = sessionRegistry.get(hu);
        const currentQty = reg ? reg.scanQty : sap.sapQty;
        saveToRegistry(hu, { scanQty: Math.max(0, currentQty + delta) });
    }

    function setQty(hu, val) {
        saveToRegistry(hu, { scanQty: parseInt(val, 10) || 0 });
    }

    function markMissing(hu) {
        saveToRegistry(hu, { status: 'MISSING' });
    }

    function addNote(hu) {
        const reg = sessionRegistry.get(hu);
        const currentNote = reg ? reg.note : '';
        const note = prompt(`Enter audit note for HU ${hu}:`, currentNote);
        
        if (note !== null) { // if they didn't hit cancel
            saveToRegistry(hu, { note: note.trim() });
        }
    }

    function initiateMovement(hu) {
        const sap = sapMaster.find(i => i.hu === hu);
        const reg = sessionRegistry.get(hu);
        const currentDest = reg ? reg.scanBin : sap.sapBin;
        
        const dest = prompt(`Transfer HU ${hu}\nCurrently expected in: ${sap.sapBin}\n\nEnter physical destination bin:`, currentDest);
        
        if (dest && dest.trim() !== '') {
            saveToRegistry(hu, { scanBin: dest.trim().toUpperCase() });
            showToast(`Routed to ${dest.trim().toUpperCase()}`, "purple");
        }
    }


    /**
     * 4. FRESH MODE (RAPID TALLY)
     */
    function initFreshMode() {
        const list = document.getElementById('fresh-list');
        list.innerHTML = '';
        FRESH_SKUS.forEach(sku => {
            const card = document.createElement('div');
            card.className = 'hu-card';
            card.id = `fresh-${sku}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div>
                        <div class="hu-meta-label">SKU</div>
                        <div style="font-size:20px; font-weight:900">${sku}</div>
                    </div>
                    <div style="text-align:right">
                        <div id="tally-${sku}" style="font-size:32px; font-weight:900; color:var(--amber)">0</div>
                        <div class="hu-meta-label">Total Found</div>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
        switchScreen('fresh');
    }

    function processFreshScan(input) {
        const sap = sapMaster.find(i => i.hu === input || i.product === input);
        if (sap && FRESH_SKUS.includes(sap.product)) {
            const sku = sap.product;
            const reg = sessionRegistry.get(input) || { scanQty: 0 };
            sessionRegistry.set(input, { ...sap, scanQty: reg.scanQty + 1, status: 'OK' });
            
            // UI Update
            const total = Array.from(sessionRegistry.values()).filter(i => i.product === sku).reduce((s,i) => s+i.scanQty, 0);
            document.getElementById(`tally-${sku}`).innerText = total;
            document.getElementById(`fresh-${sku}`).style.borderColor = 'var(--amber)';
            showToast(`Added ${sku}`, "amber");
        } else {
            showToast("Invalid Item", "red");
        }
    }

    /**
     * UI UTILS & NAVIGATION
     */
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${id}`).classList.add('active');
    }

    function renderBinStrip() {
        const strip = document.getElementById('bin-strip');
        strip.innerHTML = '';
        const start = Math.max(0, currentBinIdx - 2);
        const end = Math.min(currentBins.length, start + 10);
        for(let i=start; i<end; i++) {
            const dot = document.createElement('div');
            dot.className = `strip-dot ${i === currentBinIdx ? 'active' : ''}`;
            dot.innerText = currentBins[i].slice(-3);
            dot.onclick = () => { currentBinIdx = i; updateBinView(); };
            strip.appendChild(dot);
        }
    }

    function nextBin() { 
        if(currentBinIdx < currentBins.length - 1) { 
            currentBinIdx++; 
            updateBinView(); 
        } 
    }

    function prevBin() {
        if(currentBinIdx > 0) {
            currentBinIdx--;
            updateBinView();
        }
    }

    function updateBinView() {
        renderHUList(); 
        renderBinStrip();
        
        const prevBtn = document.getElementById('btn-prev');
        const nextBtnTop = document.getElementById('btn-next-top');
        const nextBtnBot = document.getElementById('btn-next'); 
        
        // Disable arrows at the boundaries
        if (prevBtn) prevBtn.disabled = currentBinIdx === 0;
        if (nextBtnTop) nextBtnTop.disabled = currentBinIdx === currentBins.length - 1;
        
        // Visual indicator that the aisle is complete
        if (nextBtnBot) {
            if (currentBinIdx === currentBins.length - 1) {
                nextBtnBot.innerText = "Finish Aisle ✓";
                nextBtnBot.style.background = "var(--purple)";
            } else {
                nextBtnBot.innerText = "Next Bin →";
                nextBtnBot.style.background = "var(--green)";
            }
        }
    }

    function showToast(msg, color) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = `var(--${color})`;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    async function pullSAPData() {
        try {
            const res = await fetch(API_URL + '?type=sapdata');
            const data = await res.json();
            sapMaster = data.sapData;
            showToast("SAP Synced", "green");
        } catch(e) { showToast("Offline", "amber"); }
    }

    function renderAisleGrid() {
        const grid = document.getElementById('aisle-grid');
        "ABCDEFGHJKLMNP".split("").forEach(l => {
            const btn = document.createElement('div');
            btn.className = 'aisle-btn';
            btn.innerText = l;
            btn.onclick = () => startAisleAudit(l);
            grid.appendChild(btn);
        });
    }
</script>
</body>
</html>
