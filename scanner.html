<style>
:root {
  /* Enhanced Modern Dark Palette */
  --bg: #090a0f;
  --surface: #13151f;
  --surface-2: #1c1f2e;
  --surface-3: #262a3d;
  --border: #2d3142;
  --text: #f8fafc;
  --text-2: #94a3b8;
  --text-3: #64748b;
  
  /* Vibrant Accents */
  --accent: #3b82f6;
  --accent-dim: rgba(59, 130, 246, 0.15);
  --accent-glow: rgba(59, 130, 246, 0.3);
  
  --green: #10b981;
  --green-bg: rgba(16, 185, 129, 0.15);
  --red: #ef4444;
  --red-bg: rgba(239, 68, 68, 0.15);
  --amber: #f59e0b;
  --amber-bg: rgba(245, 158, 11, 0.15);
  --purple: #8b5cf6;
  --purple-bg: rgba(139, 92, 246, 0.15);
  
  --radius-sm: 12px;
  --radius: 16px;
  --radius-lg: 24px;
  
  /* Layout constraints for mobile-first scanning */
  --nav-height: 70px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { 
  font-family: 'DM Sans', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  min-height: 100dvh;
  overflow-x: hidden;
}

/* Typography Enhancements */
.mono { font-family: 'JetBrains Mono', monospace; }

/* Global Toast - Elevated Design */
.toast { 
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); 
  padding: 12px 24px; border-radius: 100px; font-size: 13px; font-weight: 700; 
  z-index: 99999; pointer-events: none; opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
  box-shadow: 0 12px 32px rgba(0,0,0,0.4); 
  backdrop-filter: blur(12px);
  display: flex; align-items: center; gap: 8px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.green { background: rgba(16, 185, 129, 0.9); color: #fff; border: 1px solid var(--green); }
.toast.red { background: rgba(239, 68, 68, 0.9); color: #fff; border: 1px solid var(--red); }
.toast.amber { background: rgba(245, 158, 11, 0.9); color: #fff; border: 1px solid var(--amber); }
.toast.blue { background: rgba(59, 130, 246, 0.9); color: #fff; border: 1px solid var(--accent); }

/* Animation Utility Classes */
@keyframes fade-in-up {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-enter { animation: fade-in-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

/* Glassmorphism Headers */
.glass-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(9, 10, 15, 0.8);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}

/* Action Buttons */
.btn-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  background: var(--surface-2); color: var(--text-2);
  display: flex; align-items: center; justify-content: center;
  border: 1px solid transparent; cursor: pointer; transition: all 0.2s;
}
.btn-icon:hover { background: var(--surface-3); color: var(--text); border-color: var(--border); }
.btn-icon:active { transform: scale(0.95); }

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #2563eb);
  color: #fff; border: none; padding: 14px 24px; border-radius: var(--radius-sm);
  font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 12px var(--accent-glow);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:active { transform: scale(0.97); box-shadow: 0 2px 4px var(--accent-glow); }

/* Card Styles */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.card.interactive:hover {
  transform: translateY(-2px);
  border-color: var(--surface-3);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

/* Input Fields */
.input-glass {
  width: 100%; padding: 16px 20px; border-radius: var(--radius-sm);
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text); font-size: 16px; font-weight: 600; outline: none;
  transition: all 0.2s;
}
.input-glass:focus {
  background: var(--surface); border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-dim);
}

/* Scrollbar Hiding for clean mobile look */
::-webkit-scrollbar { display: none; }

/* Bottom Navigation */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-height);
  background: rgba(19, 21, 31, 0.9); backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.05); z-index: 100;
  display: flex; justify-content: space-around; align-items: center;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  width: 100%; height: 100%; background: none; border: none; cursor: pointer;
  color: var(--text-3); transition: all 0.2s;
}
.nav-item.active { color: var(--accent); }
.nav-item span { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

/* Main App Container padding to clear bottom nav */
.app-layout { padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom) + 20px); }

/* Bento Grid */
.bento-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.bento-full { grid-column: 1 / -1; }
</style>

<script>
window.NovusSettings = (() => {
  const STORAGE_KEY = 'novus_settings';
  const DEFAULTS = { userName: '', theme: 'dark', pollInterval: 10, hapticFeedback: true, compactMode: false };

  function loadAll() {
    try { const r = localStorage.getItem(STORAGE_KEY); return r ? { ...DEFAULTS, ...JSON.parse(r) } : { ...DEFAULTS }; }
    catch { return { ...DEFAULTS }; }
  }
  function saveAll(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

  let _cache = loadAll();

  function get(key) { return _cache[key] !== undefined ? _cache[key] : DEFAULTS[key]; }
  function set(key, val) {
    _cache[key] = val; saveAll(_cache);
    if (key === 'userName') localStorage.setItem('novus_name', val);
  }
  function getUser() { return get('userName') || ''; }

  let _modalInjected = false;
  function _injectModal() {
    if (_modalInjected) return;
    _modalInjected = true;
    const overlay = document.createElement('div');
    overlay.id = 'novus-settings-overlay';
    overlay.innerHTML = `
      <div class="ns-modal" style="background:var(--surface);width:100%;max-width:400px;border-radius:24px;border:1px solid var(--border);padding:24px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
            <h3 style="margin:0;font-size:18px;color:var(--text);">⚙ Settings</h3>
            <button onclick="window.NovusSettings.closeModal()" style="background:none;border:none;color:var(--text-3);font-size:20px;cursor:pointer;">✕</button>
        </div>
        <label style="font-size:10px;font-weight:800;text-transform:uppercase;color:var(--text-3);display:block;margin-bottom:8px;">Identity (ID)</label>
        <input type="text" id="ns-username" class="input-glass" style="margin-bottom:24px;" placeholder="Enter your name...">
        <button onclick="window.NovusSettings._save()" class="btn-primary" style="width:100%;">Save Preferences</button>
      </div>`;
    Object.assign(overlay.style, {
        display: 'none', position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)', 
        backdropFilter: 'blur(8px)', zIndex: 99999, alignItems: 'center', justifyContent: 'center', padding: '20px'
    });
    document.body.appendChild(overlay);
  }

  function openModal() {
    _injectModal();
    document.getElementById('novus-settings-overlay').style.display = 'flex';
    document.getElementById('ns-username').value = get('userName');
  }
  function closeModal() { const o = document.getElementById('novus-settings-overlay'); if (o) o.style.display = 'none'; }
  function _save() {
    set('userName', document.getElementById('ns-username').value.trim());
    closeModal();
    if (typeof window.toast === 'function') window.toast('Settings saved', 'green');
    window.dispatchEvent(new CustomEvent('novus-settings-changed'));
  }

  return { get, set, getUser, openModal, closeModal, _save };
})();

window.toast = function(msg, color = 'blue') {
  const t = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  t.className = `toast ${color} show`;
  setTimeout(() => t.classList.remove('show'), 2500);
};
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const API_URL = 'https://script.google.com/macros/s/AKfycbwZ1Dhmf6cK_hWV2xLKYmwEImUvifIRCPqVm0Fz4E7gjvfcpyzoqhAFIgvgwrjBretc/exec';

const FRESH_ITEMS = ["3305704","3307506","3307509","3307515","3307518","3307525","3307710","3308356","3309009","3309016","3309017","3309019","3309138","3309139"];
const AISLES = ["WA","WB","WC","WD","WE","WF","WG","WH","WJ","WK","WL","WM","WN","WP"];
const BIN_SUFFIXES = ["A","B","C"];
const BIN_NUMBERS = Array.from({length:39},(_,i)=>String(i).padStart(2,"0"));

const generateBins = (aisle) => {
  const bins = [];
  BIN_NUMBERS.forEach(n => BIN_SUFFIXES.forEach(s => bins.push(`${aisle}${n}${s}`)));
  return bins;
};

// Polished SVG Icon Set
const Icon = ({name, size=22, color="currentColor"}) => {
  const icons = {
    search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>,
    x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>,
    alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>,
    box: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>,
    grid: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
    zap: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
    back: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>,
    minus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>,
    settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
    home: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    clipboard: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>,
  };
  return icons[name] || null;
};

function CycleCounter() {
  // Application State Hoisted to Prevent Re-mount Focus Loss
  const [sapData, setSapData] = useState({});
  const [mode, setMode] = useState("idle"); 
  const [records, setRecords] = useState({}); 
  const [ghostItems, setGhostItems] = useState([]); 

  const [showAisles, setShowAisles] = useState(false);
  const [selectedAisle, setSelectedAisle] = useState(null);
  const [currentBinIndex, setCurrentBinIndex] = useState(0);
  const [productSearch, setProductSearch] = useState("");
  const [activeProduct, setActiveProduct] = useState(null);

  const [freshCounts, setFreshCounts] = useState({}); 
  const [activeFreshItem, setActiveFreshItem] = useState(null);
  const [freshBinInput, setFreshBinInput] = useState("");
  const [bulkAmount, setBulkAmount] = useState(1);

  const [scanInput, setScanInput] = useState("");
  const [showReport, setShowReport] = useState(false);
  const [ghostPrompt, setGhostPrompt] = useState(null);
  const scanRef = useRef(null);
  const freshBinRef = useRef(null);

  const notify = useCallback((msg, type="info") => {
    let color = 'blue';
    if(type === 'success') color = 'green';
    if(type === 'error') color = 'red';
    if(type === 'warning') color = 'amber';
    if (window.toast) window.toast(msg, color);
  }, []);

  // ─── LIVE FETCH ───────────────────────────────────────────────────
  useEffect(() => {
    const fetchSAP = async () => {
      try {
        const res = await fetch(API_URL + '?type=sapdata');
        const data = await res.json();
        
        if (data.sapData && data.sapData.length > 0) {
          const formattedData = {};
          data.sapData.forEach(row => {
            formattedData[row.hu] = {
              hu: row.hu, material: row.product, expectedBin: row.sapBin,
              qty: row.sapQty, desc: row.desc, batch: row.batch
            };
          });
          setSapData(formattedData);
        }
      } catch (err) {
        console.error("SAP Fetch Error:", err);
        notify("Offline or API Error", "error");
      }
    };
    fetchSAP();
  }, [notify]);

  // ─── DERIVED DATA ─────────────────────────────────────────────────
  const currentBins = useMemo(() => {
    if (mode === "aisle" && selectedAisle) return generateBins(selectedAisle);
    return [];
  }, [mode, selectedAisle]);

  const currentBin = currentBins[currentBinIndex] || null;

  const expectedHUsForBin = useMemo(() => {
    if (!currentBin) return [];
    return Object.values(sapData).filter(h => h.expectedBin === currentBin);
  }, [currentBin, sapData]);

  const productLocations = useMemo(() => {
    if (!activeProduct) return [];
    return Object.values(sapData).filter(h => h.material === activeProduct);
  }, [activeProduct, sapData]);

  const freshSAPData = useMemo(() => {
    const grouped = {};
    FRESH_ITEMS.forEach(mat => {
      const hus = Object.values(sapData).filter(h => h.material === mat);
      grouped[mat] = { material: mat, hus, totalExpected: hus.reduce((s,h)=>s+h.qty,0), binCount: new Set(hus.map(h=>h.expectedBin)).size };
    });
    return grouped;
  }, [sapData]);

  // ─── CONFLICT RESOLUTION ENGINE ───────────────────────────────────
  const resolveState = useCallback((hu, foundBin) => {
    const sapRecord = sapData[hu];
    if (!sapRecord) return "GHOST";
    if (sapRecord.expectedBin === foundBin) return "OK";
    return "MOVEMENT";
  }, [sapData]);

  const checkMovementConflict = useCallback((hu) => {
    return records[hu]?.state === "MOVEMENT";
  }, [records]);

  // ─── SCAN HANDLERS ────────────────────────────────────────────────
  const handleScan = useCallback((inputHU, contextBin) => {
    const hu = inputHU.trim();
    if (!hu) return;

    const state = resolveState(hu, contextBin);
    const sapRecord = sapData[hu];

    if (state === "GHOST") {
      setGhostPrompt({ hu, bin: contextBin });
      return;
    }

    const record = {
      hu, state, foundBin: contextBin, expectedBin: sapRecord.expectedBin,
      material: sapRecord.material, qty: sapRecord.qty, timestamp: Date.now()
    };

    setRecords(prev => ({ ...prev, [hu]: record }));

    if (state === "OK") notify(`✓ HU ${hu} verified in ${contextBin}`, "success");
    else if (state === "MOVEMENT") notify(`⇄ HU ${hu} MOVED to ${contextBin}`, "warning");

    setScanInput("");
    scanRef.current?.focus();
  }, [resolveState, sapData, notify]);

  const finalizeBin = useCallback(async (bin) => {
    const expected = Object.values(sapData).filter(h => h.expectedBin === bin);
    const newRecords = { ...records };
    let missingCount = 0;
    const itemsToPost = [];

    expected.forEach(h => {
      if (!newRecords[h.hu] && !checkMovementConflict(h.hu)) {
        newRecords[h.hu] = {
          hu: h.hu, state: "MISSING", foundBin: null,
          expectedBin: h.expectedBin, material: h.material, qty: h.qty, timestamp: Date.now()
        };
        missingCount++;
      }
      
      const rec = newRecords[h.hu];
      if (rec) {
        let gasType = 'ok';
        if (rec.state === 'MISSING') gasType = 'miss';
        if (rec.state === 'MOVEMENT') gasType = 'move';

        itemsToPost.push({
          hu: rec.hu, product: rec.material, desc: sapData[rec.hu]?.desc || '',
          batch: sapData[rec.hu]?.batch || '', sapBin: rec.expectedBin, sapQty: rec.qty,
          countQty: rec.state === 'MISSING' ? 0 : rec.qty, type: gasType,
          note: rec.state === 'MOVEMENT' ? `Found in ${rec.foundBin}` : ''
        });
      }
    });

    setRecords(newRecords);

    if (itemsToPost.length > 0) {
      const sessionId = 'REACT-' + new Date().toISOString().split('T')[0];
      const payload = {
        action: 'logAudit', user: window.NovusSettings.getUser() || 'React Counter',
        bin: bin, sessionId: sessionId,
        idempotencyKey: `${sessionId}|${bin}|ReactCounter|${itemsToPost.length}`,
        items: itemsToPost
      };

      try {
        await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
        if (missingCount > 0) notify(`${missingCount} items missing. Bin finalized.`, "warning");
        else notify(`Bin ${bin} synced to SAP.`, "success");
      } catch (err) { notify("Failed to sync to SAP.", "error"); }
    } else {
      notify(`Bin ${bin} skipped.`, "info");
    }
  }, [sapData, records, checkMovementConflict, notify]);

  // ─── GHOST & FRESH LOGIC ──────────────────────────────────────────
  const acceptGhostAudit = useCallback(() => {
    if (!ghostPrompt) return;
    setGhostItems(prev => [...prev, ghostPrompt]);
    setActiveProduct(ghostPrompt.hu);
    setMode("product"); setGhostPrompt(null);
    notify("Pivoting to Product Audit for ghost item", "info");
  }, [ghostPrompt, notify]);

  const dismissGhost = useCallback(() => {
    if (!ghostPrompt) return;
    setGhostItems(prev => [...prev, ghostPrompt]);
    setGhostPrompt(null); notify("Ghost item logged", "info");
  }, [ghostPrompt, notify]);

  const updateFreshCount = useCallback((material, bin, delta) => {
    setFreshCounts(prev => {
      const existing = prev[material] || { locations: [], totalQty: 0 };
      const locIdx = existing.locations.findIndex(l => l.bin === bin);
      let newLocs = [...existing.locations];
      if (locIdx >= 0) {
        const newQty = Math.max(0, newLocs[locIdx].qty + delta);
        if (newQty === 0) newLocs.splice(locIdx, 1);
        else newLocs[locIdx] = { ...newLocs[locIdx], qty: newQty };
      } else if (delta > 0) { newLocs.push({ bin, qty: delta }); }
      return { ...prev, [material]: { locations: newLocs, totalQty: newLocs.reduce((s,l)=>s+l.qty, 0) } };
    });
  }, []);

  const addFreshScan = useCallback((material, bin, amount = 1) => {
    if (!bin.trim()) return;

      missing: all.filter(r => r.state === "MISSING").length,
      movement: all.filter(r => r.state === "MOVEMENT").length,
      ghosts: ghostItems.length, records: all,
      accuracy: all.length ? ((all.filter(r=>r.state==="OK").length / all.length)*100).toFixed(1) : "0.0"
    };
  }, [records, ghostItems]);

  const freshReportData = useMemo(() => {
    return FRESH_ITEMS.map(mat => {
      const sap = freshSAPData[mat] || { totalExpected: 0, binCount: 0 };
      const counted = freshCounts[mat] || { locations: [], totalQty: 0 };
      return { material: mat, expected: sap.totalExpected, counted: counted.totalQty, variance: counted.totalQty - sap.totalExpected, locations: counted.locations, sapBins: sap.binCount };

              </button>

                <div className="card" style={{ padding: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: "var(--text-3)", textTransform: "uppercase", fontWeight: 800, marginBottom: 8 }}>Counted</div>
                  <div className="mono" style={{ fontSize: 28, fontWeight: 800, color: "var(--green)" }}>{freshReportData.filter(r => r.counted > 0).length}/{FRESH_ITEMS.length}</div>
                </div>
                <div className="card" style={{ padding: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: "var(--text-3)", textTransform: "uppercase", fontWeight: 800, marginBottom: 8 }}>Total Var</div>
                  <div className="mono" style={{ fontSize: 28, fontWeight: 800, color: freshReportData.reduce((s,r)=>s+Math.abs(r.variance),0) === 0 ? "var(--green)" : "var(--red)" }}>
                    {freshReportData.reduce((s,r)=>s+Math.abs(r.variance),0)}
                  </div>
                </div>
              </div>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead><tr style={{ borderBottom: "1px solid var(--border)", color: "var(--text-3)", textAlign: "left" }}><th style={{paddingBottom: 8}}>Material</th><th style={{paddingBottom: 8}}>Exp</th><th style={{paddingBottom: 8}}>Count</th><th style={{paddingBottom: 8}}>Var</th></tr></thead>
                <tbody>
                  {freshReportData.map(r => (
                    <tr key={r.material} style={{ borderBottom: "1px solid var(--surface-2)" }}>
                      <td className="mono" style={{ padding: "12px 0", fontWeight: 700 }}>{r.material}</td>
                      <td style={{ color: "var(--text-2)" }}>{r.expected}</td>
                      <td style={{ fontWeight: 800, color: r.counted > 0 ? "var(--green)" : "var(--text-3)" }}>{r.counted}</td>
                      <td style={{ fontWeight: 800, color: r.variance === 0 ? "var(--green)" : r.variance > 0 ? "var(--amber)" : "var(--red)" }}>{r.variance > 0 ? "+" : ""}{r.variance}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </>
          ) : (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 24 }}>
                {[ { label: "OK", value: reportData.ok, color: "var(--green)" }, { label: "Missing", value: reportData.missing, color: "var(--red)" }, { label: "Moved", value: reportData.movement, color: "var(--amber)" }, { label: "Ghost", value: reportData.ghosts, color: "var(--accent)" }].map(s => (
                  <div key={s.label} className="card" style={{ padding: 12, textAlign: "center", background: "var(--surface-2)" }}>
                    <div style={{ fontSize: 9, color: s.color, fontWeight: 800, textTransform: "uppercase", marginBottom: 6 }}>{s.label}</div>
                    <div className="mono" style={{ fontSize: 24, fontWeight: 900, color: s.color }}>{s.value}</div>
                  </div>
                ))}
              </div>

              {reportData.records.filter(r => r.state !== "OK").length > 0 && (
                <>
                  <p style={{ fontSize: 10, color: "var(--text-3)", margin: "0 0 12px", textTransform: "uppercase", fontWeight: 800 }}>Discrepancies</p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {reportData.records.filter(r => r.state !== "OK").map(r => (
                      <div key={r.hu} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", borderRadius: "12px", background: "var(--surface-2)" }}>
                        <span style={{ padding: "4px 8px", borderRadius: 6, fontSize: 9, fontWeight: 900, textTransform: "uppercase", background: r.state === "MISSING" ? "var(--red-bg)" : "var(--amber-bg)", color: r.state === "MISSING" ? "var(--red)" : "var(--amber)" }}>{r.state}</span>
                        <span className="mono" style={{ fontWeight: 700, fontSize: 14 }}>{r.hu}</span>
                        <span style={{ color: "var(--text-3)", fontSize: 12 }}>{r.material}</span>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </>
          )}

          <button onClick={() => setShowReport(false)} className="btn-primary" style={{ width: "100%", marginTop: 32, padding: "16px" }}>Close Report</button>
        </div>
      </div>
    );
  };

  return (
    <>
      {renderGhostModal()}
      {renderReportModal()}
      {mode === "idle" && renderIdleScreen()}
      {mode === "aisle" && renderAisleAuditScreen()}
      {mode === "product" && renderProductAuditScreen()}
      {mode === "fresh" && renderFreshAuditScreen()}
      {renderBottomNav()}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CycleCounter />);
</script>
</body>
</html>
