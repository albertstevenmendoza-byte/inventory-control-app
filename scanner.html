<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Novus Ops — Cycle Counter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#181a23;--surface-2:#1f2230;--surface-3:#2a2d3a;--border:#313546;--text:#eceef4;--text-2:#9ba1b5;--text-3:#6c7189;--accent:#5b9aff;--accent-dim:rgba(91,154,255,.1);--green:#34d399;--green-bg:rgba(52,211,153,.1);--red:#f87171;--red-bg:rgba(248,113,113,.1);--amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);--purple:#a78bfa;--purple-bg:rgba(167,139,250,.1);--cyan:#22d3ee;--cyan-bg:rgba(34,211,238,.1);--radius:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}
button{cursor:pointer;border:none;font-family:inherit;transition:transform .1s}
button:active{transform:scale(.97)}

/* Layout */
.app-container{display:flex;flex-direction:column;height:100dvh}
.header{padding:16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.header h1{font-size:16px;font-weight:900}
.mode-badge{font-size:9px;font-weight:800;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:var(--accent-dim);color:var(--accent);letter-spacing:1px}

/* Command Bar */
.command-bar{padding:12px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.cmd-input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-weight:600;outline:none}
.cmd-input:focus{border-color:var(--accent)}
.cmd-btn{background:var(--accent);color:#fff;padding:0 20px;border-radius:12px;font-size:12px;font-weight:800}

/* Content Areas */
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:100px}
.content::-webkit-scrollbar{display:none}

/* FRESH Mode Specifics */
.fresh-grid{display:flex;flex-direction:column;gap:10px}
.fresh-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:8px}
.fresh-card.complete{border-color:var(--green);background:var(--green-bg)}
.fresh-card h2{font-size:14px;font-weight:800}
.fresh-stats{display:flex;justify-content:space-between;align-items:flex-end}
.tally-box{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700}
.tally-label{font-size:9px;color:var(--text-3);text-transform:uppercase;font-weight:700}
.progress-bar{height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .3s}

/* Standard Mode (Bin) */
.hu-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;position:relative}
.hu-card.moved-elsewhere{opacity:0.6;border-style:dashed}
.hu-card.found{border-color:var(--green)}
.hu-badge{position:absolute;top:16px;right:16px;font-size:8px;font-weight:800;padding:4px 8px;border-radius:6px;text-transform:uppercase}
.hu-badge.moved{background:var(--purple-bg);color:var(--purple)}
.hu-badge.ghost{background:var(--red-bg);color:var(--red)}

/* Footer Controls */
.footer{position:fixed;bottom:0;left:0;right:0;padding:16px;background:rgba(15,17,23,0.9);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;gap:8px}
.footer-btn{flex:1;padding:16px;border-radius:14px;font-size:13px;font-weight:800;text-transform:uppercase}
.btn-secondary{background:var(--surface-3);color:var(--text-2)}
.btn-primary{background:var(--green);color:#fff}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;top:30px}
.toast.green{background:var(--green);color:#fff}
.toast.red{background:var(--red);color:#fff}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="app-container">
    <header class="header">
        <div>
            <h1>Novus Ops</h1>
            <span id="mode-display" class="mode-badge">Standby</span>
        </div>
        <div id="sync-status" style="font-size:10px; color:var(--text-3)">● Offline</div>
    </header>

    <div class="command-bar">
        <input type="text" id="cmd-input" class="cmd-input" placeholder="Scan Bin, SKU, or type 'FRESH'...">
        <button class="cmd-btn" onclick="handleCommand()">GO</button>
    </div>

    <main class="content" id="main-content">
        <div style="text-align:center; padding-top:100px; color:var(--text-3)">
            <p style="font-size:48px">📡</p>
            <p style="font-weight:700; margin-top:10px">Ready for Scan</p>
        </div>
    </main>

    <footer class="footer" id="footer-controls" style="display:none">
        <button class="footer-btn btn-secondary" onclick="resetApp()">Cancel</button>
        <button class="footer-btn btn-primary" id="finalize-btn" onclick="finalizeSession()">Submit Audit</button>
    </footer>
</div>

<script>
/**
 * RECONCILIATION ENGINE CONFIG
 */
const FRESH_SKUS = [3305704, 3307506, 3307509, 3307515, 3307518, 3307525, 3307710, 3308356, 3309009, 3309016, 3309017, 3309019, 3309138, 3309139];
const API_URL = 'https://script.google.com/macros/s/AKfycbwZ1Dhmf6cK_hWV2xLKYmwEImUvifIRCPqVm0Fz4E7gjvfcpyzoqhAFIgvgwrjBretc/exec';

let sapMaster = JSON.parse(localStorage.getItem('novus_sap') || '[]');
let session = {
    mode: 'STANDBY',
    target: null, // Aisle, SKU, or 'FRESH'
    registry: new Map(), // Global Session Registry (HU -> Data)
    expectedHUs: []
};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    if (sapMaster.length === 0) pullCloudData();
    updateSyncStatus();
});

/**
 * 1. COMMAND GATEWAY
 */
function handleCommand() {
    const input = document.getElementById('cmd-input').value.trim().toUpperCase();
    if (!input) return;
    document.getElementById('cmd-input').value = '';

    if (input === 'FRESH') {
        initFreshMode();
    } else if (input.match(/^W[A-P][0-9]{2}[A-C]$/)) {
        initBinAudit(input);
    } else if (input.length > 4) {
        initProductAudit(input);
    } else {
        showToast("Unknown Command", "red");
    }
}

/**
 * 2. SESSION INITIALIZERS
 */
function initFreshMode() {
    session.mode = 'FRESH';
    session.target = 'FRESH';
    session.registry.clear();
    
    // Load all FRESH HUs from SAP Master into registry
    const freshData = sapMaster.filter(i => FRESH_SKUS.includes(Number(i.product)));
    freshData.forEach(item => {
        session.registry.set(item.hu, {
            ...item,
            status: 'EXPECTED',
            foundAt: null,
            scanQty: 0
        });
    });

    renderFreshDashboard();
    updateUI();
}

function initBinAudit(bin) {
    session.mode = 'BIN';
    session.target = bin;
    const items = sapMaster.filter(i => i.sapBin === bin);
    
    items.forEach(item => {
        if (!session.registry.has(item.hu)) {
            session.registry.set(item.hu, { ...item, status: 'EXPECTED', foundAt: null });
        }
    });

    renderBinView(bin);
    updateUI();
}

/**
 * 3. RECONCILIATION LOGIC (Override & Ghost Rules)
 */
function processScan(scannedValue) {
    // Logic to handle HU scan within a session
    const hu = scannedValue.trim();
    const entry = session.registry.get(hu);

    if (session.mode === 'FRESH') {
        if (entry) {
            entry.status = 'FOUND_OK';
            entry.scanQty = entry.sapQty;
            showToast(`Found ${entry.product}`, "green");
            renderFreshDashboard();
        } else {
            handleGhostItem(hu);
        }
    } else if (session.mode === 'BIN') {
        const itemInBin = Array.from(session.registry.values())
            .find(i => i.hu === hu && i.sapBin === session.target);

        if (itemInBin) {
            itemInBin.status = 'FOUND_OK';
            renderBinView(session.target);
        } else {
            handleMovement(hu);
        }
    }
}

function handleMovement(hu) {
    const sapMatch = sapMaster.find(i => i.hu === hu);
    if (sapMatch) {
        showToast(`MOVED: Item belongs in ${sapMatch.sapBin}`, "amber");
        session.registry.set(hu, { ...sapMatch, status: 'FOUND_MOVED', foundAt: session.target });
        if (session.mode === 'BIN') renderBinView(session.target);
    } else {
        handleGhostItem(hu);
    }
}

function handleGhostItem(hu) {
    showToast("GHOST: Item not in SAP manifest", "red");
    // Logic to add to registry as UNEXPECTED
    session.registry.set(hu, { hu, product: 'UNKNOWN', sapQty: 0, status: 'GHOST', foundAt: session.target || 'FRESH' });
    if (session.mode === 'BIN') renderBinView(session.target);
}

/**
 * 4. UI RENDERING
 */
function renderFreshDashboard() {
    const container = document.getElementById('main-content');
    let html = `<div class="fresh-grid">`;

    FRESH_SKUS.forEach(sku => {
        const items = Array.from(session.registry.values()).filter(i => Number(i.product) === sku);
        const total = items.length;
        const found = items.filter(i => i.status === 'FOUND_OK').length;
        const percent = total > 0 ? (found / total) * 100 : 0;

        html += `
            <div class="fresh-card ${percent === 100 ? 'complete' : ''}">
                <div style="display:flex; justify-content:space-between">
                    <h2>SKU: ${sku}</h2>
                    <span class="tally-label">${percent === 100 ? '✅ Ready' : 'In Progress'}</span>
                </div>
                <div class="fresh-stats">
                    <div class="tally-box">${found} <span style="font-size:14px; color:var(--text-3)">/ ${total}</span></div>
                    <div class="tally-label">Pallets Found</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${percent}%"></div>
                </div>
            </div>`;
    });

    html += `</div>`;
    container.innerHTML = html;
}

function renderBinView(bin) {
    const container = document.getElementById('main-content');
    const itemsInBin = Array.from(session.registry.values()).filter(i => i.sapBin === bin || i.foundAt === bin);
    
    let html = `<h3>Audit: ${bin}</h3><br>`;
    
    itemsInBin.forEach(item => {
        const isMoved = item.status === 'FOUND_MOVED';
        const isGhost = item.status === 'GHOST';
        
        html += `
            <div class="hu-card ${item.status === 'FOUND_OK' ? 'found' : ''}">
                ${isMoved ? '<span class="hu-badge moved">Moved</span>' : ''}
                ${isGhost ? '<span class="hu-badge ghost">Ghost</span>' : ''}
                <div class="mono" style="color:var(--accent)">${item.hu}</div>
                <div style="font-size:12px; font-weight:700">${item.product}</div>
                <div style="font-size:11px; color:var(--text-3)">SAP Bin: ${item.sapBin || 'None'}</div>
            </div>`;
    });

    container.innerHTML = html;
}

/**
 * UTILITIES
 */
function updateUI() {
    document.getElementById('mode-display').textContent = session.mode;
    document.getElementById('footer-controls').style.display = session.mode === 'STANDBY' ? 'none' : 'flex';
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove('show'), 3000);
    if (navigator.vibrate) navigator.vibrate(50);
}

async function pullCloudData() {
    try {
        const res = await fetch(API_URL + '?type=sapdata');
        const data = await res.json();
        sapMaster = data.sapData;
        localStorage.setItem('novus_sap', JSON.stringify(sapMaster));
        showToast("SAP Data Synced", "green");
    } catch (e) {
        showToast("Sync Failed", "red");
    }
}

function updateSyncStatus() {
    const status = document.getElementById('sync-status');
    if (navigator.onLine) {
        status.textContent = "● Online";
        status.style.color = "var(--green)";
    } else {
        status.textContent = "● Offline Mode";
        status.style.color = "var(--amber)";
    }
}

function resetApp() {
    if (confirm("Cancel current audit? Data will be lost.")) {
        location.reload();
    }
}

// Global Listener for Scanners
document.addEventListener('keypress', e => {
    if (e.key === 'Enter') {
        const input = document.getElementById('cmd-input');
        if (document.activeElement !== input) {
            // Treat as background scanner input
            // (Implementation for hidden buffer would go here)
        }
    }
});
</script>
</body>
</html>
