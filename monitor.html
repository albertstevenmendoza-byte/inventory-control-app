<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Control Center — Novus Ops</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#181a23;--surface-2:#1f2230;--surface-3:#2a2d3a;--border:#313546;--text:#eceef4;--text-2:#9ba1b5;--text-3:#6c7189;--accent:#5b9aff;--accent-dim:rgba(91,154,255,.1);--green:#34d399;--green-bg:rgba(52,211,153,.1);--red:#f87171;--red-bg:rgba(248,113,113,.1);--amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);--purple:#a78bfa;--purple-bg:rgba(167,139,250,.1);--cyan:#22d3ee;--cyan-bg:rgba(34,211,238,.1);--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.dashboard{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{font-size:20px}
.topbar h1{font-size:15px;font-weight:800}
.topbar-sub{font-size:9px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px}
.topbar-right{display:flex;align-items:center;gap:10px}
.freshness{padding:5px 12px;border-radius:8px;font-size:10px;font-weight:700}
.freshness.fresh{background:var(--green-bg);color:var(--green)}.freshness.stale{background:var(--amber-bg);color:var(--amber)}
.freshness.old{background:var(--red-bg);color:var(--red)}.freshness.none{background:var(--surface-2);color:var(--text-3)}
.metrics-row{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0}
.metric{flex:1;background:var(--surface);padding:12px 16px}
.m-label{display:block;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3)}
.m-val{display:block;font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;margin-top:2px}
.panes{flex:1;display:flex;overflow:hidden}
.rail{width:280px;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;flex-shrink:0}
.rail-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.rail-section h3{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);margin-bottom:10px}
.upload-zone{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px;border:2px dashed var(--border);border-radius:12px;cursor:pointer;transition:all .2s;text-align:center}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-dim)}
.assign-btn{width:100%;padding:10px;border-radius:8px;font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;border:none;margin-top:8px}
.assign-btn.push{background:var(--accent);color:#fff}
.main-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.status-pills{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto}
.pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;background:var(--surface-2);cursor:pointer;border:1.5px solid transparent;white-space:nowrap}
.pill.active{border-color:var(--accent);background:var(--accent-dim)}
.table-wrap{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
thead{position:sticky;top:0;background:var(--surface);z-index:5}
th{padding:10px 12px;font-size:8px;font-weight:800;text-transform:uppercase;color:var(--text-3);text-align:left;border-bottom:2px solid var(--border)}
td{padding:7px 12px;border-bottom:1px solid var(--border)}
tr:hover{background:var(--surface-2)}
.status-tag{font-size:8px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.status-tag.ok{background:var(--green-bg);color:var(--green)}
.status-tag.miss,.status-tag.missing{background:var(--red-bg);color:var(--red)}
.status-tag.adj{background:var(--amber-bg);color:var(--amber)}
.status-tag.unexpected{background:var(--cyan-bg);color:var(--cyan)}
.status-tag.move{background:var(--purple-bg);color:var(--purple)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:12px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.green{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.toast.amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber)}
.toast.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.aisle-pick{padding:6px 10px;border-radius:8px;background:var(--surface-2);border:1.5px solid var(--border);font-size:11px;font-weight:800;color:var(--text-3);cursor:pointer;margin:2px}
.aisle-pick.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<div id="toast" class="toast"><span id="toast-text"></span></div>

<div class="dashboard">
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">📊</span>
      <div><h1>Control Center</h1><span class="topbar-sub">Plant 1730</span></div>
    </div>
    <div class="topbar-right">
      <div class="freshness none" id="freshness-badge">📋 Loading...</div>
      <button class="assign-btn" style="width:auto; margin:0; padding:6px 12px; background:var(--surface-2); color:var(--text-2)" onclick="location.reload()">↻ Refresh</button>
    </div>
  </header>

  <div class="metrics-row">
    <div class="metric"><span class="m-label">SAP Items</span><span class="m-val" id="m-items">—</span></div>
    <div class="metric"><span class="m-label">Total Audited</span><span class="m-val" id="m-total">—</span></div>
    <div class="metric"><span class="m-label">OK</span><span class="m-val" id="m-ok" style="color:var(--green)">—</span></div>
    <div class="metric"><span class="m-label">Adjustments</span><span class="m-val" id="m-adj" style="color:var(--amber)">—</span></div>
    <div class="metric"><span class="m-label">Missing</span><span class="m-val" id="m-miss" style="color:var(--red)">—</span></div>
  </div>

  <div class="panes">
    <aside class="rail">
      <div class="rail-section">
        <h3>SAP Data Feed</h3>
        <label class="upload-zone" id="upload-zone">
          <input type="file" accept=".xlsx,.xls" id="file-input" hidden>
          <span id="uz-label">Drop SAP Export (.xlsx)</span>
        </label>
        <div id="upload-meta" style="font-size:9px; color:var(--text-3); margin-top:8px;"></div>
      </div>
      
      <div class="rail-section">
        <h3>Aisle Assignments</h3>
        <div id="aisle-picker" style="display:flex; flex-wrap:wrap; gap:2px; margin-bottom:8px;"></div>
        <button class="assign-btn push" onclick="pushAssignments()">Push to Team</button>
        <button class="assign-btn" style="background:var(--surface-3); color:var(--text-3)" onclick="clearAssignments()">Clear All</button>
      </div>

      <div class="rail-section">
        <h3>Audit Management</h3>
        <button class="assign-btn push" onclick="exportAudit()">📥 Export Audit Data</button>
        <button class="assign-btn" style="background:var(--red-bg); color:var(--red); border:1px solid var(--red)" onclick="finalizeReconciliation()">🔒 Finalize Missing</button>
      </div>
    </aside>

    <main class="main-pane">
      <div class="status-pills" id="status-pills"></div>
      <div class="table-wrap" id="table-wrap">
        <div style="text-align:center; padding:100px; color:var(--text-3)">
            <p>Select a filter or upload SAP data to begin.</p>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwZ1Dhmf6cK_hWV2xLKYmwEImUvifIRCPqVm0Fz4E7gjvfcpyzoqhAFIgvgwrjBretc/exec';
const AISLE_ROWS = 'ABCDEFGHJKLMNP'.split('');
let report = [];
let assignAisles = new Set();
let currentFilter = 'all';

function showToast(msg, color) {
  const t = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  t.className = `toast ${color || 'green'} show`;
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function fetchData() {
  try {
    const res = await fetch(API_URL + '?t=' + Date.now());
    const data = await res.json();
    report = data.report || [];
    updateMetrics(data.sapMeta);
    renderPills();
    renderTable(currentFilter);
  } catch (e) { console.error(e); }
}

function updateMetrics(meta) {
  if (!meta) return;
  document.getElementById('m-items').textContent = Number(meta.rowCount || 0).toLocaleString();
  document.getElementById('m-total').textContent = report.length;
  document.getElementById('m-ok').textContent = report.filter(r => r.type === 'ok').length;
  document.getElementById('m-adj').textContent = report.filter(r => r.type === 'adj').length;
  document.getElementById('m-miss').textContent = report.filter(r => r.type === 'miss' || r.type === 'missing' || r.type === 'missing_temp').length;
  
  const badge = document.getElementById('freshness-badge');
  badge.className = 'freshness fresh';
  badge.textContent = `📋 SAP: ${new Date(meta.timestamp).toLocaleDateString()} ${new Date(meta.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
  
  document.getElementById('upload-meta').innerHTML = `File: ${meta.filename || '—'}<br>By: ${meta.uploader || '—'}`;
}

function renderPills() {
  const counts = { all: report.length, ok: 0, adj: 0, miss: 0, unexpected: 0, move: 0 };
  report.forEach(r => { 
    if(counts[r.type] !== undefined) counts[r.type]++; 
    else if(r.type === 'missing' || r.type === 'missing_temp') counts.miss++;
  });
  
  const categories = [
    { key: 'all', label: 'ALL', color: '' },
    { key: 'ok', label: 'OK', color: 'green' },
    { key: 'adj', label: 'ADJ', color: 'amber' },
    { key: 'miss', label: 'MISSING', color: 'red' },
    { key: 'unexpected', label: 'EXTRA', color: 'cyan' },
    { key: 'move', label: 'MOVED', color: 'purple' }
  ];

  document.getElementById('status-pills').innerHTML = categories.map(cat => `
    <div class="pill ${currentFilter === cat.key ? 'active' : ''}" onclick="setFilter('${cat.key}')">
        <span style="font-weight:800; color:var(--${cat.color || 'accent'})">${counts[cat.key]}</span> ${cat.label}
    </div>
  `).join('');
}

function setFilter(f) { currentFilter = f; renderTable(f); renderPills(); }

function renderTable(filter) {
  const filtered = filter === 'all' ? report : report.filter(r => r.type === filter || (filter==='miss' && (r.type==='missing' || r.type==='missing_temp')));
  
  if(filtered.length === 0) {
      document.getElementById('table-wrap').innerHTML = `<div style="text-align:center; padding:100px; color:var(--text-3)">No items found for this filter.</div>`;
      return;
  }

  const html = `
    <table>
      <thead>
        <tr><th>Time</th><th>User</th><th>Bin</th><th>HU</th><th>Product</th><th>SAP</th><th>Count</th><th>Status</th></tr>
      </thead>
      <tbody>
        ${filtered.slice().reverse().map(r => {
          const hasPhoto = (r.photoUrl && r.photoUrl.length > 50);
          const photoIcon = hasPhoto ? `<span style="cursor:pointer; font-size:14px;" onclick="viewPhoto('${r.photoUrl}')">📷</span>` : '';
          const variance = (r.scanQty || 0) - (r.sapQty || 0);
          const vColor = variance < 0 ? 'var(--red)' : (variance > 0 ? 'var(--amber)' : 'inherit');

          return `
          <tr>
            <td style="color:var(--text-3)">${new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
            <td>${r.user || '—'} ${photoIcon}</td>
            <td class="mono" style="color:var(--accent); font-weight:700">${r.scanBin}</td>
            <td class="mono">${String(r.hu || '').slice(-6)}</td>
            <td>${r.prod}</td>
            <td class="mono">${r.sapQty}</td>
            <td class="mono" style="color:${vColor}; font-weight:700">${r.scanQty}</td>
            <td><span class="status-tag ${r.type}">${r.type}</span></td>
          </tr>
        `}).join('')}
      </tbody>
    </table>`;
  document.getElementById('table-wrap').innerHTML = html;
}

function viewPhoto(data) {
    const div = document.createElement('div');
    div.style = "position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;";
    div.onclick = () => div.remove();
    div.innerHTML = `
        <img src="${data}" style="max-width:95%; max-height:85%; border-radius:12px; border:2px solid var(--border);">
        <p style="color:white; margin-top:15px; font-weight:800;">Click anywhere to close</p>
    `;
    document.body.appendChild(div);
}

// SAP Uploader
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const wb = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
    const rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
    const rows = rawData.slice(1).map(r => [r[0], r[1], r[2], r[3], r[4], r[5], r[6], r[7], r[8], r[9]]);
    
    showToast('Uploading SAP Data...', 'amber');
    try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'uploadSAPData', rows, uploader: 'Control Center', filename: file.name })
        });
        const result = await res.json();
        if(result.success) { showToast(`Success: ${result.rowCount} items loaded`, 'green'); fetchData(); }
    } catch (err) { showToast('Upload Failed', 'red'); }
  };
  reader.readAsArrayBuffer(file);
});

// Assignments
function initAislePicker() {
    const container = document.getElementById('aisle-picker');
    AISLE_ROWS.forEach(row => {
        const btn = document.createElement('div');
        btn.className = 'aisle-pick';
        btn.textContent = row;
        btn.onclick = () => {
            if(assignAisles.has(row)) { assignAisles.delete(row); btn.classList.remove('on'); }
            else { assignAisles.add(row); btn.classList.add('on'); }
        };
        container.appendChild(btn);
    });
}

async function pushAssignments() {
    if(assignAisles.size === 0) return showToast('Select at least one aisle', 'amber');
    const list = Array.from(assignAisles).map(a => ({ type: 'aisle', value: `W${a}`, description: `Aisle ${a}` }));
    showToast('Pushing assignments...', 'amber');
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'setAssignments', assignments: list, assignedBy: 'Control Center' }) });
    showToast('Assignments Live', 'green');
    assignAisles.clear();
    document.querySelectorAll('.aisle-pick').forEach(b => b.classList.remove('on'));
}

async function clearAssignments() {
    if(!confirm('Clear all active team assignments?')) return;
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'setAssignments', assignments: [], assignedBy: 'Control Center' }) });
    showToast('Assignments Cleared', 'amber');
}

async function finalizeReconciliation() {
  if(!confirm('This will permanently mark all PENDING MISSING items as MISSING. Continue?')) return;
  showToast('Finalizing...', 'amber');
  const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'finalizeReconciliation', user: 'Control Center' }) });
  const data = await res.json();
  showToast(`Finalized ${data.finalized} items`, 'green');
  fetchData();
}

function exportAudit() {
  if(report.length === 0) return showToast('No data to export', 'red');
  const ws = XLSX.utils.json_to_sheet(report);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "AuditData");
  XLSX.writeFile(wb, `Audit_Export_${new Date().toISOString().split('T')[0]}.xlsx`);
}

// Init
initAislePicker();
fetchData();
setInterval(fetchData, 15000); // Auto-refresh every 15s
</script>
</body>
</html>
